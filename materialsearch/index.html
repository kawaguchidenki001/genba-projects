<!DOCTYPE html>
<!-- version 4 (2026-06-14) デザイン統一（ニューモーフィズム/Gen-Can基準・グリーン#059669・線画アイコン・文字拡大）。機能は不変。「写真から探す」(materialIdentify)＋各候補に画像/出典。型番をGemini+Google検索→候補→リストに追加→材料リストとして保存 -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>材料AI検索｜Gen-Can</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Montserrat:ital,wght@1,900&family=Zen+Kaku+Gothic+New:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#e8ecf2;--ink:#1f3a52;--sub:#5e7a92;--line:#dbe2ea;
    --accent:#059669;--accent-d:#047857;--accent-soft:#d8f1e6;
    --red:#e2574c;
    --grad:linear-gradient(92deg,#06b6d4 10%,#2563eb 55%,#7c3aed 95%);
    --rise:6px 6px 12px #cdd3dc,-6px -6px 12px #ffffff;
    --rise-sm:4px 4px 8px #cdd3dc,-4px -4px 8px #ffffff;
    --well:inset 3px 3px 6px #cdd3dc,inset -3px -3px 6px #ffffff;
    --well-soft:inset 2px 2px 5px #d3d9e1,inset -2px -2px 5px #fbfdff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;}
  body{background:var(--bg);color:var(--ink);font-family:"Zen Kaku Gothic New",sans-serif;font-size:16.5px;line-height:1.55;padding-bottom:40px;}
  select,input,textarea,button,a{font-family:inherit;}
  header{position:sticky;top:0;z-index:20;background:var(--bg);padding:calc(env(safe-area-inset-top) + 12px) 14px 12px;box-shadow:0 6px 14px -10px rgba(31,90,168,.4);}
  .hbar{display:flex;align-items:center;gap:11px;max-width:720px;margin:0 auto;}
  .back{font-family:"Manrope",sans-serif;font-weight:700;font-size:11px;letter-spacing:.06em;color:var(--accent-d);background:var(--bg);box-shadow:var(--rise-sm);border-radius:999px;padding:8px 13px;text-decoration:none;white-space:nowrap;}
  .back:active{box-shadow:var(--well);}
  .hic{width:40px;height:40px;border-radius:50%;background:var(--bg);box-shadow:var(--well);display:flex;align-items:center;justify-content:center;flex:0 0 auto;color:var(--accent);}
  .hic svg{width:21px;height:21px;}
  .htxt{flex:1;min-width:0;}
  .htxt .en{font-family:"Manrope",sans-serif;font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--sub);display:block;}
  .htxt .nm{font-weight:700;font-size:17px;color:var(--ink);display:block;line-height:1.2;}
  .hmark{font-family:"Montserrat",sans-serif;font-weight:900;font-style:italic;font-size:14px;background-image:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;flex:0 0 auto;}
  main{padding:13px;max-width:720px;margin:0 auto;}
  .empty{text-align:center;color:var(--sub);padding:28px 10px;font-size:14.5px;line-height:1.9;}
  label.lbl{display:block;font-size:12px;color:var(--sub);font-weight:700;margin:11px 2px 4px;}
  .ssel{width:100%;padding:12px;border:none;border-radius:11px;font-size:15.5px;background:var(--bg);box-shadow:var(--well);color:var(--ink);}
  .ti{width:100%;padding:12px;border:none;border-radius:11px;font-size:16px;background:var(--bg);box-shadow:var(--well);color:var(--ink);}
  .note{font-size:13px;color:var(--sub);background:var(--bg);box-shadow:var(--rise-sm);border-radius:12px;padding:12px 14px;margin-bottom:6px;line-height:1.75;}
  .savebtn{width:100%;padding:14px;border:none;border-radius:13px;background:var(--accent);color:#fff;font-size:16px;font-weight:800;cursor:pointer;margin-top:14px;box-shadow:4px 5px 13px rgba(5,150,105,.4),-3px -3px 8px #ffffff;}
  .savebtn:active{transform:translateY(1px);}
  .srchrow{display:flex;gap:8px;margin-top:4px;}
  .srchrow .ti{flex:1;min-width:0;}
  .srchbtn{flex:0 0 auto;padding:0 20px;border:none;border-radius:11px;background:var(--accent);color:#fff;font-size:15.5px;font-weight:800;cursor:pointer;box-shadow:3px 4px 10px rgba(5,150,105,.4),-2px -2px 6px #ffffff;}
  .srchbtn:active{transform:translateY(1px);}
  .photobtn{width:100%;display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:12px;margin-top:9px;border:none;border-radius:12px;background:var(--bg);color:var(--accent-d);font-size:14.5px;font-weight:800;cursor:pointer;box-shadow:var(--rise-sm);}
  .photobtn:active{box-shadow:var(--well);}
  .photobtn svg{width:18px;height:18px;}
  .rescard{position:relative;background:var(--bg);border-radius:14px;box-shadow:var(--rise);padding:13px 15px 13px 18px;margin-bottom:11px;overflow:hidden;}
  .rescard::before{content:"";position:absolute;left:0;top:12px;bottom:12px;width:4px;border-radius:0 4px 4px 0;background:var(--accent);}
  .rescard .rn{font-weight:700;font-size:15.5px;color:var(--ink);}
  .rescard .rmodel{font-size:14px;color:var(--accent-d);font-weight:700;margin-top:3px;font-family:ui-monospace,Menlo,Consolas,monospace;word-break:break-all;}
  .rescard .rmeta{font-size:12.5px;color:var(--sub);margin-top:4px;line-height:1.7;}
  .rescard .rbtns{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap;}
  .rescard .imgb{display:inline-flex;align-items:center;gap:5px;background:var(--bg);box-shadow:var(--rise-sm);color:var(--accent-d);border:none;border-radius:10px;padding:9px 15px;font-size:13.5px;font-weight:800;cursor:pointer;}
  .rescard .imgb:active{box-shadow:var(--well);}
  .rescard .imgb svg{width:15px;height:15px;}
  .rescard .addb{background:var(--bg);box-shadow:var(--rise-sm);color:var(--accent-d);border:none;border-radius:10px;padding:9px 15px;font-size:13.5px;font-weight:800;cursor:pointer;}
  .rescard .addb:active{box-shadow:var(--well);}
  .rescard .addb.added{background:var(--accent-soft);color:#166534;box-shadow:var(--well-soft);}
  details.sources{margin-top:8px;border-top:1px dashed var(--line);padding-top:8px;margin-bottom:6px;}
  .src-ttl{font-size:12px;color:var(--sub);font-weight:700;cursor:pointer;user-select:none;-webkit-user-select:none;list-style:none;display:flex;align-items:center;gap:5px;}
  .src-ttl::-webkit-details-marker{display:none;}
  .src-ttl::before{content:'\25B8';font-size:10px;display:inline-block;transition:transform .15s;}
  details.sources[open] .src-ttl::before{transform:rotate(90deg);}
  .src-link{display:block;font-size:12.5px;color:var(--accent-d);text-decoration:none;padding:3px 0;word-break:break-all;}
  .cartwrap{background:var(--bg);box-shadow:var(--rise);border-radius:14px;padding:13px 15px;margin-top:12px;}
  .cartwrap h2{font-size:15px;margin:0 0 8px;color:var(--accent-d);font-weight:800;}
  .crow{display:flex;align-items:center;gap:7px;padding:8px 0;border-top:1px dashed var(--line);flex-wrap:wrap;}
  .crow:first-of-type{border-top:none;}
  .c-name{flex:1 1 100%;order:3;padding:10px;border:none;border-radius:9px;font-size:14.5px;background:var(--bg);box-shadow:var(--well-soft);color:var(--ink);}
  .c-qty{flex:0 0 96px;order:2;padding:10px;border:none;border-radius:9px;font-size:14px;background:var(--bg);box-shadow:var(--well-soft);color:var(--ink);}
  .c-del{order:1;border:none;background:var(--bg);box-shadow:var(--rise-sm);color:var(--red);border-radius:9px;font-size:16px;font-weight:800;width:36px;height:36px;cursor:pointer;flex:0 0 auto;}
  .c-del:active{box-shadow:var(--well);}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:30px;z-index:90;background:#1f3a52;color:#fff;padding:11px 18px;border-radius:999px;font-size:13.5px;opacity:0;transition:opacity .25s;pointer-events:none;box-shadow:0 8px 20px rgba(31,58,82,.3);}
  .toast.show{opacity:1;}
  .loading{position:fixed;inset:0;z-index:1000;background:rgba(232,236,242,.78);display:none;align-items:center;justify-content:center;}
  .loading.show{display:flex;}
  .lbox{background:var(--bg);border-radius:18px;box-shadow:var(--rise);padding:22px 30px;text-align:center;}
  .spin{width:36px;height:36px;border:4px solid #d6deea;border-top-color:var(--accent);border-radius:50%;margin:0 auto 10px;animation:sp .8s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div id="verBadge" style="position:fixed;top:0;left:50%;transform:translateX(-50%);z-index:99999;font-size:10px;color:#fff;background:rgba(0,0,0,.30);padding:1px 9px;border-radius:0 0 8px 8px;font-family:sans-serif;pointer-events:none;letter-spacing:.5px;">v4</div>
<header>
  <div class="hbar">
    <a class="back" href="../">← 材料管理</a>
    <span class="hic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></span>
    <span class="htxt"><span class="en">Material Search</span><span class="nm">材料AI検索</span></span>
    <span class="hmark">Gen-Can</span>
  </div>
</header>

<main>
  <div class="note">材料名や型番でAI検索すると、メーカー・型番・参考価格つきの候補が出ます。各候補の「＋リストに追加」で下にためて、現場とタイトルを決めて材料リストとして保存できます。<br>※AIとGoogle検索の結果です。型番・価格は念のためご確認ください。</div>

  <label class="lbl">検索ワード（材料名・型番・用途など）</label>
  <div class="srchrow">
    <input class="ti" id="q" placeholder="例：露出スイッチ パナソニック / VVF1.6 2C / 防水コンセント" enterkeyhint="search" onkeydown="if(event.key==='Enter')doSearch()">
    <button class="srchbtn" id="srchBtn" onclick="doSearch()">検索</button>
  </div>
  <button class="photobtn" onclick="openIdPhoto()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5a2 2 0 0 1 2-2h1.6L8 4.5h8l1.4 2H19a2 2 0 0 1 2 2V18a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/><circle cx="12" cy="13" r="3.6"/></svg> 写真から探す（撮影・画像）</button>
  <input type="file" id="idPhoto" accept="image/*,application/pdf" style="display:none" onchange="idPhotoSelected(this)">

  <div id="results" style="margin-top:12px;"></div>

  <!-- ためたリスト -->
  <div class="cartwrap" id="cartWrap" style="display:none;">
    <h2>追加した材料（<span id="cartCnt">0</span>点）</h2>
    <div id="cart"></div>
    <label class="lbl">現場（どの現場の材料か）</label>
    <select class="ssel" id="saveSite"></select>
    <label class="lbl">タイトル</label>
    <input class="ti" id="saveTitle" placeholder="例：1F 照明・スイッチ材料">
    <button class="savebtn" onclick="saveAsList()">この内容で材料リストとして保存</button>
  </div>
</main>

<datalist id="supDL"></datalist>
<div class="toast" id="toast"></div>
<div class="loading" id="loading"><div class="lbox"><div class="spin"></div><div id="ltxt" style="font-size:14px;font-weight:700;">読み込み中…</div></div></div>

<script>
var GAS_URL='https://script.google.com/macros/s/AKfycbyk8p6_gi6e3wdhQdWL0Oswz4BUtP3gR37PeFJJ9rO5mVhTRt4CikpQhK_bBwt1Ftr-/exec';
var T_GENERAL='kawaguchi-genba-2026';
var CACHE='genba_matlist_cache', LASTSITE='genba_matlist_lastsite';
var DATA={projects:[],suppliers:[],products:[],matLists:[]};
var results=[], cart=[];
function tok(){return localStorage.getItem('genba_admin')||T_GENERAL;}
function gUser(){try{return JSON.parse(localStorage.getItem('genba_user')||'null');}catch(e){return null;}}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._tm);t._tm=setTimeout(function(){t.classList.remove('show');},2400);}
var lc=0,ls=0;
function showLoad(msg){lc++;if(msg)document.getElementById('ltxt').textContent=msg;if(lc===1){ls=Date.now();document.getElementById('loading').classList.add('show');}}
function hideLoad(){lc=Math.max(0,lc-1);if(lc===0){var w=Math.max(0,400-(Date.now()-ls));setTimeout(function(){if(lc===0)document.getElementById('loading').classList.remove('show');},w);}}
function lastSite(){try{return localStorage.getItem(LASTSITE)||'';}catch(e){return '';}}
function setLastSite(id){try{localStorage.setItem(LASTSITE,String(id||''));}catch(e){}}

// JSONP（GET）：現場一覧の取得・材料リスト保存に使用
function callGAS(params,silent){
  return new Promise(function(resolve,reject){
    if(!silent)showLoad();
    var cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*1e6),s=document.createElement('script');
    var timer=setTimeout(function(){cleanup();reject(new Error('timeout'));},20000);
    function cleanup(){if(!silent)hideLoad();try{delete window[cb];}catch(e){}if(s.parentNode)s.parentNode.removeChild(s);clearTimeout(timer);}
    window[cb]=function(res){cleanup();resolve(res);};
    var q=Object.assign({secret:tok(),callback:cb},params);
    if(q.data&&typeof q.data!=='string')q.data=JSON.stringify(q.data);
    s.src=GAS_URL+'?'+Object.keys(q).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(q[k]);}).join('&');
    s.onerror=function(){cleanup();reject(new Error('error'));};document.head.appendChild(s);
  });
}
// POST（text/plainでCORSプリフライト回避）：AI検索（materialSearch）に使用
function callGASPost(params,silent){return new Promise(function(resolve,reject){
  if(!silent)showLoad();
  var body=Object.assign({secret:tok()},params);
  fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(body)})
    .then(function(r){return r.json();})
    .then(function(res){if(!silent)hideLoad();resolve(res);})
    .catch(function(e){if(!silent)hideLoad();reject(new Error('通信エラー: '+e.message));});
});}

function siteOptions(sel){
  var h='<option value="">（現場を選ぶ）</option>';
  (DATA.projects||[]).forEach(function(p){
    var nm=p['案件名']||p['案件ID'];
    h+='<option value="'+esc(p['案件ID'])+'" '+(String(sel)===String(p['案件ID'])?'selected':'')+'>'+esc(nm)+'</option>';
  });
  return h;
}
function populateSites(){
  var cur=document.getElementById('saveSite').value;
  document.getElementById('saveSite').innerHTML=siteOptions(cur||lastSite());
}

/* データ読込（現場一覧） */
function loadCache(){try{var c=JSON.parse(localStorage.getItem(CACHE)||'null');if(c&&c.projects){DATA=c;}}catch(e){}}
function refresh(silent){
  callGAS({action:'orderData'},silent).then(function(res){
    if(!res||!res.ok)throw new Error((res&&res.error)||'エラー');
    DATA={projects:res.projects||[],suppliers:res.suppliers||[],products:res.products||[],matLists:res.matLists||[]};
    try{localStorage.setItem(CACHE,JSON.stringify(DATA));}catch(e){}
    populateSites();
  }).catch(function(err){if(!silent)toast('現場の読込に失敗：'+err.message);});
}

/* 検索 */
function doSearch(){
  var q=(document.getElementById('q').value||'').trim();
  if(!q){toast('検索ワードを入力してください');return;}
  var btn=document.getElementById('srchBtn');btn.disabled=true;btn.textContent='検索中';
  document.getElementById('results').innerHTML='';
  showLoad('AIが検索中…（10秒ほど）');
  callGASPost({action:'materialSearch',q:q},true).then(function(res){
    hideLoad();btn.disabled=false;btn.textContent='検索';
    if(!res||!res.ok){
      document.getElementById('results').innerHTML='<div class="empty">'+esc((res&&res.error)||'検索できませんでした')+'</div>';
      return;
    }
    results=(res.results||[]).filter(function(r){return String(r.n||'').trim()!==''||String(r.model||'').trim()!=='';});
    renderResults(res.sources||[]);
  }).catch(function(e){hideLoad();btn.disabled=false;btn.textContent='検索';toast(e.message);});
}
/* ===== 写真から特定（materialIdentify）：文字検索と同じ候補カードを表示 ===== */
function openIdPhoto(){var inp=document.getElementById('idPhoto');inp.value='';inp.click();}
function idPhotoSelected(input){
  var file=input.files&&input.files[0];if(!file)return;
  if(file.size>10*1024*1024){toast('ファイルが大きすぎます（10MB以内）');return;}
  var mime=file.type||'';
  if(!mime||mime==='application/octet-stream'){
    if(/\.pdf$/i.test(file.name))mime='application/pdf';
    else if(/\.png$/i.test(file.name))mime='image/png';
    else mime='image/jpeg';
  }
  var reader=new FileReader();
  reader.onload=function(e){
    var b64=(String(e.target.result||'').split(',')[1])||'';
    if(!b64){toast('画像の読み込みに失敗しました');return;}
    document.getElementById('results').innerHTML='';
    showLoad('写真からAIが特定中…（10秒ほど）');
    callGASPost({action:'materialIdentify',base64:b64,mime:mime},true).then(function(res){
      hideLoad();
      if(!res||!res.ok){document.getElementById('results').innerHTML='<div class="empty">'+esc((res&&res.error)||'特定できませんでした')+'</div>';return;}
      results=(res.results||[]).filter(function(r){return String(r.n||'').trim()!==''||String(r.model||'').trim()!=='';});
      renderResults(res.sources||[]);
      if(results.length)toast('✨ '+results.length+'件の候補が出ました');
    }).catch(function(e){hideLoad();toast(e.message);});
  };
  reader.onerror=function(){toast('画像の読み込みに失敗しました');};
  reader.readAsDataURL(file);
}
function renderResults(sources){
  var el=document.getElementById('results');
  if(!results.length){el.innerHTML='<div class="empty">候補が見つかりませんでした。<br>言葉を変えて検索してみてください。</div>';return;}
  var h=results.map(function(r,i){
    var meta=[];
    if(r.maker)meta.push('メーカー：'+esc(r.maker));
    if(r.spec)meta.push('規格：'+esc(r.spec));
    if(r.price)meta.push('参考価格：'+esc(String(r.price))+(/^[0-9,]+$/.test(String(r.price))?'円':''));
    return '<div class="rescard">'
      +'<div class="rn">'+esc(r.n||'(名称不明)')+'</div>'
      +(r.model?'<div class="rmodel">型番：'+esc(r.model)+'</div>':'')
      +(meta.length?'<div class="rmeta">'+meta.join('　/　')+'</div>':'')
      +'<div class="rbtns">'+'<button class="imgb" onclick="imgSearch('+i+')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9.5" r="1.8"/><path d="m21 16-5-5-9 9"/></svg> 画像を見る</button>'+'<button class="addb" id="addb'+i+'" onclick="addToCart('+i+')">＋ リストに追加</button>'+'</div>'
      +'</div>';
  }).join('');
  if(sources&&sources.length){
    h+='<details class="sources"><summary class="src-ttl">📎 検索の出典 '+sources.length+'件（タップで開く）</summary>';
    sources.forEach(function(s){
      var t=esc(s.title||s.url); if(t.length>46)t=t.slice(0,46)+'…';
      h+='<a class="src-link" href="'+esc(s.url)+'" target="_blank" rel="noopener">🔗 '+t+'</a>';
    });
    h+='</details>';
  }
  el.innerHTML=h;
}
// 製品名＋型番（＋メーカー）を1つの材料名にまとめる
function composeName(r){
  var parts=[];
  if(r.maker)parts.push(String(r.maker).trim());
  if(r.n)parts.push(String(r.n).trim());
  var base=parts.join(' ');
  var model=String(r.model||'').trim();
  if(model)base=base?(base+' '+model):model;
  return base.trim();
}
// 商品名＋型番でGoogle画像検索を別タブで開く（実画像の確認用・設定不要）
function imgSearch(i){
  var r=results[i];if(!r)return;
  var q=[r.maker,r.n,r.model].map(function(x){return String(x||'').trim();}).filter(Boolean).join(' ').trim();
  if(!q)q=String(r.n||r.model||'').trim();
  if(!q){toast('検索ワードがありません');return;}
  window.open('https://www.google.com/search?tbm=isch&q='+encodeURIComponent(q),'_blank','noopener');
}
function addToCart(i){
  var r=results[i];if(!r)return;
  cart.push({n:composeName(r),q:'',s:''});
  var b=document.getElementById('addb'+i);
  if(b){b.classList.add('added');b.textContent='✓ 追加済み';}
  renderCart();
  toast('追加しました');
}
function renderCart(){
  var wrap=document.getElementById('cartWrap');
  document.getElementById('cartCnt').textContent=cart.length;
  if(!cart.length){wrap.style.display='none';return;}
  wrap.style.display='block';
  document.getElementById('cart').innerHTML=cart.map(function(it,i){
    return '<div class="crow">'
      +'<button class="c-del" onclick="delCart('+i+')">×</button>'
      +'<input class="c-qty" placeholder="数量" value="'+esc(it.q||'')+'" oninput="setCart('+i+',\'q\',this.value)">'
      +'<input class="c-name" value="'+esc(it.n||'')+'" oninput="setCart('+i+',\'n\',this.value)">'
      +'</div>';
  }).join('');
  populateSites();
}
function setCart(i,k,v){if(cart[i])cart[i][k]=v;}
function delCart(i){cart.splice(i,1);renderCart();}

/* 材料リストとして保存（種類:mat → 既存の材料リスト・発注画面と共通） */
function saveAsList(){
  if(!cart.length){toast('先に材料を追加してください');return;}
  var sid=document.getElementById('saveSite').value;
  if(!sid){toast('現場を選んでください');return;}
  var title=document.getElementById('saveTitle').value.trim();
  if(!title){toast('タイトルを入力してください');document.getElementById('saveTitle').focus();return;}
  setLastSite(sid);
  var its=cart.filter(function(it){return String(it.n||'').trim()!=='';})
    .map(function(it){return {n:String(it.n||'').trim(),q:it.q||'',s:it.s||'',d:false,pid:''};});
  if(!its.length){toast('材料名が空です');return;}
  var u=gUser()||{};
  var data={'案件ID':sid,'種類':'mat','タイトル':title,'内容':JSON.stringify(its),'作成者ID':u['作業員ID']||'','作成者名':u['氏名']||''};
  callGAS({action:'noteSave',data:data}).then(function(res){
    if(!res||!res.ok)throw new Error((res&&res.error)||'保存失敗');
    toast('✓ 材料リストとして保存しました');
    cart=[];renderCart();
    document.getElementById('saveTitle').value='';
    // 検索結果の「追加済み」表示を戻す
    var bs=document.querySelectorAll('.addb.added');
    for(var k=0;k<bs.length;k++){bs[k].classList.remove('added');bs[k].textContent='＋ リストに追加';}
  }).catch(function(err){toast('保存失敗：'+err.message);});
}

/* 初期化 */
loadCache();
populateSites();
refresh(true);
</script>
