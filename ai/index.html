<!DOCTYPE html>
<!-- version 2 ai (2026-06-14) 汎用化・回答簡潔化・候補削除・AI吹き出しID衝突バグ修正・画面にバージョン表示 -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>AIアシスタント｜現場管理</title>
<meta name="theme-color" content="#6d28d9">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Zen+Kaku+Gothic+New:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#e8ecf2;--card:#fff;--line:#e3e6ea;--ink:#1f2733;--sub:#6b7280;
    --accent:#7c3aed;--accent-d:#5b21b6;--accent-soft:#ede9fe;
    --radius:14px;--shadow:0 2px 10px rgba(40,60,100,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;}
  body{min-height:100vh;color:var(--ink);font-family:"Zen Kaku Gothic New",sans-serif;font-size:15px;line-height:1.6;background:var(--bg);display:flex;flex-direction:column;}

  /* ヘッダー */
  header{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.94);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;box-shadow:var(--shadow);border-bottom:1px solid var(--line);flex:0 0 auto;}
  .hd-row{display:flex;align-items:center;gap:10px;}
  .back{color:var(--accent-d);text-decoration:none;font-size:13px;flex:0 0 auto;border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 12px;font-weight:600;}
  .hd-center{flex:1;text-align:center;}
  .hd-center h1{font-size:16px;font-weight:700;color:var(--accent-d);}
  .hd-center .model{font-size:11px;color:var(--sub);font-family:"Manrope",sans-serif;letter-spacing:.05em;}
  .clrbtn{font-size:13px;color:var(--sub);border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 12px;cursor:pointer;font-weight:600;}

  /* メッセージエリア */
  #msgs{flex:1;overflow-y:auto;padding:16px 14px 8px;max-width:760px;width:100%;margin:0 auto;}
  .welcome{text-align:center;padding:32px 16px 20px;color:var(--sub);}
  .welcome .wi{font-size:48px;margin-bottom:12px;}
  .welcome h2{font-size:18px;font-weight:700;color:var(--accent-d);margin-bottom:6px;}
  .welcome p{font-size:13px;line-height:1.7;}
  .suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px;}
  .sug{background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 14px;font-size:13px;color:var(--accent-d);cursor:pointer;font-weight:600;box-shadow:var(--shadow);}
  .sug:active{background:var(--accent-soft);}

  /* 吹き出し */
  .msg{display:flex;gap:10px;margin-bottom:14px;align-items:flex-end;}
  .msg.user{flex-direction:row-reverse;}
  .avatar{width:32px;height:32px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;}
  .avatar.ai{background:var(--accent);color:#fff;font-size:14px;}
  .avatar.user{background:#e5e7eb;color:var(--ink);font-size:13px;}
  .bubble{max-width:82%;padding:11px 14px;border-radius:18px;font-size:14.5px;line-height:1.7;white-space:pre-wrap;word-break:break-word;}
  .msg.ai .bubble{background:#fff;border:1px solid var(--line);border-radius:4px 18px 18px 18px;box-shadow:var(--shadow);}
  .msg.user .bubble{background:var(--accent);color:#fff;border-radius:18px 4px 18px 18px;}
  .msg.ai .bubble.streaming::after{content:'▋';animation:blink .8s step-end infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

  /* Markdownっぽいスタイル */
  .bubble strong,.bubble b{font-weight:700;}
  .bubble em,.bubble i{font-style:italic;}
  .bubble code{background:#f3f4f6;border-radius:5px;padding:1px 5px;font-family:monospace;font-size:13px;color:#374151;}
  .bubble pre{background:#1f2733;color:#e5e7eb;border-radius:10px;padding:12px;overflow-x:auto;font-size:13px;margin:8px 0;}
  .bubble pre code{background:none;color:inherit;padding:0;}
  .bubble ul,.bubble ol{padding-left:18px;margin:6px 0;}
  .bubble li{margin-bottom:3px;}
  .bubble h3,.bubble h4{font-weight:700;margin:8px 0 4px;}
  .bubble p{margin:4px 0;}
  .bubble hr{border:none;border-top:1px solid var(--line);margin:10px 0;}

  /* タイムスタンプ */
  .ts{font-size:11px;color:var(--sub);text-align:center;margin:8px 0;}

  /* 入力エリア */
  #inputWrap{background:rgba(255,255,255,.96);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:10px 14px calc(env(safe-area-inset-bottom) + 12px);flex:0 0 auto;}
  .input-inner{max-width:760px;margin:0 auto;display:flex;gap:8px;align-items:flex-end;}
  #inp{flex:1;padding:11px 14px;border:1.5px solid var(--line);border-radius:22px;font-size:15px;font-family:inherit;resize:none;line-height:1.5;max-height:140px;min-height:46px;background:#fff;color:var(--ink);outline:none;transition:border-color .15s;}
  #inp:focus{border-color:var(--accent);}
  #sendBtn{width:46px;height:46px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:22px;cursor:pointer;flex:0 0 auto;display:flex;align-items:center;justify-content:center;transition:.15s;box-shadow:0 3px 8px rgba(124,58,237,.35);}
  #sendBtn:disabled{background:#c4b5fd;box-shadow:none;cursor:default;}
  #sendBtn:active:not(:disabled){transform:scale(.94);}

  /* トースト */
  .toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);background:#1f2733;color:#fff;padding:11px 18px;border-radius:10px;font-size:14px;opacity:0;pointer-events:none;transition:.25s;z-index:99;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* エラーバナー */
  .err-bar{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:10px 13px;font-size:13px;color:#991b1b;margin-bottom:10px;display:none;}
  .err-bar.show{display:block;}
</style>
</head>
<body>

<header>
  <div class="hd-row">
    <a class="back" href="../">← メニュー</a>
    <div class="hd-center">
      <h1>✨ AIアシスタント</h1>
      <div class="model">Gemini 2.5 Flash（無料）　ai v2</div>
    </div>
    <button class="clrbtn" onclick="clearChat()">クリア</button>
  </div>
</header>

<div id="msgs">
  <div class="welcome" id="welcome">
    <div class="wi">🤖</div>
    <h2>何でも聞いてください</h2>
    <p>調べ物はなんでもお答えします。</p>
  </div>
</div>

<div id="inputWrap">
  <div class="err-bar" id="errBar"></div>
  <div class="input-inner">
    <textarea id="inp" placeholder="メッセージを入力…" rows="1" onkeydown="onKey(event)" oninput="autoResize(this)"></textarea>
    <button id="sendBtn" onclick="send()" disabled title="送信">
      <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ========== 設定 ========== */
var API_URL = 'https://script.google.com/macros/s/AKfycbyk8p6_gi6e3wdhQdWL0Oswz4BUtP3gR37PeFJJ9rO5mVhTRt4CikpQhK_bBwt1Ftr-/exec';
var SYSTEM_PROMPT = ''; // システムプロンプトはGAS側(AI_SYSTEM_PROMPT)で管理

/* ========== 状態 ========== */
var chatLog = []; // {role:'user'|'assistant', content:'...'}
var isStreaming = false;

/* ========== UI ========== */
var inp = document.getElementById('inp');
var sendBtn = document.getElementById('sendBtn');
var msgs = document.getElementById('msgs');

inp.addEventListener('input', function() {
  sendBtn.disabled = inp.value.trim() === '' || isStreaming;
});

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

function onKey(e) {
  // PCのみEnterで送信（Shift+Enterは改行）
  if (e.key === 'Enter' && !e.shiftKey && window.innerWidth >= 680) {
    e.preventDefault();
    if (!sendBtn.disabled) send();
  }
}

function scrollBottom() {
  msgs.scrollTop = msgs.scrollHeight;
}

function showToast(m) {
  var t = document.getElementById('toast');
  t.textContent = m;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function showErr(m) {
  var b = document.getElementById('errBar');
  if (m) { b.textContent = m; b.classList.add('show'); }
  else b.classList.remove('show');
}

function nowHM() {
  var d = new Date(), p = function(n) { return ('0' + n).slice(-2); };
  return p(d.getHours()) + ':' + p(d.getMinutes());
}

/* ========== チャット表示 ========== */
function addTimestamp() {
  var d = document.createElement('div');
  d.className = 'ts';
  d.textContent = nowHM();
  msgs.appendChild(d);
}

function addUserBubble(text) {
  document.getElementById('welcome').style.display = 'none';
  addTimestamp();
  var div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = '<div class="avatar user">あ</div><div class="bubble">' + esc(text) + '</div>';
  msgs.appendChild(div);
  scrollBottom();
}

function addAiBubble() {
  var div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = '<div class="avatar ai">AI</div><div class="bubble streaming"></div>';
  msgs.appendChild(div);
  scrollBottom();
  // IDに頼らず、今作った吹き出し要素を直接返す（複数IDの衝突を防ぐ）
  return div.querySelector('.bubble');
}

function renderMarkdown(text) {
  // シンプルなMarkdown変換
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/```([\w]*)\n([\s\S]*?)```/g, function(_, lang, code) {
      return '<pre><code>' + code.trim() + '</code></pre>';
    })
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<h4>$1</h4>')
    .replace(/^## (.+)$/gm, '<h3>$1</h3>')
    .replace(/^---$/gm, '<hr>')
    .replace(/^[\-\*] (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
    .replace(/\n{2,}/g, '</p><p>')
    .replace(/\n/g, '<br>');
}

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

/* ========== 送信 ========== */
function sendSug(el) {
  inp.value = el.textContent;
  send();
}

function send() {
  var text = inp.value.trim();
  if (!text || isStreaming) return;
  inp.value = '';
  inp.style.height = 'auto';
  sendBtn.disabled = true;
  showErr('');

  chatLog.push({ role: 'user', content: text });
  addUserBubble(text);
  doStream();
}

/* ========== GAS経由でClaude APIを呼ぶ ========== */
function doStream() {
  isStreaming = true;
  var bubble = addAiBubble();
  var fullText = '';

  // GASにfetch（JSONPではなくfetch + no-cors回避のためGASをプロキシにする）
  var payload = {
    action: 'aiChat',
    messages: chatLog,
    system: SYSTEM_PROMPT
  };

  // fetchでGASのURLにPOSTするが、GASはno-corsになるため
  // URLパラメータにsecretとcallbackをつけてJSONP方式で呼ぶ
  var cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random() * 1e6);
  var sc = document.createElement('script');
  var timer = setTimeout(function() {
    cleanup('タイムアウト：GASの応答がありません');
  }, 45000);

  function cleanup(errMsg) {
    clearTimeout(timer);
    try { delete window[cb]; } catch (e) {}
    if (sc.parentNode) sc.parentNode.removeChild(sc);
    isStreaming = false;
    bubble.classList.remove('streaming');
    sendBtn.disabled = inp.value.trim() === '';
    if (errMsg) {
      bubble.innerHTML = '<span style="color:#dc2626">⚠ ' + esc(errMsg) + '</span>';
      showErr(errMsg);
    }
  }

  window[cb] = function(res) {
    if (!res || !res.ok) {
      cleanup((res && res.error) || '応答を取得できませんでした');
      return;
    }
    fullText = res.text || '';
    // Markdown変換して表示
    bubble.innerHTML = renderMarkdown(fullText);
    bubble.classList.remove('streaming');
    chatLog.push({ role: 'assistant', content: fullText });
    scrollBottom();
    isStreaming = false;
    sendBtn.disabled = inp.value.trim() === '';
    clearTimeout(timer);
    try { delete window[cb]; } catch (e) {}
    if (sc.parentNode) sc.parentNode.removeChild(sc);
  };

  sc.onerror = function() { cleanup('通信エラーが発生しました'); };

  // messagesのみ送る（systemはGAS側が保持。URL長を短く保つため）
  var q = 'action=aiChat'
    + '&secret=' + encodeURIComponent('kawaguchi-genba-2026')
    + '&messages=' + encodeURIComponent(JSON.stringify(chatLog))
    + '&callback=' + encodeURIComponent(cb);
  var fullUrl = API_URL + '?' + q;
  // URL長チェック（GASのJSONP上限対策）
  if(fullUrl.length > 7000) {
    cleanup('会話が長くなりすぎました。「クリア」を押して会話をリセットしてください。');
    return;
  }
  sc.src = fullUrl;
  document.head.appendChild(sc);
}

/* ========== クリア ========== */
function clearChat() {
  if (chatLog.length === 0) return;
  if (!confirm('会話履歴をリセットしますか？')) return;
  chatLog = [];
  msgs.innerHTML = '';
  // ウェルカム画面を再挿入
  var w = document.createElement('div');
  w.className = 'welcome';
  w.id = 'welcome';
  w.innerHTML = '<div class="wi">🤖</div><h2>何でも聞いてください</h2>'
    + '<p>調べ物はなんでもお答えします。</p>';
  msgs.appendChild(w);
  showErr('');
  showToast('会話をリセットしました');
}
</script>
</body>
</html>
