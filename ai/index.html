<!DOCTYPE html>
<!-- version 10 ai (2026-06-14) デザイン統一（ニューモーフィズム/Gen-Can基準・バイオレット#7c3aed・線画アイコン・文字拡大）。⚠/📎/🔗は維持。機能は不変。ページ全体スクロール＋入力欄sticky固定 -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AIアシスタント｜現場管理</title>
<meta name="theme-color" content="#6d28d9">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Montserrat:ital,wght@1,900&family=Zen+Kaku+Gothic+New:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#e8ecf2;--ink:#1f3a52;--sub:#5e7a92;--line:#dbe2ea;
    --accent:#7c3aed;--accent-d:#5b21b6;--accent-soft:#ede9fe;
    --radius:14px;
    --grad:linear-gradient(92deg,#06b6d4 10%,#2563eb 55%,#7c3aed 95%);
    --rise:6px 6px 12px #cdd3dc,-6px -6px 12px #ffffff;
    --rise-sm:4px 4px 8px #cdd3dc,-4px -4px 8px #ffffff;
    --well:inset 3px 3px 6px #cdd3dc,inset -3px -3px 6px #ffffff;
    --well-soft:inset 2px 2px 5px #d3d9e1,inset -2px -2px 5px #fbfdff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;}
  select,input,textarea,button,a{font-family:inherit;}
  body{min-height:100vh;min-height:100dvh;color:var(--ink);font-family:"Zen Kaku Gothic New",sans-serif;font-size:16px;line-height:1.6;background:var(--bg);display:flex;flex-direction:column;}
  header{position:sticky;top:0;z-index:20;background:var(--bg);padding:calc(env(safe-area-inset-top) + 12px) 14px 12px;box-shadow:0 6px 14px -10px rgba(31,90,168,.4);flex:0 0 auto;}
  .hbar{display:flex;align-items:center;gap:10px;max-width:760px;margin:0 auto;}
  .back{font-family:"Manrope",sans-serif;font-weight:700;font-size:11px;letter-spacing:.05em;color:var(--accent-d);background:var(--bg);box-shadow:var(--rise-sm);border-radius:999px;padding:8px 12px;text-decoration:none;white-space:nowrap;flex:0 0 auto;}
  .back:active{box-shadow:var(--well);}
  .hic{width:40px;height:40px;border-radius:50%;background:var(--bg);box-shadow:var(--well);display:flex;align-items:center;justify-content:center;flex:0 0 auto;color:var(--accent);}
  .hic svg{width:21px;height:21px;}
  .htxt{flex:1;min-width:0;}
  .htxt .nm{font-weight:700;font-size:16px;color:var(--ink);display:block;line-height:1.2;}
  .htxt .model{font-size:10.5px;color:var(--sub);font-family:"Manrope",sans-serif;letter-spacing:.03em;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .hmark{font-family:"Montserrat",sans-serif;font-weight:900;font-style:italic;font-size:13px;background-image:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;flex:0 0 auto;}
  .clrbtn{font-size:12px;color:var(--sub);border:none;background:var(--bg);box-shadow:var(--rise-sm);border-radius:999px;padding:8px 13px;cursor:pointer;font-weight:700;flex:0 0 auto;}
  .clrbtn:active{box-shadow:var(--well);}
  #msgs{flex:1 0 auto;padding:16px 14px 8px;max-width:760px;width:100%;margin:0 auto;}
  .welcome{text-align:center;padding:32px 16px 20px;color:var(--sub);}
  .welcome .wi{display:inline-flex;width:84px;height:84px;border-radius:50%;background:var(--bg);box-shadow:var(--rise);align-items:center;justify-content:center;color:var(--accent);margin-bottom:14px;}
  .welcome .wi svg{width:42px;height:42px;}
  .welcome h2{font-size:19px;font-weight:700;color:var(--accent-d);margin-bottom:6px;}
  .welcome p{font-size:13.5px;line-height:1.7;}
  .suggestions{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin-top:16px;}
  .sug{background:var(--bg);box-shadow:var(--rise-sm);border:none;border-radius:999px;padding:9px 16px;font-size:13px;color:var(--accent-d);cursor:pointer;font-weight:700;}
  .sug:active{box-shadow:var(--well);}
  .msg{display:flex;gap:10px;margin-bottom:14px;align-items:flex-end;}
  .msg.user{flex-direction:row-reverse;}
  .avatar{width:34px;height:34px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;}
  .avatar.ai{background:var(--accent);color:#fff;font-size:14px;box-shadow:2px 2px 6px rgba(124,58,237,.35);}
  .avatar.user{background:var(--bg);box-shadow:var(--rise-sm);color:var(--sub);font-size:13px;}
  .bubble{max-width:82%;padding:12px 15px;border-radius:18px;font-size:14.5px;line-height:1.7;white-space:pre-wrap;word-break:break-word;}
  .msg.ai .bubble{background:var(--bg);box-shadow:var(--rise-sm);border-radius:4px 18px 18px 18px;color:var(--ink);}
  .msg.user .bubble{background:var(--accent);color:#fff;border-radius:18px 4px 18px 18px;box-shadow:3px 4px 10px rgba(124,58,237,.3);}
  .msg.ai .bubble.streaming::after{content:'▋';animation:blink .8s step-end infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  .bubble strong,.bubble b{font-weight:700;}
  .bubble em,.bubble i{font-style:italic;}
  .bubble code{background:var(--bg);box-shadow:var(--well-soft);border-radius:6px;padding:2px 6px;font-family:monospace;font-size:13px;color:#5b21b6;}
  .bubble pre{background:#1f2733;color:#e5e7eb;border-radius:11px;padding:13px;overflow-x:auto;font-size:13px;margin:8px 0;}
  .bubble pre code{background:none;box-shadow:none;color:inherit;padding:0;}
  .bubble ul,.bubble ol{padding-left:18px;margin:6px 0;}
  .bubble li{margin-bottom:3px;}
  .bubble h3,.bubble h4{font-weight:700;margin:8px 0 4px;}
  .bubble p{margin:4px 0;}
  .bubble hr{border:none;border-top:1px solid var(--line);margin:10px 0;}
  .ts{font-size:11px;color:var(--sub);text-align:center;margin:8px 0;}
  #inputWrap{background:var(--bg);border-top:1px solid var(--line);padding:11px 14px calc(env(safe-area-inset-bottom) + 12px);flex:0 0 auto;position:sticky;bottom:0;z-index:10;box-shadow:0 -6px 14px -10px rgba(31,90,168,.4);}
  .input-inner{max-width:760px;margin:0 auto;display:flex;gap:8px;align-items:flex-end;}
  #inp{flex:1;padding:12px 15px;border:none;border-radius:22px;font-size:15.5px;font-family:inherit;resize:none;line-height:1.5;max-height:140px;min-height:48px;background:var(--bg);box-shadow:var(--well);color:var(--ink);outline:none;}
  #sendBtn{width:48px;height:48px;border-radius:50%;border:none;background:var(--accent);color:#fff;cursor:pointer;flex:0 0 auto;display:flex;align-items:center;justify-content:center;transition:.15s;box-shadow:3px 4px 10px rgba(124,58,237,.4),-2px -2px 6px #ffffff;}
  #sendBtn:disabled{background:#c4b5fd;box-shadow:none;cursor:default;}
  #sendBtn:active:not(:disabled){transform:scale(.94);}
  #micBtn{width:48px;height:48px;border-radius:50%;border:none;background:var(--bg);box-shadow:var(--rise-sm);color:var(--accent-d);cursor:pointer;flex:0 0 auto;display:flex;align-items:center;justify-content:center;transition:.15s;}
  #micBtn:active{box-shadow:var(--well);transform:scale(.96);}
  #micBtn.recording{background:#fee2e2;color:#dc2626;box-shadow:var(--well);animation:micpulse 1.2s ease-in-out infinite;}
  #micBtn.hidden{display:none;}
  @keyframes micpulse{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.4),var(--well);}50%{box-shadow:0 0 0 6px rgba(220,38,38,0),var(--well);}}
  .toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);background:#1f3a52;color:#fff;padding:12px 18px;border-radius:12px;font-size:14px;opacity:0;pointer-events:none;transition:.25s;z-index:99;white-space:nowrap;box-shadow:0 8px 20px rgba(31,58,82,.3);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .err-bar{background:#fdeaea;box-shadow:var(--rise-sm);border-radius:11px;padding:11px 14px;font-size:13px;color:#991b1b;margin-bottom:10px;display:none;}
  .err-bar.show{display:block;}
  .sources{margin-top:10px;padding-top:8px;border-top:1px dashed var(--line);}
  .src-ttl{font-size:11.5px;color:var(--sub);font-weight:700;margin-bottom:5px;cursor:pointer;user-select:none;-webkit-user-select:none;list-style:none;display:flex;align-items:center;gap:5px;}
  .src-ttl::-webkit-details-marker{display:none;}
  .src-ttl::before{content:'▸';font-size:10px;display:inline-block;transition:transform .15s;}
  details.sources[open] .src-ttl::before{transform:rotate(90deg);}
  .src-ttl:active{color:var(--accent-d);}
  .src-link{display:block;font-size:12.5px;color:var(--accent-d);text-decoration:none;padding:3px 0;word-break:break-all;}
  .src-link:active{text-decoration:underline;}
</style>
</head>
<body>
<div id="verBadge" style="position:fixed;top:0;left:50%;transform:translateX(-50%);z-index:99999;font-size:10px;line-height:1.5;color:#fff;background:rgba(0,0,0,.30);padding:1px 9px;border-radius:0 0 8px 8px;font-family:sans-serif;pointer-events:none;letter-spacing:.5px;">v10</div>

<header>
  <div class="hbar">
    <a class="back" href="../">← メニュー</a>
    <span class="hic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg></span>
    <span class="htxt"><span class="nm">AIアシスタント</span><span class="model">Gemini 2.5 Flash（検索対応）　ai v10</span></span>
    <span class="hmark">Gen-Can</span>
    <button class="clrbtn" onclick="clearChat()">クリア</button>
  </div>
</header>

<div id="msgs">
  <div class="welcome" id="welcome">
    <div class="wi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="8" width="14" height="11" rx="3"/><circle cx="9.5" cy="13" r="1.2"/><circle cx="14.5" cy="13" r="1.2"/><path d="M12 4.5V8M12 3.2v.1M8 19v2M16 19v2M3 12.5v3M21 12.5v3"/></svg></div>
    <h2>何でも聞いてください</h2>
    <p>調べ物はなんでもお答えします。</p>
  </div>
</div>

<div id="inputWrap">
  <div class="err-bar" id="errBar"></div>
  <div class="input-inner">
    <button id="micBtn" class="hidden" onclick="toggleMic()" title="音声入力" aria-label="音声入力">
      <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z"/><path d="M19 11a7 7 0 0 1-14 0H3a9 9 0 0 0 8 8.94V23h2v-3.06A9 9 0 0 0 21 11h-2z"/></svg>
    </button>
    <textarea id="inp" placeholder="メッセージを入力…" rows="1" onkeydown="onKey(event)" oninput="autoResize(this)"></textarea>
    <button id="sendBtn" onclick="send()" disabled title="送信">
      <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ========== 設定 ========== */
var API_URL = 'https://script.google.com/macros/s/AKfycbyk8p6_gi6e3wdhQdWL0Oswz4BUtP3gR37PeFJJ9rO5mVhTRt4CikpQhK_bBwt1Ftr-/exec';
var SYSTEM_PROMPT = ''; // システムプロンプトはGAS側(AI_SYSTEM_PROMPT)で管理

/* ========== 状態 ========== */
var chatLog = []; // {role:'user'|'assistant', content:'...'}
var isStreaming = false;

/* ========== UI ========== */
var inp = document.getElementById('inp');
var sendBtn = document.getElementById('sendBtn');
var msgs = document.getElementById('msgs');
var micBtn = document.getElementById('micBtn');

/* ========== 音声入力（Web Speech API・ブラウザ標準） ========== */
var recognition = null;
var isRecording = false;
(function initSpeech(){
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    // 非対応ブラウザではマイクボタンを表示しない（従来通りキーボード入力）
    return;
  }
  recognition = new SR();
  recognition.lang = 'ja-JP';
  recognition.interimResults = true;   // 話している途中も表示
  recognition.continuous = false;       // 一区切りで自動停止
  var baseText = '';                    // 録音開始時点の入力内容
  recognition.onresult = function(e){
    var finalText = '', interimText = '';
    for(var i=e.resultIndex; i<e.results.length; i++){
      var t = e.results[i][0].transcript;
      if(e.results[i].isFinal) finalText += t;
      else interimText += t;
    }
    inp.value = baseText + finalText + interimText;
    autoResize(inp);
    sendBtn.disabled = inp.value.trim() === '' || isStreaming;
  };
  recognition.onend = function(){
    isRecording = false;
    micBtn.classList.remove('recording');
    micBtn.title = '音声入力';
  };
  recognition.onerror = function(e){
    isRecording = false;
    micBtn.classList.remove('recording');
    if(e.error === 'not-allowed' || e.error === 'service-not-allowed'){
      showErr('マイクの使用が許可されていません。ブラウザの設定をご確認ください。');
    } else if(e.error === 'no-speech'){
      showToast('音声が聞き取れませんでした');
    }
  };
  // 録音開始時に現在の入力内容を記憶するため、startの直前で更新
  recognition._setBase = function(){ baseText = inp.value ? (inp.value + ' ') : ''; };
  // マイクボタンを表示
  micBtn.classList.remove('hidden');
})();

function toggleMic(){
  if(!recognition) return;
  if(isRecording){
    recognition.stop();
    return;
  }
  showErr('');
  recognition._setBase();
  try {
    recognition.start();
    isRecording = true;
    micBtn.classList.add('recording');
    micBtn.title = 'タップで停止';
  } catch(e){
    // 連続タップでstart重複した場合など
    isRecording = false;
    micBtn.classList.remove('recording');
  }
}

inp.addEventListener('input', function() {
  sendBtn.disabled = inp.value.trim() === '' || isStreaming;
});

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

function onKey(e) {
  // PCのみEnterで送信（Shift+Enterは改行）
  if (e.key === 'Enter' && !e.shiftKey && window.innerWidth >= 680) {
    e.preventDefault();
    if (!sendBtn.disabled) send();
  }
}

function scrollBottom() {
  window.scrollTo(0, document.documentElement.scrollHeight);
}

// ログイン者（genba_user）の苗字を返す。氏名の空白区切り先頭＝苗字。未ログイン時は「あ」
function userLabel() {
  try {
    var u = JSON.parse(localStorage.getItem('genba_user') || 'null');
    if (u) {
      var nm = String(u['氏名'] || u['略称'] || '').trim();
      if (nm) return nm.split(/[\s\u3000]+/)[0];
    }
  } catch (e) {}
  return 'あ';
}

function showToast(m) {
  var t = document.getElementById('toast');
  t.textContent = m;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function showErr(m) {
  var b = document.getElementById('errBar');
  if (m) { b.textContent = m; b.classList.add('show'); }
  else b.classList.remove('show');
}

function nowHM() {
  var d = new Date(), p = function(n) { return ('0' + n).slice(-2); };
  return p(d.getHours()) + ':' + p(d.getMinutes());
}

/* ========== チャット表示 ========== */
function addTimestamp() {
  var d = document.createElement('div');
  d.className = 'ts';
  d.textContent = nowHM();
  msgs.appendChild(d);
}

function addUserBubble(text) {
  document.getElementById('welcome').style.display = 'none';
  addTimestamp();
  var div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = '<div class="avatar user">' + esc(userLabel()) + '</div><div class="bubble">' + esc(text) + '</div>';
  msgs.appendChild(div);
  scrollBottom();
}

function addAiBubble() {
  var div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = '<div class="avatar ai">AI</div><div class="bubble streaming"></div>';
  msgs.appendChild(div);
  scrollBottom();
  // IDに頼らず、今作った吹き出し要素を直接返す（複数IDの衝突を防ぐ）
  return div.querySelector('.bubble');
}

function renderMarkdown(text) {
  // シンプルなMarkdown変換
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/```([\w]*)\n([\s\S]*?)```/g, function(_, lang, code) {
      return '<pre><code>' + code.trim() + '</code></pre>';
    })
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<h4>$1</h4>')
    .replace(/^## (.+)$/gm, '<h3>$1</h3>')
    .replace(/^---$/gm, '<hr>')
    .replace(/^[\-\*] (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
    .replace(/\n{2,}/g, '</p><p>')
    .replace(/\n/g, '<br>');
}

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

/* ========== 送信 ========== */
function sendSug(el) {
  inp.value = el.textContent;
  send();
}

function send() {
  var text = inp.value.trim();
  if (!text || isStreaming) return;
  inp.value = '';
  inp.style.height = 'auto';
  sendBtn.disabled = true;
  showErr('');

  chatLog.push({ role: 'user', content: text });
  addUserBubble(text);
  doStream();
}

/* ========== GAS経由でClaude APIを呼ぶ ========== */
function doStream() {
  isStreaming = true;
  var bubble = addAiBubble();
  var fullText = '';

  // GASにfetch（JSONPではなくfetch + no-cors回避のためGASをプロキシにする）
  var payload = {
    action: 'aiChat',
    messages: chatLog,
    system: SYSTEM_PROMPT
  };

  // fetchでGASのURLにPOSTするが、GASはno-corsになるため
  // URLパラメータにsecretとcallbackをつけてJSONP方式で呼ぶ
  var cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random() * 1e6);
  var sc = document.createElement('script');
  var timer = setTimeout(function() {
    cleanup('タイムアウト：GASの応答がありません');
  }, 45000);

  function cleanup(errMsg) {
    clearTimeout(timer);
    try { delete window[cb]; } catch (e) {}
    if (sc.parentNode) sc.parentNode.removeChild(sc);
    isStreaming = false;
    bubble.classList.remove('streaming');
    sendBtn.disabled = inp.value.trim() === '';
    if (errMsg) {
      bubble.innerHTML = '<span style="color:#dc2626">⚠ ' + esc(errMsg) + '</span>';
      showErr(errMsg);
    }
  }

  window[cb] = function(res) {
    if (!res || !res.ok) {
      cleanup((res && res.error) || '応答を取得できませんでした');
      return;
    }
    fullText = res.text || '';
    // Markdown変換して表示
    var html = renderMarkdown(fullText);
    // 出典リンクを追加（あれば）
    var sources = res.sources || [];
    if (sources.length) {
      html += '<details class="sources"><summary class="src-ttl">📎 出典 ' + sources.length + '件（タップで開く）</summary>';
      sources.forEach(function(s) {
        var t = esc(s.title || s.url);
        if (t.length > 40) t = t.slice(0, 40) + '…';
        html += '<a class="src-link" href="' + esc(s.url) + '" target="_blank" rel="noopener">🔗 ' + t + '</a>';
      });
      html += '</details>';
    }
    bubble.innerHTML = html;
    bubble.classList.remove('streaming');
    chatLog.push({ role: 'assistant', content: fullText });
    scrollBottom();
    isStreaming = false;
    sendBtn.disabled = inp.value.trim() === '';
    clearTimeout(timer);
    try { delete window[cb]; } catch (e) {}
    if (sc.parentNode) sc.parentNode.removeChild(sc);
  };

  sc.onerror = function() { cleanup('通信エラーが発生しました'); };

  // messagesのみ送る（systemはGAS側が保持。URL長を短く保つため）
  var q = 'action=aiChat'
    + '&secret=' + encodeURIComponent('kawaguchi-genba-2026')
    + '&messages=' + encodeURIComponent(JSON.stringify(chatLog))
    + '&callback=' + encodeURIComponent(cb);
  var fullUrl = API_URL + '?' + q;
  // URL長チェック（GASのJSONP上限対策）
  if(fullUrl.length > 7000) {
    cleanup('会話が長くなりすぎました。「クリア」を押して会話をリセットしてください。');
    return;
  }
  sc.src = fullUrl;
  document.head.appendChild(sc);
}

/* ========== クリア ========== */
function clearChat() {
  if (chatLog.length === 0) return;
  if (!confirm('会話履歴をリセットしますか？')) return;
  chatLog = [];
  msgs.innerHTML = '';
  // ウェルカム画面を再挿入
  var w = document.createElement('div');
  w.className = 'welcome';
  w.id = 'welcome';
  w.innerHTML = '<div class="wi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="8" width="14" height="11" rx="3"/><circle cx="9.5" cy="13" r="1.2"/><circle cx="14.5" cy="13" r="1.2"/><path d="M12 4.5V8M12 3.2v.1M8 19v2M16 19v2M3 12.5v3M21 12.5v3"/></svg></div><h2>何でも聞いてください</h2>'
    + '<p>調べ物はなんでもお答えします。</p>';
  msgs.appendChild(w);
  showErr('');
  showToast('会話をリセットしました');
}
</script>
</body>
</html>
