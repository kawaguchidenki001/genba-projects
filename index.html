<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>現場管理｜河口電機</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Zen+Kaku+Gothic+New:wght@500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;}
  body{min-height:100vh;color:#fff;font-family:"Zen Kaku Gothic New",sans-serif;font-size:15px;line-height:1.6;
    background:linear-gradient(150deg,#1f5f8b 0%,#2a7d9e 38%,#27a4a0 100%);background-attachment:fixed;}
  .wrap{max-width:680px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 32px) 16px 40px;}
  .head{margin:0 4px 20px;}
  .kicker{font-family:"Manrope",sans-serif;font-weight:700;letter-spacing:.26em;font-size:11px;color:rgba(255,255,255,.72);text-transform:uppercase;}
  .head h1{font-weight:700;font-size:31px;letter-spacing:.05em;margin-top:6px;text-shadow:0 2px 12px rgba(0,40,60,.25);}
  .head .co{color:rgba(255,255,255,.8);font-size:13px;margin-top:3px;}
  .lbl{font-family:"Manrope",sans-serif;font-weight:700;letter-spacing:.14em;font-size:11px;color:rgba(255,255,255,.75);text-transform:uppercase;margin:20px 4px 11px;}

  /* 共通タイル */
  a.sq{position:relative;display:flex;text-decoration:none;color:#fff;border:1px solid rgba(255,255,255,.28);
    -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);box-shadow:0 8px 24px rgba(10,40,55,.18);
    transition:transform .14s ease,filter .14s ease;}
  a.sq:hover{transform:translateY(-3px);filter:brightness(1.08);}
  .sq .ic{display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.3);flex:0 0 auto;}
  .sq .txt{display:flex;flex-direction:column;min-width:0;}
  .sq .en{font-family:"Manrope",sans-serif;text-transform:uppercase;letter-spacing:.16em;color:rgba(255,255,255,.68);}
  .sq .nm{font-weight:700;letter-spacing:.02em;}
  .sq .ds{color:rgba(255,255,255,.85);line-height:1.4;}
  .sq .cor{color:rgba(255,255,255,.92);}

  /* 色分け */
  .t-report{background:rgba(34,178,96,.36);border-color:rgba(150,240,185,.55);} .t-report .ic{background:#1f9d57;}
  .t-files{background:rgba(228,140,24,.36);border-color:rgba(255,205,130,.55);} .t-files .ic{background:#d97b12;}
  .t-proj{background:rgba(42,118,224,.40);border-color:rgba(155,198,255,.6);} .t-proj .ic{background:#1f6fd0;}
  .t-admin{background:rgba(74,92,120,.46);border-color:rgba(185,198,220,.5);} .t-admin .ic{background:#3f4d63;}
  .t-sched{background:rgba(106,79,179,.42);border-color:rgba(196,178,236,.55);} .t-sched .ic{background:#6a4fb3;}
  .t-time{background:rgba(14,116,144,.42);border-color:rgba(150,210,225,.55);} .t-time .ic{background:#0e7490;}

  /* ===== スマホ：横3列の正方形タイル（初期値）===== */
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
  a.sq{flex-direction:column;aspect-ratio:1/1;border-radius:18px;padding:12px;}
  .sq .ic{width:42px;height:42px;border-radius:12px;font-size:22px;}
  .sq .txt{margin-top:auto;}
  .sq .en{display:none;}
  .sq .nm{font-size:13.5px;}
  .sq .ds{display:none;}
  .sq .cor{position:absolute;top:10px;right:11px;font-size:15px;}
  .sq .cor.lock{font-size:12px;}

  /* 今後追加予定（チップ） */
  .soons{display:flex;flex-wrap:wrap;gap:8px;}
  .soon{font-size:12.5px;color:rgba(255,255,255,.85);background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:11px;padding:9px 13px;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);}

  /* ===== PC（横幅680px以上）：リスト型 ===== */
  @media (min-width:680px){
    .grid{grid-template-columns:1fr;gap:11px;}
    a.sq{flex-direction:row;align-items:center;aspect-ratio:auto;border-radius:18px;padding:16px 18px;gap:16px;}
    .sq .ic{width:50px;height:50px;border-radius:14px;font-size:25px;}
    .sq .txt{margin-top:0;}
    .sq .en{display:block;font-size:10px;}
    .sq .nm{font-size:17px;}
    .sq .ds{display:block;font-size:12.5px;}
    .sq .cor{position:static;margin-left:auto;font-size:20px;}
    .sq .cor.lock{font-size:12px;background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.34);padding:5px 11px;border-radius:999px;}
  }

  /* 先頭の案件管理（横長で目立たせる・スマホでも横並び）*/
  a.sq.feat{flex-direction:row;align-items:center;aspect-ratio:auto;border-radius:18px;padding:16px 18px;gap:16px;}
  a.sq.feat .ic{width:52px;height:52px;border-radius:14px;font-size:26px;}
  a.sq.feat .txt{margin-top:0;}
  a.sq.feat .en{display:block;font-size:10px;}
  a.sq.feat .nm{font-size:18px;}
  a.sq.feat .ds{display:block;font-size:12.5px;}
  a.sq.feat .cor{position:static;margin-left:auto;font-size:20px;}

  .foot{text-align:center;color:rgba(255,255,255,.78);font-size:12px;margin-top:24px;}
  .foot a{color:#fff;text-decoration:underline;}
  #login{position:fixed;inset:0;z-index:100;background:linear-gradient(150deg,#1f5f8b 0%,#2a7d9e 38%,#27a4a0 100%);display:flex;align-items:center;justify-content:center;padding:20px;}
  #login .box{width:100%;max-width:340px;text-align:center;color:#fff;}
  #login .lg-t{font-family:"Manrope",sans-serif;font-weight:700;letter-spacing:.22em;font-size:11px;opacity:.8;text-transform:uppercase;}
  #login h2{font-size:24px;margin:8px 0 2px;font-weight:700;}
  #login p{font-size:13px;color:rgba(255,255,255,.82);margin:0 0 22px;}
  #login input{width:100%;padding:14px;border:1px solid rgba(255,255,255,.3);border-radius:12px;font-size:16px;margin-bottom:10px;background:rgba(255,255,255,.95);color:#15233a;}
  #login button{width:100%;padding:14px;border:none;border-radius:12px;background:#fff;color:#1f5f8b;font-size:16px;font-weight:800;cursor:pointer;}
  #login .err{color:#ffdede;font-size:13px;min-height:18px;margin-top:10px;}
  .loading{position:fixed;inset:0;z-index:1000;background:rgba(240,242,245,.72);-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;}
  .loading.show{display:flex;}
  .lbox{background:#fff;border-radius:16px;box-shadow:0 10px 30px rgba(20,30,50,.18);padding:24px 32px;text-align:center;}
  .spin{width:38px;height:38px;border:4px solid #e1e5ea;border-top-color:#27a4a0;border-radius:50%;margin:0 auto 12px;animation:sp .8s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
  .lbox .txt{font-size:14px;font-weight:700;color:#15233a;}
</style>
</head>
<body>
<div id="login">
  <div class="box">
    <div class="lg-t">Genba Management</div>
    <h2>現場管理</h2>
    <p>IDとパスワードを入力してください</p>
    <input id="lgid" autocapitalize="off" autocomplete="username" placeholder="ID" onkeydown="if(event.key==='Enter')doLogin()">
    <input id="lgpw" type="password" autocomplete="current-password" placeholder="パスワード" onkeydown="if(event.key==='Enter')doLogin()">
    <button id="lgbtn" onclick="doLogin()">ログイン</button>
    <div class="err" id="lgerr"></div>
  </div>
</div>

<div class="wrap" style="display:none;">
  <div class="head">
    <div class="kicker">Genba Management</div>
    <h1>現場管理</h1>
    <div class="co">河口電機株式会社</div>
  </div>

  <div class="lbl">現場用</div>
  <div class="grid">
    <a class="sq t-report" href="./report/"><span class="ic">📝</span><span class="txt"><span class="en">Daily report</span><span class="nm">作業日報</span><span class="ds">現場ごとの作業・人工・時間を記録</span></span><span class="cor">→</span></a>
    <a class="sq t-sched" href="./calendar/"><span class="ic">🗓</span><span class="txt"><span class="en">Schedule</span><span class="nm">スケジュール</span><span class="ds">現場の予定をカレンダーで管理</span></span><span class="cor">→</span></a>
    <a class="sq t-time" href="./timecard/"><span class="ic">⏱</span><span class="txt"><span class="en">Timecard</span><span class="nm">タイムカード</span><span class="ds">出勤・退勤の打刻と勤怠集計</span></span><span class="cor">→</span></a>
  </div>

  <div class="grid" style="grid-template-columns:1fr;margin-top:16px;">
    <a class="sq t-proj feat" href="./projects/"><span class="ic">📋</span><span class="txt"><span class="en">Projects</span><span class="nm">案件管理</span><span class="ds">現場の一覧・詳細・写真・ファイルはこちら</span></span><span class="cor">→</span></a>
  </div>

  <div class="lbl">管理者用</div>
  <div class="grid">
    <a class="sq t-admin" href="./admin/"><span class="ic">⚙️</span><span class="txt"><span class="en">Admin</span><span class="nm">管理画面</span></span><span class="cor lock">🔒</span></a>
  </div>

  <div class="lbl">今後追加予定</div>
  <div class="soons"><span class="soon">📊 工事台帳・原価</span><span class="soon">👷 出面管理</span></div>

  <div class="foot"><span id="meName"></span> ・ <a href="#" onclick="logout();return false;">ログアウト</a><br>金額は管理者のみ表示 ・ <a href="https://kawaguchidenki001.github.io/checklist/">お仕事メニューへ</a></div>
</div>

<div class="loading" id="loading"><div class="lbox"><div class="spin"></div><div class="txt">読み込み中…</div></div></div>
<script>
var GAS_URL='https://script.google.com/macros/s/AKfycbyk8p6_gi6e3wdhQdWL0Oswz4BUtP3gR37PeFJJ9rO5mVhTRt4CikpQhK_bBwt1Ftr-/exec';
var T_GENERAL='kawaguchi-genba-2026';
function gUser(){try{return JSON.parse(localStorage.getItem('genba_user')||'null');}catch(e){return null;}}
function setErr(m){document.getElementById('lgerr').textContent=m||'';}
function showMenu(u){document.getElementById('login').style.display='none';document.querySelector('.wrap').style.display='block';
  document.getElementById('meName').textContent=u&&u['氏名']?u['氏名']+' さん':'';}
var loadCnt=0,loadShownAt=0;
function showLoad(){loadCnt++;if(loadCnt===1){loadShownAt=Date.now();document.getElementById('loading').classList.add('show');}}
function hideLoad(){loadCnt=Math.max(0,loadCnt-1);if(loadCnt===0){var w=Math.max(0,600-(Date.now()-loadShownAt));setTimeout(function(){if(loadCnt===0)document.getElementById('loading').classList.remove('show');},w);}}
function doLogin(){
  var id=document.getElementById('lgid').value.trim(),pw=document.getElementById('lgpw').value;
  if(!id){setErr('IDを入力してください');return;}
  setErr('');var btn=document.getElementById('lgbtn');btn.disabled=true;btn.textContent='確認中…';showLoad();
  var cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*1e6),s=document.createElement('script');
  var timer=setTimeout(function(){cleanup();setErr('通信できませんでした。電波を確認してください');},20000);
  function cleanup(){hideLoad();btn.disabled=false;btn.textContent='ログイン';try{delete window[cb];}catch(e){}if(s.parentNode)s.parentNode.removeChild(s);clearTimeout(timer);}
  window[cb]=function(res){cleanup();
    if(res&&res.ok&&res.worker){localStorage.setItem('genba_user',JSON.stringify(res.worker));showMenu(res.worker);}
    else setErr((res&&res.error)||'ログインできませんでした');};
  s.src=GAS_URL+'?action=login&secret='+encodeURIComponent(T_GENERAL)+'&id='+encodeURIComponent(id)+'&pw='+encodeURIComponent(pw)+'&callback='+cb;
  s.onerror=function(){cleanup();setErr('通信エラー');};document.head.appendChild(s);
}
function logout(){localStorage.removeItem('genba_user');location.reload();}
(function(){var u=gUser();if(u&&u['作業員ID'])showMenu(u);})();
</script>
</body>
</html>
