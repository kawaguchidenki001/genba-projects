<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>現場管理｜河口電機</title>
<style>
  :root{
    --bg:#f4f5f7; --card:#fff; --line:#e3e6ea; --ink:#1f2733; --sub:#6b7280;
    --head:#1f2a37;
    --blue:#0f5fb5; --green:#0f8a5f; --amber:#b4791a; --purple:#6d4bb0; --teal:#0d8a86;
    --radius:14px; --shadow:0 1px 3px rgba(20,30,50,.08),0 1px 2px rgba(20,30,50,.04);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic UI",sans-serif;
    font-size:15px;line-height:1.5;}
  header{background:var(--head);color:#fff;padding:calc(env(safe-area-inset-top) + 20px) 18px 20px;}
  header .ttl{font-size:21px;font-weight:700;letter-spacing:.04em;}
  header .sub{font-size:13px;color:#9fb0c2;margin-top:3px;}
  .wrap{max-width:620px;margin:0 auto;padding:16px 14px 32px;}
  .sec{font-size:12px;color:var(--sub);font-weight:700;margin:6px 4px 10px;letter-spacing:.05em;}
  a.tile{display:flex;align-items:center;gap:14px;text-decoration:none;color:var(--ink);
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:16px;margin-bottom:11px;border-left:6px solid var(--line);}
  a.tile:active{transform:scale(.995);}
  .ic{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex:0 0 auto;color:#fff;}
  .tile .nm{font-size:16.5px;font-weight:700;}
  .tile .ds{font-size:13px;color:var(--sub);margin-top:2px;}
  .tile .go{margin-left:auto;color:var(--sub);font-size:20px;}
  .t-blue{border-left-color:var(--blue);} .t-blue .ic{background:var(--blue);}
  .t-green{border-left-color:var(--green);} .t-green .ic{background:var(--green);}
  .soon{display:flex;align-items:center;gap:14px;background:#fbfbfc;border:1px dashed var(--line);
    border-radius:var(--radius);padding:14px 16px;margin-bottom:9px;color:var(--sub);}
  .soon .ic{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:21px;flex:0 0 auto;background:#e9ebee;color:#9aa1ab;}
  .soon .nm{font-size:15px;font-weight:600;color:#4b5563;}
  .soon .ds{font-size:12.5px;}
  .soon .tag{margin-left:auto;font-size:11px;font-weight:700;color:#9aa1ab;border:1px solid var(--line);border-radius:999px;padding:3px 9px;white-space:nowrap;}
  .foot{text-align:center;color:var(--sub);font-size:12px;margin-top:18px;}
  .foot a{color:var(--sub);}
</style>
</head>
<body>
<header>
  <div class="ttl">現場管理</div>
  <div class="sub">河口電機株式会社</div>
</header>

<div class="wrap">
  <div class="sec">メニュー</div>

  <a class="tile t-blue" href="./projects/">
    <span class="ic">📋</span>
    <span><span class="nm">案件管理</span><span class="ds">現場・顧客・工期・受注金額・ステータス</span></span>
    <span class="go">›</span>
  </a>

  <a class="tile t-green" href="./report/">
    <span class="ic">📝</span>
    <span><span class="nm">作業日報</span><span class="ds">現場ごとの作業・人工・時間を記録／集計</span></span>
    <span class="go">›</span>
  </a>

  <div class="sec" style="margin-top:18px;">今後追加予定</div>

  <div class="soon"><span class="ic">📊</span><span><span class="nm">工事台帳・原価</span><span class="ds">案件ごとの売上・原価・粗利</span></span><span class="tag">準備中</span></div>
  <div class="soon"><span class="ic">👷</span><span><span class="nm">出面管理</span><span class="ds">協力会社ごとの人工集計</span></span><span class="tag">準備中</span></div>
  <div class="soon"><span class="ic">🗓</span><span><span class="nm">スケジュール</span><span class="ds">Googleカレンダー連携</span></span><span class="tag">準備中</span></div>
  <div class="soon"><span class="ic">📁</span><span><span class="nm">写真・ファイル</span><span class="ds">案件ごとのドライブ保存</span></span><span class="tag">準備中</span></div>

  <div class="foot">河口電機 現場管理システム ・ <a href="https://kawaguchidenki001.github.io/checklist/">お仕事メニューへ</a></div>
</div>
</body>
</html>
