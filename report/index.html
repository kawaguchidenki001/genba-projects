<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>作業日報｜河口電機</title>
<style>
  :root{ --bg:#f4f5f7;--card:#fff;--line:#e3e6ea;--ink:#1f2733;--sub:#6b7280;--accent:#0f8a5f;--accent-d:#0b6e4b;
    --radius:12px;--shadow:0 1px 3px rgba(20,30,50,.08),0 1px 2px rgba(20,30,50,.04);}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic UI",sans-serif;font-size:15px;line-height:1.5;padding-bottom:80px;}
  header{position:sticky;top:0;z-index:20;background:var(--accent);color:#fff;padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;box-shadow:var(--shadow);}
  .hd-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .hd-row h1{font-size:17px;margin:0;font-weight:700;}
  .back{color:#d1fae5;text-decoration:none;font-size:13px;}
  .sync{font-size:12px;display:flex;align-items:center;gap:5px;color:#d1fae5;}
  .dot{width:8px;height:8px;border-radius:50%;background:#9ca3af;display:inline-block;}
  .dot.ok{background:#4ade80;}.dot.busy{background:#fde047;}.dot.off{background:#f87171;}
  .ghost{padding:6px 10px;border:1px solid rgba(255,255,255,.3);border-radius:9px;background:rgba(255,255,255,.15);color:#fff;font-size:13px;cursor:pointer;}
  .toolbar{padding:10px 12px;display:flex;flex-direction:column;gap:8px;position:sticky;top:54px;background:var(--bg);z-index:10;}
  .seg{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff;}
  .seg button{flex:1;padding:9px 6px;border:none;background:#fff;font-size:13px;cursor:pointer;color:var(--sub);}
  .seg button.on{background:var(--accent);color:#fff;}
  .chips{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .chip{flex:0 0 auto;padding:6px 12px;border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--sub);font-size:13px;cursor:pointer;white-space:nowrap;}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  select.f{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:10px;background:#fff;font-size:14px;font-family:inherit;}
  main{padding:4px 12px 12px;}
  .count{font-size:12px;color:var(--sub);margin:2px 2px 8px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:11px 13px;margin-bottom:9px;cursor:pointer;display:flex;flex-direction:column;gap:5px;border-left:5px solid var(--accent);}
  .card.kyo{border-left-color:#b45309;}
  .c-top{display:flex;justify-content:space-between;gap:8px;}
  .c-date{font-size:12px;color:var(--sub);font-variant-numeric:tabular-nums;}
  .c-proj{font-weight:700;font-size:15px;}
  .c-meta{font-size:13px;color:var(--sub);display:flex;flex-wrap:wrap;gap:3px 12px;}
  .pill{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;background:#eef1f5;color:#374151;white-space:nowrap;}
  .pill.kyo{background:#fef3c7;color:#92400e;}
  .desc{font-size:13.5px;}
  .empty{text-align:center;color:var(--sub);padding:38px 10px;font-size:14px;}
  .sumcard{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:12px 14px;margin-bottom:10px;}
  .sumcard h3{margin:0 0 8px;font-size:14px;color:var(--accent-d);}
  .srow{display:flex;justify-content:space-between;gap:8px;padding:7px 0;border-top:1px solid var(--line);font-size:14px;}
  .srow:first-of-type{border-top:none;}
  .srow .nm{flex:1;} .srow .nk{color:var(--sub);font-variant-numeric:tabular-nums;} .srow .ry{font-weight:700;font-variant-numeric:tabular-nums;}
  .fab{position:fixed;right:16px;bottom:calc(env(safe-area-inset-bottom) + 16px);z-index:30;background:var(--accent);color:#fff;border:none;border-radius:999px;padding:14px 20px;font-size:15px;font-weight:700;box-shadow:0 6px 16px rgba(15,138,95,.4);cursor:pointer;}
  .ov{position:fixed;inset:0;background:rgba(15,23,40,.45);z-index:40;display:none;align-items:flex-end;justify-content:center;}
  .ov.show{display:flex;}
  .sheet{background:#fff;width:100%;max-width:560px;max-height:92vh;overflow:auto;border-radius:16px 16px 0 0;padding:16px 16px calc(env(safe-area-inset-bottom) + 16px);}
  .sheet h2{font-size:16px;margin:2px 0 12px;}
  .fld{margin-bottom:11px;} .fld label{display:block;font-size:12.5px;color:var(--sub);margin-bottom:4px;font-weight:600;}
  .fld input,.fld select,.fld textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:15px;background:#fff;font-family:inherit;}
  .fld textarea{resize:vertical;min-height:50px;}
  .two{display:flex;gap:8px;} .two>.fld{flex:1;}
  .nks{display:flex;gap:6px;margin-top:6px;} .nks button{flex:1;padding:8px;border:1px solid var(--line);border-radius:9px;background:#f8fafc;font-size:14px;cursor:pointer;}
  .calc{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:9px 12px;font-size:14px;display:flex;justify-content:space-between;}
  .calc b{font-variant-numeric:tabular-nums;}
  .drvlink{display:inline-block;margin-top:2px;font-size:13px;color:var(--accent-d);}
  .wgroup{border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .wghd{display:flex;align-items:center;justify-content:space-between;padding:7px 11px;background:#f3f7f6;font-size:12.5px;font-weight:700;color:var(--accent-d);}
  .wghd a{font-size:12px;color:var(--accent-d);text-decoration:none;cursor:pointer;}
  .wlist{display:flex;flex-wrap:wrap;gap:6px;padding:8px 10px;}
  .wchk{display:flex;align-items:center;gap:6px;padding:7px 9px;border:1px solid var(--line);border-radius:9px;font-size:13px;cursor:pointer;flex:1 1 30%;min-width:calc(33% - 6px);background:#fbfdfc;}
  .wchk input{width:17px;height:17px;flex:0 0 auto;accent-color:var(--accent);}
  .wgroup .wempty{padding:9px 11px;border-top:1px solid var(--line);color:var(--sub);font-size:13px;}
  .acts{display:flex;gap:8px;margin-top:6px;} .btn{flex:1;padding:13px;border-radius:11px;border:none;font-size:15px;font-weight:700;cursor:pointer;}
  .btn.primary{background:var(--accent);color:#fff;} .btn.sub{background:#eef1f5;color:var(--ink);}
  .row-del{text-align:center;margin-top:10px;} .row-del a{color:#dc2626;font-size:13px;text-decoration:none;}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:90px;z-index:60;background:#1f2733;color:#fff;padding:10px 16px;border-radius:999px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;}
  .toast.show{opacity:1;}
  .loading{position:fixed;inset:0;z-index:1000;background:rgba(240,242,245,.72);-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;}
  .loading.show{display:flex;}
  .lbox{background:#fff;border-radius:16px;box-shadow:0 10px 30px rgba(20,30,50,.18);padding:24px 32px;text-align:center;}
  .spin{width:38px;height:38px;border:4px solid #e1e5ea;border-top-color:var(--accent);border-radius:50%;margin:0 auto 12px;animation:sp .8s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
  .lbox .txt{font-size:14px;font-weight:700;}
</style>
</head>
<body>
<header>
  <div class="hd-row">
    <a class="back" href="https://kawaguchidenki001.github.io/genba-projects/">← 現場管理メニュー</a>
    <span class="sync"><span id="dot" class="dot"></span><span id="syncTxt">読込中…</span></span>
  </div>
  <div class="hd-row" style="margin-top:6px;"><h1>作業日報</h1>
    <div style="display:flex;gap:6px;">
      <button class="ghost" id="admBtn" onclick="toggleAdmin()">🔑</button>
      <button class="ghost" onclick="reload()">↻</button>
    </div>
  </div>
</header>

<div class="toolbar">
  <div class="seg"><button id="vList" class="on" onclick="setView('list')">一覧</button><button id="vSum" onclick="setView('sum')">集計</button></div>
  <div class="chips" id="dateChips"></div>
  <select class="f" id="projFilter" onchange="render()"><option value="">すべての現場</option></select>
</div>

<main>
  <div class="count" id="count"></div>
  <div id="list"></div>
  <div id="sum" style="display:none;"></div>
</main>

<button class="fab" onclick="openReport()">＋ 日報</button>

<div class="ov" id="ov">
  <div class="sheet">
    <h2 id="mTitle">日報の入力</h2>
    <input type="hidden" id="f_id">
    <div class="two">
      <div class="fld"><label>日付 *</label><input id="f_date" type="date"></div>
      <div class="fld"><label>人工 *</label><input id="f_nk" type="number" step="0.25" inputmode="decimal" value="1" oninput="calc()">
        <div class="nks"><button type="button" onclick="setNk(0.5)">0.5</button><button type="button" onclick="setNk(1)">1.0</button><button type="button" onclick="setNk(1.5)">1.5</button></div></div>
    </div>
    <div class="fld"><label>会社名・自治体名 *</label><select id="f_customer" onchange="onCustomer()"></select></div>
    <div class="fld"><label>現場名 *</label><select id="f_proj" onchange="onProj()"></select>
      <a id="f_drive" class="drvlink" target="_blank" style="display:none;">📁 この現場のフォルダを開く</a></div>
    <div class="fld" id="wmFld"><label>作業員（複数選択できます）*</label>
      <div id="wmEmp" class="wgroup"></div>
      <div id="wmPart" class="wgroup" style="margin-top:8px;"></div>
    </div>
    <div class="fld" id="wsFld" style="display:none;"><label>作業員 *</label><select id="f_worker" onchange="calc()"></select></div>
    <div class="fld"><label>作業内容</label><textarea id="f_desc" placeholder="例）2階照明器具取付、配線"></textarea></div>
    <div class="two">
      <div class="fld"><label>開始</label><input id="f_start" type="time" oninput="calcHours()"></div>
      <div class="fld"><label>終了</label><input id="f_end" type="time" oninput="calcHours()"></div>
      <div class="fld"><label>時間(h)</label><input id="f_hours" type="number" step="0.5" inputmode="decimal" placeholder="任意"></div>
    </div>
    <div class="fld" id="moneyRow" style="display:none;"><label>労務費（管理者のみ）</label><div class="calc"><span id="f_laborNote">人工 × 単価（作業員マスタ）</span><b id="f_labor">¥0</b></div></div>
    <div class="fld"><label>備考</label><textarea id="f_note"></textarea></div>
    <div class="acts">
      <button class="btn sub" onclick="closeOv()">キャンセル</button>
      <button class="btn primary" id="saveBtn" onclick="saveReport()">保存</button>
    </div>
    <div class="row-del" id="delRow" style="display:none;"><a href="#" onclick="delReport(event)">この日報を削除</a></div>
  </div>
</div>

<div class="loading" id="loading"><div class="lbox"><div class="spin"></div><div class="txt">読み込み中…</div></div></div>
<div class="toast" id="toast"></div>

<script>
var GAS_URL='https://script.google.com/macros/s/AKfycbyk8p6_gi6e3wdhQdWL0Oswz4BUtP3gR37PeFJJ9rO5mVhTRt4CikpQhK_bBwt1Ftr-/exec';
var T_GENERAL='kawaguchi-genba-2026';
var ROLE='general';
var projects=[],workers=[],reports=[],dateFilter='month',view='list';
var CACHE='genba_reports_cache';

function admTok(){return localStorage.getItem('genba_admin')||'';}
function tok(){return admTok()||T_GENERAL;}
function isAdmin(){return ROLE==='admin';}

var loadCnt=0,loadShownAt=0;
function showLoad(){loadCnt++;if(loadCnt===1){loadShownAt=Date.now();document.getElementById('loading').classList.add('show');}}
function hideLoad(){loadCnt=Math.max(0,loadCnt-1);if(loadCnt===0){var w=Math.max(0,600-(Date.now()-loadShownAt));setTimeout(function(){if(loadCnt===0)document.getElementById('loading').classList.remove('show');},w);}}
function callGAS(params,secretOverride){
  return new Promise(function(resolve,reject){
    showLoad();
    var cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*1e6),s=document.createElement('script');
    var timer=setTimeout(function(){cleanup();reject(new Error('タイムアウト'));},20000);
    function cleanup(){hideLoad();try{delete window[cb];}catch(e){}if(s.parentNode)s.parentNode.removeChild(s);clearTimeout(timer);}
    window[cb]=function(res){cleanup();resolve(res);};
    var q=Object.assign({secret:secretOverride||tok(),callback:cb},params);
    if(q.data&&typeof q.data!=='string')q.data=JSON.stringify(q.data);
    s.src=GAS_URL+'?'+Object.keys(q).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(q[k]);}).join('&');
    s.onerror=function(){cleanup();reject(new Error('通信エラー'));};document.head.appendChild(s);
  });
}
function setSync(st,t){document.getElementById('dot').className='dot'+(st?' '+st:'');document.getElementById('syncTxt').textContent=t;}

/* 管理者ログイン（PINで金額が見える）*/
function toggleAdmin(){ if(admTok()){ if(confirm('管理者ログアウトしますか？')){localStorage.removeItem('genba_admin');location.reload();} return; }
  var pin=prompt('管理者PINを入力してください');if(!pin)return;
  callGAS({action:'checkRole'},pin).then(function(res){
    if(res&&res.ok&&res.role==='admin'){localStorage.setItem('genba_admin',pin);location.reload();}
    else toast('管理者PINが違います');
  }).catch(function(err){toast('通信エラー：'+err.message);});
}
function updateAdmBtn(){document.getElementById('admBtn').textContent=isAdmin()?'管理者':'🔑';}

function loadCache(){try{var c=JSON.parse(localStorage.getItem(CACHE)||'{}');projects=c.projects||[];workers=c.workers||[];reports=c.reports||[];}catch(e){}}
function saveCache(){try{localStorage.setItem(CACHE,JSON.stringify({projects:projects,workers:workers,reports:reports}));}catch(e){}}
function reload(){
  setSync('busy','同期中…');
  callGAS({action:'checkRole'}).then(function(r){ ROLE=(r&&r.ok)?r.role:'general'; if(admTok()&&ROLE!=='admin')localStorage.removeItem('genba_admin'); updateAdmBtn(); })
    .then(function(){return callGAS({action:'reportData'});})
    .then(function(res){ if(!res.ok)throw new Error(res.error||'エラー');
      projects=res.projects||[];workers=res.workers||[];reports=res.reports||[];saveCache();buildProjOptions();render();setSync('ok','同期済み'); })
    .catch(function(err){setSync('off','オフライン');render();toast('読込失敗：'+err.message);});
}

function buildDateChips(){var defs=[['today','今日'],['month','今月'],['all','すべて']],w=document.getElementById('dateChips');w.innerHTML='';
  defs.forEach(function(d){var c=document.createElement('div');c.className='chip'+(dateFilter===d[0]?' on':'');c.textContent=d[1];c.onclick=function(){dateFilter=d[0];buildDateChips();render();};w.appendChild(c);});}
function buildProjOptions(){var sel=document.getElementById('projFilter'),cur=sel.value;sel.innerHTML='<option value="">すべての現場</option>';
  projects.forEach(function(p){var o=document.createElement('option');o.value=p['案件ID'];o.textContent=p['案件名'];sel.appendChild(o);});sel.value=cur;}
function setView(v){view=v;document.getElementById('vList').className=v==='list'?'on':'';document.getElementById('vSum').className=v==='sum'?'on':'';
  document.getElementById('list').style.display=v==='list'?'block':'none';document.getElementById('sum').style.display=v==='sum'?'block':'none';render();}

function filtered(){var pf=document.getElementById('projFilter').value,now=new Date(),ym=now.toISOString().slice(0,7),today=now.toISOString().slice(0,10);
  return reports.filter(function(r){if(pf&&r['案件ID']!==pf)return false;var d=String(r['日付']||'').slice(0,10);
    if(dateFilter==='today'&&d!==today)return false;if(dateFilter==='month'&&d.slice(0,7)!==ym)return false;return true;})
    .sort(function(a,b){return String(b['日付']||'').localeCompare(String(a['日付']||''));});}

function render(){
  var list=filtered();document.getElementById('count').textContent=list.length+' 件';
  if(view==='sum'){renderSum(list);return;}
  var el=document.getElementById('list');
  if(!list.length){el.innerHTML='<div class="empty">この期間の日報はありません。<br>右下の「＋日報」から登録できます。</div>';return;}
  el.innerHTML='';
  list.forEach(function(r){
    var kyo=isKyo(r['区分']),div=document.createElement('div');div.className='card'+(kyo?' kyo':'');div.onclick=function(){openReport(r);};
    var who=esc(r['氏名']||'')+(r['所属']?'（'+esc(r['所属'])+'）':'');
    var money=(isAdmin()&&numv(r['労務費']))?'<span>💰 '+yen(r['労務費'])+'</span>':'';
    div.innerHTML='<div class="c-top"><span class="c-date">'+esc(String(r['日付']||'').slice(0,10))+'</span><span class="pill'+(kyo?' kyo':'')+'">人工 '+esc(r['人工']||'')+'</span></div>'+
      '<div class="c-proj">'+esc(r['案件名']||'(現場未設定)')+'</div>'+
      '<div class="c-meta"><span>👷 '+who+'</span>'+(r['作業時間']?'<span>⏱ '+esc(r['作業時間'])+'h</span>':'')+money+'</div>'+
      (r['作業内容']?'<div class="desc">'+esc(r['作業内容'])+'</div>':'');
    el.appendChild(div);
  });
}
function renderSum(list){
  var byProj={},byKyo={};
  list.forEach(function(r){var pid=r['案件ID']||'(未設定)',pn=r['案件名']||'(現場未設定)';
    if(!byProj[pid])byProj[pid]={name:pn,nk:0,ry:0};byProj[pid].nk+=numv(r['人工']);byProj[pid].ry+=numv(r['労務費']);
    if(isKyo(r['区分'])){var k=r['所属']||r['氏名']||'協力業者';if(!byKyo[k])byKyo[k]={nk:0};byKyo[k].nk+=numv(r['人工']);}});
  var el=document.getElementById('sum'),html='';
  var ps=Object.keys(byProj).sort(function(a,b){return byProj[b].nk-byProj[a].nk;});
  html+='<div class="sumcard"><h3>案件別'+(isAdmin()?' 人工・労務費':' 人工')+'</h3>';
  if(!ps.length)html+='<div class="empty" style="padding:14px;">データなし</div>';
  ps.forEach(function(k){var o=byProj[k];html+='<div class="srow"><span class="nm">'+esc(o.name)+'</span><span class="nk">'+round2(o.nk)+'人工</span>'+(isAdmin()?'<span class="ry">'+yen(o.ry)+'</span>':'')+'</div>';});
  html+='</div>';
  var ks=Object.keys(byKyo).sort(function(a,b){return byKyo[b].nk-byKyo[a].nk;});
  html+='<div class="sumcard"><h3>協力会社別 出面（人工）</h3>';
  if(!ks.length)html+='<div class="empty" style="padding:14px;">協力会社の日報はありません</div>';
  ks.forEach(function(k){html+='<div class="srow"><span class="nm">'+esc(k)+'</span><span class="ry">'+round2(byKyo[k].nk)+' 人工</span></div>';});
  html+='</div>';
  el.innerHTML=html;
}

var NOCUST='（未分類）';
function isKyo(k){return String(k||'').indexOf('協力')>=0;}
function custKey(p){var c=String(p['顧客']||'').trim();return c||NOCUST;}
function customerOfProj(pid){var p=projects.filter(function(x){return x['案件ID']===pid;})[0];return p?custKey(p):'';}
function buildCustomerOptions(){var sel=document.getElementById('f_customer'),seen={},list=[];
  projects.forEach(function(p){var c=custKey(p);if(!seen[c]){seen[c]=1;list.push(c);}});
  var cur=sel.value;sel.innerHTML='';
  list.forEach(function(c){var o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);});
  if(cur&&seen[cur])sel.value=cur;}
function projsForCustomer(c){return projects.filter(function(p){return custKey(p)===c;});}
function onCustomer(){var c=document.getElementById('f_customer').value;
  buildSelect('f_proj',projsForCustomer(c),'案件ID','案件名',false);onProj();}

function buildWorkerChecks(){var emp=[],part=[];
  workers.forEach(function(w){(isKyo(w['区分'])?part:emp).push(w);});
  renderWGroup('wmEmp','社員',emp);renderWGroup('wmPart','協力業者',part);}
function renderWGroup(boxId,title,arr){var box=document.getElementById(boxId);
  var h='<div class="wghd"><span>'+title+'（'+arr.length+'）</span>'+(arr.length?'<span><a onclick="toggleGroup(\''+boxId+'\',true)">全員</a> ／ <a onclick="toggleGroup(\''+boxId+'\',false)">解除</a></span>':'')+'</div>';
  if(!arr.length){h+='<div class="wempty">登録なし</div>';box.innerHTML=h;return;}
  h+='<div class="wlist">';
  arr.forEach(function(w){var nm=esc(w['氏名']||'')+(w['所属']?'（'+esc(w['所属'])+'）':'');
    h+='<label class="wchk"><input type="checkbox" class="wcb" value="'+esc(w['作業員ID'])+'" onchange="calc()"> '+nm+'</label>';});
  h+='</div>';
  box.innerHTML=h;}
function toggleGroup(boxId,on){var cbs=document.querySelectorAll('#'+boxId+' .wcb');for(var i=0;i<cbs.length;i++)cbs[i].checked=on;calc();}
function checkedWorkers(){var cbs=document.querySelectorAll('#wmFld .wcb:checked'),out=[];
  for(var i=0;i<cbs.length;i++){var id=cbs[i].value,w=workers.filter(function(x){return String(x['作業員ID'])===String(id);})[0];if(w)out.push(w);}
  return out;}

function openReport(r){
  if(!projects.length){toast('先に案件管理で現場を登録してください');return;}
  if(!workers.length){toast('作業員が未登録です。管理画面で登録してください');return;}
  var editing=!!r,g=function(id){return document.getElementById(id);};
  g('mTitle').textContent=editing?'日報の編集':'日報の入力（まとめて記入できます）';
  g('delRow').style.display=editing?'block':'none';
  g('moneyRow').style.display=isAdmin()?'block':'none';
  g('wmFld').style.display=editing?'none':'block';
  g('wsFld').style.display=editing?'block':'none';
  g('f_id').value=editing?(r['日報ID']||''):'';
  g('f_date').value=editing?String(r['日付']||'').slice(0,10):new Date().toISOString().slice(0,10);
  g('f_nk').value=editing?(r['人工']||'1'):'1';
  // 会社名・自治体名 → 現場名
  buildCustomerOptions();
  g('f_customer').value=editing?customerOfProj(r['案件ID']):g('f_customer').value;
  onCustomer();
  if(editing)g('f_proj').value=r['案件ID']||'';
  onProj();
  // 作業員（新規=複数チェック、編集=1人セレクト）
  if(editing){buildSelect('f_worker',workers,'作業員ID','氏名',true);g('f_worker').value=r['作業員ID']||'';}
  else{buildWorkerChecks();}
  g('f_desc').value=editing?(r['作業内容']||''):'';
  // 開始8:00／終了17:00 をデフォルト（新規時）
  g('f_start').value=editing?(r['開始']||''):'08:00';
  g('f_end').value=editing?(r['終了']||''):'17:00';
  g('f_hours').value=editing?(r['作業時間']||''):'';
  if(!editing)calcHours();
  g('f_note').value=editing?(r['備考']||''):'';
  calc();g('ov').classList.add('show');
}
function buildSelect(id,arr,vk,tk,withBelong){var s=document.getElementById(id);s.innerHTML='';arr.forEach(function(o){var op=document.createElement('option');op.value=o[vk];op.textContent=o[tk]+(withBelong&&o['所属']?'（'+o['所属']+'）':'');s.appendChild(op);});}
function onProj(){var pid=document.getElementById('f_proj').value,p=projects.filter(function(x){return x['案件ID']===pid;})[0],a=document.getElementById('f_drive');
  if(p&&p['Driveフォルダ']){a.href=p['Driveフォルダ'];a.style.display='inline-block';}else{a.style.display='none';}}
function setNk(v){document.getElementById('f_nk').value=v;calc();}
function calcHours(){var s=document.getElementById('f_start').value,e=document.getElementById('f_end').value;
  if(s&&e){var a=s.split(':'),b=e.split(':'),h=(b[0]*60+ +b[1]-(a[0]*60+ +a[1]))/60;if(h<0)h+=24;document.getElementById('f_hours').value=Math.round(h*4)/4;}}
function workerRate(id){var w=workers.filter(function(x){return x['作業員ID']===id;})[0];return w?numv(w['標準単価']):0;}
function calc(){ if(!isAdmin())return;
  var nk=numv(document.getElementById('f_nk').value);
  var multi=document.getElementById('wmFld').style.display!=='none';
  if(multi){var ws=checkedWorkers(),total=0;ws.forEach(function(w){total+=nk*numv(w['標準単価']);});
    document.getElementById('f_labor').textContent=yen(total)||'¥0';
    document.getElementById('f_laborNote').textContent=ws.length?('選択 '+ws.length+'名分の合計'):'（作業員を選択してください）';
  }else{var u=workerRate(document.getElementById('f_worker').value);
    document.getElementById('f_labor').textContent=yen(nk*u)||'¥0';
    document.getElementById('f_laborNote').textContent='人工 × 単価（作業員マスタ）';}}
function gatherCommon(){var g=function(id){return document.getElementById(id).value;};
  var pid=g('f_proj'),p=projects.filter(function(x){return x['案件ID']===pid;})[0]||{};
  return {'日付':g('f_date'),'案件ID':pid,'案件名':p['案件名']||'',
    '作業内容':document.getElementById('f_desc').value.trim(),'開始':g('f_start'),'終了':g('f_end'),
    '作業時間':g('f_hours'),'人工':g('f_nk'),'備考':document.getElementById('f_note').value.trim()};}
function saveReport(){
  var c=gatherCommon();
  if(!c['日付']){toast('日付を入れてください');return;}
  if(!c['案件ID']){toast('現場名を選んでください');return;}
  var editing=!!document.getElementById('f_id').value,btn=document.getElementById('saveBtn');
  if(editing){
    var id=document.getElementById('f_id').value;
    var wid=document.getElementById('f_worker').value,w=workers.filter(function(x){return x['作業員ID']===wid;})[0]||{};
    if(!wid){toast('作業員を選んでください');return;}
    var d={};for(var k in c)d[k]=c[k];d['日報ID']=id;d['作業員ID']=wid;d['氏名']=w['氏名']||'';d['区分']=w['区分']||'';d['所属']=w['所属']||'';
    btn.disabled=true;btn.textContent='保存中…';
    callGAS({action:'updateReport',id:id,data:d}).then(function(res){if(!res.ok)throw new Error(res.error||'保存失敗');
      for(var i=0;i<reports.length;i++){if(reports[i]['日報ID']===id){reports[i]=res.report;break;}}
      saveCache();render();closeOv();toast('更新しました');
    }).catch(function(err){toast('失敗：'+err.message);}).then(function(){btn.disabled=false;btn.textContent='保存';});
  }else{
    var ws=checkedWorkers();
    if(!ws.length){toast('作業員を選んでください（複数可）');return;}
    var data={};for(var k2 in c)data[k2]=c[k2];
    data['_workers']=ws.map(function(w){return {'作業員ID':w['作業員ID'],'氏名':w['氏名']||'','区分':w['区分']||'','所属':w['所属']||''};});
    btn.disabled=true;btn.textContent='保存中…';
    callGAS({action:'addReportMulti',data:data}).then(function(res){if(!res.ok)throw new Error(res.error||'保存失敗');
      (res.reports||[]).forEach(function(rp){reports.push(rp);});
      saveCache();render();closeOv();toast(ws.length+'名分を登録しました');
    }).catch(function(err){toast('失敗：'+err.message);}).then(function(){btn.disabled=false;btn.textContent='保存';});
  }}
function delReport(ev){ev.preventDefault();var id=document.getElementById('f_id').value;if(!id)return;
  if(!confirm('この日報を削除します。よろしいですか？'))return;
  callGAS({action:'deleteReport',id:id}).then(function(res){if(!res.ok)throw new Error(res.error||'削除失敗');
    reports=reports.filter(function(r){return r['日報ID']!==id;});saveCache();render();closeOv();toast('削除しました');
  }).catch(function(err){toast('失敗：'+err.message);});}
function closeOv(){document.getElementById('ov').classList.remove('show');}

function numv(v){var n=parseFloat(String(v).replace(/[^\d.-]/g,''));return isNaN(n)?0:n;}
function yen(v){var n=numv(v);return n?('¥'+Math.round(n).toLocaleString('ja-JP')):'';}
function round2(n){return Math.round(n*100)/100;}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
var toastT;function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('show');},2800);}
document.getElementById('ov').addEventListener('click',function(e){if(e.target===this)this.classList.remove('show');});
document.addEventListener('visibilitychange',function(){if(!document.hidden)reload();});

loadCache();buildDateChips();buildProjOptions();updateAdmBtn();render();reload();
</script>
</body>
