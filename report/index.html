function isAdmin(){return ROLE==='admin';}

var loadCnt=0,loadShownAt=0;
function showLoad(){loadCnt++;if(loadCnt===1){loadShownAt=Date.now();document.getElementById('loading').classList.add('show');}}
function hideLoad(){loadCnt=Math.max(0,loadCnt-1);if(loadCnt===0){var w=Math.max(0,600-(Date.now()-loadShownAt));setTimeout(function(){if(loadCnt===0)document.getElementById('loading').classList.remove('show');},w);}}
function callGAS(params,secretOverride,silent){
  return new Promise(function(resolve,reject){
    if(!silent) showLoad();
    var cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*1e6),s=document.createElement('script');
    var timer=setTimeout(function(){cleanup();reject(new Error('タイムアウト'));},20000);
    function cleanup(){if(!silent) hideLoad();try{delete window[cb];}catch(e){}if(s.parentNode)s.parentNode.removeChild(s);clearTimeout(timer);}
    window[cb]=function(res){cleanup();resolve(res);};
    var q=Object.assign({secret:secretOverride||tok(),callback:cb},params);
    if(q.data&&typeof q.data!=='string')q.data=JSON.stringify(q.data);
    s.src=GAS_URL+'?'+Object.keys(q).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(q[k]);}).join('&');
    s.onerror=function(){cleanup();reject(new Error('通信エラー'));};document.head.appendChild(s);
  });
}
function setSync(st,t){document.getElementById('dot').className='dot'+(st?' '+st:'');document.getElementById('syncTxt').textContent=t;}

/* 管理者ログイン（PINで金額が見える）*/
function toggleAdmin(){ if(admTok()){ if(confirm('管理者ログアウトしますか？')){localStorage.removeItem('genba_admin');location.reload();} return; }
  var pin=prompt('管理者PINを入力してください');if(!pin)return;
  callGAS({action:'checkRole'},pin).then(function(res){
    if(res&&res.ok&&res.role==='admin'){localStorage.setItem('genba_admin',pin);location.reload();}
    else toast('管理者PINが違います');
  }).catch(function(err){toast('通信エラー：'+err.message);});
}
function updateAdmBtn(){ /* 管理者ボタンは廃止済み */ }

function loadCache(){try{var c=JSON.parse(localStorage.getItem(CACHE)||'{}');projects=c.projects||[];workers=c.workers||[];reports=c.reports||[];}catch(e){}}
function saveCache(){try{localStorage.setItem(CACHE,JSON.stringify({projects:projects,workers:workers,reports:reports}));}catch(e){}}
function reload(silent){
  setSync('busy','同期中…');
  callGAS({action:'checkRole'},null,silent).then(function(r){ ROLE=(r&&r.ok)?r.role:'general'; if(admTok()&&ROLE!=='admin')localStorage.removeItem('genba_admin'); updateAdmBtn(); })
    .then(function(){return callGAS({action:'reportData'},null,silent);})
    .then(function(res){ if(!res.ok)throw new Error(res.error||'エラー');
      projects=res.projects||[];workers=res.workers||[];reports=res.reports||[];saveCache();buildProjOptions();render();setSync('ok','同期済み'); })
    .catch(function(err){setSync('off','オフライン'); if(!silent){render();toast('読込失敗：'+err.message);} });
}

function buildDateChips(){var defs=[['today','今日'],['month','今月'],['all','すべて']],w=document.getElementById('dateChips');w.innerHTML='';
  defs.forEach(function(d){var c=document.createElement('div');c.className='chip'+(dateFilter===d[0]?' on':'');c.textContent=d[1];c.onclick=function(){dateFilter=d[0];buildDateChips();render();};w.appendChild(c);});}
function buildProjOptions(){var sel=document.getElementById('projFilter'),cur=sel.value;sel.innerHTML='<option value="">すべての現場</option>';
  projects.forEach(function(p){var o=document.createElement('option');o.value=p['案件ID'];o.textContent=p['案件名'];sel.appendChild(o);});sel.value=cur;}
function setView(v){view=v;document.getElementById('vList').className=v==='list'?'on':'';document.getElementById('vSum').className=v==='sum'?'on':'';
  document.getElementById('list').style.display=v==='list'?'block':'none';document.getElementById('sum').style.display=v==='sum'?'block':'none';render();}

function filtered(){var pf=document.getElementById('projFilter').value,now=new Date(),ym=now.toISOString().slice(0,7),today=now.toISOString().slice(0,10);
  return reports.filter(function(r){if(pf&&r['案件ID']!==pf)return false;var d=String(r['日付']||'').slice(0,10);
    if(dateFilter==='today'&&d!==today)return false;if(dateFilter==='month'&&d.slice(0,7)!==ym)return false;return true;})
    .sort(function(a,b){return String(b['日付']||'').localeCompare(String(a['日付']||''));});}

function projFull(pid,nm){var p=projects.filter(function(x){return String(x['案件ID'])===String(pid);})[0];return (p&&p['案件名'])?p['案件名']:(nm||'(現場未設定)');}
function workerShort(r){var w=workers.filter(function(x){return String(x['作業員ID'])===String(r['作業員ID']);})[0];if(w&&w['略称'])return w['略称'];return r['氏名']||(w&&w['氏名'])||'';}
var detailCtx=null;
function dvRow(l,v){return '<div class="dvrow"><div class="dvl">'+esc(l)+'</div><div class="dvv">'+esc(v)+'</div></div>';}
function showDetail(pid,date){
  var grp=reports.filter(function(r){return String(r['案件ID']||'__none__')===String(pid)&&String(r['日付']||'').slice(0,10)===date;});
  if(!grp.length)return;
  detailCtx={pid:pid,date:date};
  var rpid=(pid==='__none__'?'':pid);
  var emp=grp.filter(function(r){return !isKyo(r['区分']);}),part=grp.filter(function(r){return isKyo(r['区分']);});
  var nk=0;grp.forEach(function(r){nk+=numv(r['人工']);});
  var desc='',note='';grp.forEach(function(r){if(!desc&&r['作業内容'])desc=r['作業内容'];if(!note&&r['備考'])note=r['備考'];});
  var h='';
  h+=dvRow('日付',date);
  h+=dvRow('発注者区分',kindOfProj(rpid)||'－');
  h+=dvRow('顧客名',customerOfProj(rpid)||'－');
  h+=dvRow('現場名',projFull(rpid,grp[0]['案件名']));
  h+=dvRow('社員',emp.map(workerShort).join('、')||'－');
  h+=dvRow('協力業者',part.map(workerShort).join('、')||'－');
  var ynkSum=0;grp.forEach(function(r){ynkSum+=numv(r['深夜人工']);});
  var t0=grp[0]||{};
  if(t0['開始']||t0['終了'])h+=dvRow('時間',String(t0['開始']||'').slice(0,5)+' 〜 '+(String(t0['翌日'])==='1'?'翌':'')+String(t0['終了']||'').slice(0,5)+(t0['休憩分']!==''&&t0['休憩分']!=null?'（休憩 '+t0['休憩分']+'分）':''));
  h+=dvRow('人工（合計）',round2(nk)+' 人工'+(ynkSum>0?'　＋　深夜 '+round2(ynkSum)+' 人工':'')+'（'+grp.length+'名分）');
  h+=dvRow('作業内容',desc||'－');
  h+=dvRow('備考',note||'－');
  document.getElementById('dvBody').innerHTML=h;
  document.getElementById('dov').classList.add('show');
}
function closeDetail(){document.getElementById('dov').classList.remove('show');}
function editFromDetail(){if(!detailCtx)return;closeDetail();openForm(detailCtx.pid,detailCtx.date);}

/* ===== 出力（Excel CSV / PDF印刷） ===== */
function csvq(v){v=String(v==null?'':v);return '"'+v.replace(/"/g,'""')+'"';}
function exportExcel(){
  var list=filtered();
  if(!list.length){toast('出力するデータがありません');return;}
  var sorted=list.slice().sort(function(a,b){return String(a['日付']||'').localeCompare(String(b['日付']||''));});
  var head=['日付','発注者区分','顧客名','現場名','氏名','区分','所属','開始','終了','翌日','休憩分','人工','深夜人工','作業内容','備考'];
  var lines=[head.map(csvq).join(',')];
  sorted.forEach(function(r){var pid=r['案件ID']||'';
    lines.push([String(r['日付']||'').slice(0,10),kindOfProj(pid),customerOfProj(pid),projFull(pid,r['案件名']),r['氏名']||'',r['区分']||'',r['所属']||'',String(r['開始']||'').slice(0,5),String(r['終了']||'').slice(0,5),String(r['翌日'])==='1'?'翌日':'',r['休憩分']||'',r['人工']||'',r['深夜人工']||'',r['作業内容']||'',r['備考']||''].map(csvq).join(','));});
  var blob=new Blob(['\ufeff'+lines.join('\r\n')],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='作業日報_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(a.href);},200);
  toast('Excel用ファイル（CSV）を保存しました');
}
function exportPDF(){
  var list=filtered();
  if(!list.length){toast('出力するデータがありません');return;}
  var sorted=list.slice().sort(function(a,b){return String(a['日付']||'').localeCompare(String(b['日付']||''));});
  var pf=document.getElementById('projFilter');
  var pname=pf.value?pf.options[pf.selectedIndex].textContent:'すべての現場';
  var ds=sorted.map(function(r){return String(r['日付']||'').slice(0,10);});
  var total=0;sorted.forEach(function(r){total+=numv(r['人工']);});
  var h='<h1>作業日報</h1><div class="pmeta">期間：'+esc(ds[0])+' 〜 '+esc(ds[ds.length-1])+'　／　現場：'+esc(pname)+'　／　合計 '+round2(total)+' 人工</div>';
  h+='<table><thead><tr><th>日付</th><th>現場名</th><th>氏名</th><th>区分</th><th>時間</th><th>人工</th><th>深夜</th><th>作業内容</th></tr></thead><tbody>';
  sorted.forEach(function(r){var pid=r['案件ID']||'';
    var tm=(r['開始']?String(r['開始']).slice(0,5)+'〜'+(String(r['翌日'])==='1'?'翌':'')+String(r['終了']||'').slice(0,5):'');
    h+='<tr><td>'+esc(String(r['日付']||'').slice(0,10))+'</td><td>'+esc(projFull(pid,r['案件名']))+'</td><td>'+esc(r['氏名']||'')+'</td><td>'+esc(r['区分']||'')+'</td><td>'+esc(tm)+'</td><td class="r">'+esc(String(r['人工']||''))+'</td><td class="r">'+esc(String(r['深夜人工']||''))+'</td><td>'+esc(r['作業内容']||'')+'</td></tr>';});
  h+='</tbody></table><div class="pfoot">河口電機株式会社　出力日：'+new Date().toLocaleDateString('ja-JP')+'</div>';
  document.getElementById('printArea').innerHTML=h;
  window.print();
}
function render(){
  var list=filtered();document.getElementById('count').textContent=list.length+' 件';
  if(view==='sum'){renderSum(list);return;}
  var el=document.getElementById('list');
  if(!list.length){el.innerHTML='<div class="empty">この期間の日報はありません。<br>右下の「＋日報」から登録できます。</div>';return;}
  var gmap={},order=[];
  list.forEach(function(r){
    var d=String(r['日付']||'').slice(0,10),pid=r['案件ID']||'__none__';
    var key=d+'|'+pid;
    if(!gmap[key]){gmap[key]={date:d,pid:pid,name:projFull(pid==='__none__'?'':pid,r['案件名']),emp:[],part:[],nk:0,desc:''};order.push(key);}
    var g=gmap[key];g.nk+=numv(r['人工']);g.ynk=(g.ynk||0)+numv(r['深夜人工']);if(!g.desc&&r['作業内容'])g.desc=String(r['作業内容']);
    if(isKyo(r['区分']))g.part.push(workerShort(r));else g.emp.push(workerShort(r));
  });
  order.sort(function(a,b){var A=gmap[a],B=gmap[b];return B.date.localeCompare(A.date)||A.name.localeCompare(B.name);});
  var h='<div class="lhead"><span>日付</span><span>現場名</span><span>社員</span><span>協力業者</span><span>作業内容</span><span class="r">人工</span><span></span></div>';
  order.forEach(function(k){var g=gmap[k];
    h+='<div class="lrow" data-pid="'+esc(g.pid)+'" data-date="'+esc(g.date)+'">'+
      '<span class="lr-date">'+esc(g.date.slice(5).replace('-','/'))+'</span>'+
      '<span class="lr-site">'+esc(g.name)+'</span>'+
      '<span class="lr-emp">'+esc(g.emp.join('、')||'－')+'</span>'+
      '<span class="lr-part">'+esc(g.part.join('、')||'－')+'</span>'+
      '<span class="lr-desc">'+esc(g.desc||'－')+'</span>'+
      '<span class="lr-nk">'+round2(g.nk)+(g.ynk>0?'<span class="lr-ynk">夜'+round2(g.ynk)+'</span>':'')+'</span>'+
      '<span class="lr-del" data-pid="'+esc(g.pid)+'" data-date="'+esc(g.date)+'" title="削除">×</span></div>';
  });
  el.innerHTML=h;
  var rows=el.querySelectorAll('.lrow');
  for(var i=0;i<rows.length;i++){(function(x){x.onclick=function(ev){
    if(ev.target.classList.contains('lr-del')){ev.stopPropagation();delRow(ev.target.getAttribute('data-pid'),ev.target.getAttribute('data-date'));return;}
    showDetail(x.getAttribute('data-pid'),x.getAttribute('data-date'));};})(rows[i]);}
}
function delRow(pid,date){
  var grp=reports.filter(function(r){return String(r['案件ID']||'__none__')===String(pid)&&String(r['日付']||'').slice(0,10)===date;});
  if(!grp.length)return;
  var nm=projFull(pid==='__none__'?'':pid,grp[0]['案件名']);
  if(!confirm(date+'\n「'+nm+'」の日報（'+grp.length+'名分）を削除します。\nよろしいですか？'))return;
  Promise.all(grp.map(function(r){return callGAS({action:'deleteReport',id:r['日報ID']});}))
    .then(function(){toast('削除しました');reload();})
    .catch(function(){toast('削除に失敗しました');});
}
var editGroup=null;
function delGroupForm(ev){ if(ev)ev.preventDefault(); if(!editGroup)return;
  var pid=editGroup.pid,date=editGroup.date;
  var existing=reports.filter(function(r){return String(r['案件ID']||'__none__')===String(pid)&&String(r['日付']||'').slice(0,10)===date;});
  if(!existing.length){closeOv();return;}
  if(!confirm('この日報（現場ごと・'+existing.length+'名分）を削除します。よろしいですか？'))return;
  Promise.all(existing.map(function(r){return callGAS({action:'deleteReport',id:r['日報ID']});}))
    .then(function(){closeOv();toast('削除しました');reload();}).catch(function(err){toast('削除に失敗しました：'+(err&&err.message||''));});
}
function renderSum(list){
  var byProj={},byKyo={};
  list.forEach(function(r){var pid=r['案件ID']||'(未設定)',pn=r['案件名']||'(現場未設定)';
    if(!byProj[pid])byProj[pid]={name:pn,nk:0,ynk:0};byProj[pid].nk+=numv(r['人工']);byProj[pid].ynk+=numv(r['深夜人工']);
    if(isKyo(r['区分'])){var k=r['所属']||r['氏名']||'協力業者';if(!byKyo[k])byKyo[k]={nk:0};byKyo[k].nk+=numv(r['人工']);}});
  var el=document.getElementById('sum'),html='';
  var ps=Object.keys(byProj).sort(function(a,b){return byProj[b].nk-byProj[a].nk;});
  html+='<div class="sumcard"><h3>案件別 人工</h3>';
  if(!ps.length)html+='<div class="empty" style="padding:14px;">データなし</div>';
  ps.forEach(function(k){var o=byProj[k];html+='<div class="srow"><span class="nm">'+esc(o.name)+'</span><span class="ry">'+round2(o.nk)+' 人工'+(o.ynk>0?'（深夜 '+round2(o.ynk)+'）':'')+'</span></div>';});
  html+='</div>';
  var ks=Object.keys(byKyo).sort(function(a,b){return byKyo[b].nk-byKyo[a].nk;});
  html+='<div class="sumcard"><h3>協力会社別 出面（人工）</h3>';
  if(!ks.length)html+='<div class="empty" style="padding:14px;">協力会社の日報はありません</div>';
  ks.forEach(function(k){html+='<div class="srow"><span class="nm">'+esc(k)+'</span><span class="ry">'+round2(byKyo[k].nk)+' 人工</span></div>';});
  html+='</div>';
  el.innerHTML=html;
}

var NOCUST='（未分類）';
var KINDS=['官公庁','法人','個人'];
function kindKey(p){var k=String(p['種別']||'').trim();return k||'未分類';}
function buildKindOptions(){var sel=document.getElementById('f_kind');if(!sel)return;
  var list=KINDS.slice();
  projects.forEach(function(p){var k=kindKey(p);if(list.indexOf(k)<0)list.push(k);});
  var cur=sel.value;sel.innerHTML='<option value="">（すべて）</option>';
  list.forEach(function(k){var o=document.createElement('option');o.value=k;o.textContent=k;sel.appendChild(o);});
  if(cur&&list.indexOf(cur)>=0)sel.value=cur;}
function kindOfProj(pid){var p=projects.filter(function(x){return x['案件ID']===pid;})[0];return p?kindKey(p):'';}
function onKind(){buildCustomerOptions();onCustomer();}
function isKyo(k){return String(k||'').indexOf('協力')>=0;}
function custKey(p){var c=String(p['顧客']||'').trim();return c||NOCUST;}
function customerOfProj(pid){var p=projects.filter(function(x){return x['案件ID']===pid;})[0];return p?custKey(p):'';}
function buildCustomerOptions(){var sel=document.getElementById('f_customer'),seen={},list=[];
  var kEl=document.getElementById('f_kind'),kv=kEl?kEl.value:'';
  projects.forEach(function(p){if(kv&&kindKey(p)!==kv)return;var c=custKey(p);if(!seen[c]){seen[c]=1;list.push(c);}});
  var cur=sel.value;sel.innerHTML='';
  list.forEach(function(c){var o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);});
  if(cur&&seen[cur])sel.value=cur;}
function projsForCustomer(c){var kEl=document.getElementById('f_kind'),kv=kEl?kEl.value:'';return projects.filter(function(p){if(kv&&kindKey(p)!==kv)return false;return custKey(p)===c;});}
function onCustomer(){var c=document.getElementById('f_customer').value;
  buildSelect('f_proj',projsForCustomer(c),'案件ID','案件名',false);onProj();}

function buildWorkerChecks(){var emp=[],part=[],seen={};
  workers.forEach(function(w){var k=String(w['作業員ID']);if(!k||seen[k])return;seen[k]=1;(isKyo(w['区分'])?part:emp).push(w);});
  renderWGroup('wmEmp','社員',emp);renderWGroup('wmPart','協力業者',part);}
function renderWGroup(boxId,title,arr){var box=document.getElementById(boxId);
  var isEmp=boxId==='wmEmp';
  var h='<div class="wghd"><span>'+title+'（'+arr.length+'）</span>'+(arr.length?'<span><a onclick="toggleGroup(\''+boxId+'\',true)">全員</a> ／ <a onclick="toggleGroup(\''+boxId+'\',false)">解除</a></span>':'')+'</div>';
  if(!arr.length){h+='<div class="wempty">登録なし</div>';box.innerHTML=h;return;}
  if(isEmp){
    h+='<div class="wlist-emp">';
    arr.forEach(function(w){
      h+='<label class="wchk"><input type="checkbox" class="wcb" value="'+esc(w['作業員ID'])+'" onchange="updateNkDisp()"> '+esc(w['氏名']||'')+'</label>';});
  }else{
    h+='<div class="wlist-part">';
    arr.forEach(function(w){
      h+='<label class="wchk-part"><div class="pname"><input type="checkbox" class="wcb" value="'+esc(w['作業員ID'])+'" onchange="updateNkDisp()">'+esc(w['氏名']||'')+'</div>'+(w['所属']?'<span class="pbiz">'+esc(w['所属'])+'</span>':'')+'</label>';});
  }
  h+='</div>';
  box.innerHTML=h;}
function toggleGroup(boxId,on){var cbs=document.querySelectorAll('#'+boxId+' .wcb');for(var i=0;i<cbs.length;i++)cbs[i].checked=on;updateNkDisp();}
function checkedWorkers(){var cbs=document.querySelectorAll('#wmFld .wcb:checked'),out=[];
  for(var i=0;i<cbs.length;i++){var id=cbs[i].value,w=workers.filter(function(x){return String(x['作業員ID'])===String(id);})[0];if(w)out.push(w);}
  return out;}

function openForm(pid,date){   // pid・date 指定で編集、未指定で新規
  if(!projects.length){toast('先に案件管理で現場を登録してください');return;}
  if(!workers.length){toast('作業員が未登録です。管理画面で登録してください');return;}
  var g=function(id){return document.getElementById(id);};
  var editing=!!(pid!=null&&date);
  var grp=editing?reports.filter(function(r){return String(r['案件ID']||'__none__')===String(pid)&&String(r['日付']||'').slice(0,10)===date;}):[];
  editGroup=editing?{pid:pid,date:date}:null;
  g('mTitle').textContent=editing?'この日報を編集（現場ごと）':'日報の入力（まとめて記入できます）';
  g('grpDelRow').style.display=(editing&&grp.length)?'block':'none';
  g('f_date').value=editing?date:new Date().toISOString().slice(0,10);
  var g0=grp[0]||{};
  g('f_st').value=(editing&&g0['開始'])?String(g0['開始']).slice(0,5):'08:00';
  g('f_et').value=(editing&&g0['終了'])?String(g0['終了']).slice(0,5):'17:00';
  var brMin=(editing&&g0['休憩分']!==''&&g0['休憩分']!=null)?(parseInt(g0['休憩分'],10)||0):60;
  g('f_break').value=('0'+Math.floor(brMin/60)).slice(-2)+':'+('0'+(brMin%60)).slice(-2);
  nextDay=!!(editing&&String(g0['翌日'])==='1');
  document.getElementById('ndChk').checked=nextDay;
  document.getElementById('nextDayBtn').classList.toggle('on',nextDay);
  timeCalc();
  buildKindOptions();
  if(editing){var ek=kindOfProj(pid==='__none__'?'':pid);if(ek)g('f_kind').value=ek;}
  buildCustomerOptions();
  g('f_customer').value=editing?customerOfProj(pid==='__none__'?'':pid):g('f_customer').value;
  onCustomer();
  if(editing)g('f_proj').value=(pid==='__none__'?'':pid)||'';
  onProj();
  buildWorkerChecks();
  if(editing){var ids={};grp.forEach(function(r){ids[String(r['作業員ID'])]=1;});
    var cbs=document.querySelectorAll('#wmFld .wcb');for(var i=0;i<cbs.length;i++){if(ids[String(cbs[i].value)])cbs[i].checked=true;}}
  var desc='',note='';grp.forEach(function(r){if(!desc&&r['作業内容'])desc=r['作業内容'];if(!note&&r['備考'])note=r['備考'];});
  g('f_desc').value=editing?desc:'';
  g('f_note').value=editing?note:'';
  calc();g('ov').classList.add('show');
}
function buildSelect(id,arr,vk,tk,withBelong){var s=document.getElementById(id);s.innerHTML='';arr.forEach(function(o){var op=document.createElement('option');op.value=o[vk];op.textContent=o[tk]+(withBelong&&o['所属']?'（'+o['所属']+'）':'');s.appendChild(op);});}
function onProj(){var pid=document.getElementById('f_proj').value,p=projects.filter(function(x){return x['案件ID']===pid;})[0],a=document.getElementById('f_drive');
  if(p&&p['Driveフォルダ']){a.href=p['Driveフォルダ'];a.style.display='inline-block';}else{a.style.display='none';}}
var nextDay=false;
function toggleNextDay(){nextDay=document.getElementById('ndChk').checked;
  document.getElementById('nextDayBtn').classList.toggle('on',nextDay);timeCalc();}
function toMin(t){var m=/^(\d{1,2}):(\d{2})/.exec(String(t||''));return m?(+m[1])*60+(+m[2]):null;}
function fmtHM(min){var h=Math.floor(min/60),m=min%60;return h+'時間'+('0'+m).slice(-2)+'分';}
function timeCalc(){
  var st=toMin(document.getElementById('f_st').value),et=toMin(document.getElementById('f_et').value);
  var br=toMin(document.getElementById('f_break').value)||0;
  var disp=document.getElementById('f_nkDisp');
  if(st==null||et==null){disp.textContent='開始・終了時間を入力してください';return;}
  var end=et+(nextDay?1440:0);
  if(end<=st){disp.textContent='⚠ 終了が開始より前です（日をまたぐ場合は「翌日」を押してください）';
    document.getElementById('f_nk').value='';document.getElementById('f_ynk').value='0';return;}
  var total=end-st;
  // 深夜帯：22:00〜翌5:00（0:00-5:00 / 22:00-29:00 / 46:00-53:00 の各窓）
  var wins=[[0,300],[1320,1740],[2760,3180]],night=0;
  wins.forEach(function(w){night+=Math.max(0,Math.min(end,w[1])-Math.max(st,w[0]));});
  var day=total-night;
  // 休憩は通常帯から先に控除、超過分は深夜帯から控除
  var dayW=Math.max(0,day-br),rem=Math.max(0,br-day),nightW=Math.max(0,night-rem);
  var nk=Math.round(dayW/480*100)/100,ynk=Math.round(nightW/480*100)/100;
  document.getElementById('f_nk').value=nk;
  document.getElementById('f_ynk').value=ynk;
  disp.innerHTML='<span>実働 '+fmtHM(dayW+nightW)+'</span><b>'+nk+' 人工'+(ynk>0?'　＋　深夜 '+ynk+' 人工':'')+'</b>';
  updateNkDisp();
}
function workerRate(id){var w=workers.filter(function(x){return x['作業員ID']===id;})[0];return w?numv(w['標準単価']):0;}
function calc(){ updateNkDisp(); }
function updateNkDisp(){
  var nk=parseFloat(document.getElementById('f_nk').value)||0;
  var ynk=parseFloat(document.getElementById('f_ynk').value)||0;
  var cnt=document.querySelectorAll('#wmFld .wcb:checked').length;
  var disp=document.getElementById('f_nkDisp');
  if(!disp)return;
  if(!nk&&!ynk){return;} // 時間未入力時はtimeCalcの表示を維持
  var total=Math.round(nk*cnt*100)/100,ytotal=Math.round(ynk*cnt*100)/100;
  var base='<b>'+nk+' 人工'+(ynk>0?'＋深夜'+ynk:'')+'</b>';
  if(cnt>1) base+=' × '+cnt+'名 ＝ <b>計 '+total+'人工'+(ytotal>0?'＋深夜'+ytotal:'')+'</b>';
  disp.innerHTML=base;
}
function gatherCommon(){var g=function(id){return document.getElementById(id).value;};
  var pid=g('f_proj'),p=projects.filter(function(x){return x['案件ID']===pid;})[0]||{};
  var st=g('f_st'),et=g('f_et'),br=toMin(g('f_break'))||0;
  var stM=toMin(st)||0,etM=(toMin(et)||0)+(nextDay?1440:0);
  return {'日付':g('f_date'),'案件ID':pid,'案件名':p['案件名']||'',
    '作業内容':document.getElementById('f_desc').value.trim(),'人工':g('f_nk'),
    '開始':st,'終了':et,'翌日':nextDay?'1':'','休憩分':String(br),
    '作業時間':String(Math.max(0,etM-stM-br)),'深夜人工':g('f_ynk'),
    '備考':document.getElementById('f_note').value.trim()};}
function saveReport(){
  var c=gatherCommon();
  if(!c['日付']){toast('日付を入れてください');return;}
  if(!c['案件ID']){toast('現場名を選んでください');return;}
  var ws=checkedWorkers();
  if(!ws.length){toast('作業員を選んでください（複数可）');return;}
  var seen={},uniq=[];ws.forEach(function(w){var k=String(w['作業員ID']);if(k&&!seen[k]){seen[k]=1;uniq.push(w);}});ws=uniq;
  var pid=c['案件ID'],date=c['日付'];
  var sameGrp=reports.filter(function(r){return String(r['案件ID']||'')===String(pid)&&String(r['日付']||'').slice(0,10)===date;});
  var isEditing=!!editGroup;
  if(!isEditing){
    var dupNames=[];
    ws.forEach(function(w){
      if(sameGrp.some(function(r){return String(r['作業員ID'])===String(w['作業員ID']);}))dupNames.push(w['氏名']||'');
    });
    if(dupNames.length){toast('⚠ '+dupNames.join('、')+' は同じ日に同じ現場で登録済みです');return;}
  }
  // 1日の上限チェック：同じ人は通常＋深夜の合計で1.5人工まで（全現場合算）
  var addNk=numv(c['人工'])+numv(c['深夜人工']);
  var grpIds={};sameGrp.forEach(function(r){grpIds[String(r['日報ID'])]=1;});
  var overNames=[];
  ws.forEach(function(w){
    var cur=0;
    reports.forEach(function(r){
      if(String(r['日付']||'').slice(0,10)!==date)return;
      if(String(r['作業員ID'])!==String(w['作業員ID']))return;
      if(isEditing&&grpIds[String(r['日報ID'])])return; // 編集中の日報は置き換わるため除外
      cur+=numv(r['人工'])+numv(r['深夜人工']);
    });
    if(cur+addNk>1.5+1e-9)overNames.push((w['氏名']||'')+'（登録済 '+round2(cur)+'＋今回 '+round2(addNk)+'＝'+round2(cur+addNk)+'）');
  });
  if(overNames.length){toast('⚠ 1日の上限は合計1.5人工までです：'+overNames.join('、'));return;}
  var existing=isEditing?sameGrp:[];
  var data={};for(var k in c)data[k]=c[k];
  data['_workers']=ws.map(function(w){return {'作業員ID':w['作業員ID'],'氏名':w['氏名']||'','区分':w['区分']||'','所属':w['所属']||''};});
  var btn=document.getElementById('saveBtn');btn.disabled=true;btn.textContent='保存中…';
  Promise.all(existing.map(function(r){return callGAS({action:'deleteReport',id:r['日報ID']});}))
    .then(function(){return callGAS({action:'addReportMulti',data:data});})
    .then(function(res){if(!res.ok)throw new Error(res.error||'保存失敗');
      closeOv();toast(ws.length+'名分を保存しました');reload();
    }).catch(function(err){toast('失敗：'+err.message);}).then(function(){btn.disabled=false;btn.textContent='保存';});
}
function closeOv(){document.getElementById('ov').classList.remove('show');}

function numv(v){var n=parseFloat(String(v).replace(/[^\d.-]/g,''));return isNaN(n)?0:n;}
function yen(v){var n=numv(v);return n?('¥'+Math.round(n).toLocaleString('ja-JP')):'';}
function round2(n){return Math.round(n*100)/100;}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
var toastT;function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('show');},2800);}
document.getElementById('ov').addEventListener('click',function(e){if(e.target===this)this.classList.remove('show');});
document.addEventListener('visibilitychange',function(){if(!document.hidden)reload(true);});

loadCache();buildDateChips();buildProjOptions();updateAdmBtn();render();var hadCache=(projects&&projects.length>0)||(reports&&reports.length>0);reload(hadCache);
</script>
