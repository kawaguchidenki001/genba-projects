<!DOCTYPE html>
<!-- version 1 (2026-06-10) 工事台帳・原価管理 -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>工事台帳・原価管理｜河口電機</title>
<style>
  :root{ --bg:#f4f5f7;--card:#fff;--line:#e3e6ea;--ink:#1f2733;--sub:#6b7280;--accent:#0f766e;--accent-d:#115e59;
    --radius:12px;--shadow:0 1px 3px rgba(20,30,50,.08),0 1px 2px rgba(20,30,50,.04);}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic UI",sans-serif;font-size:15px;line-height:1.5;padding-bottom:90px;}
  header{position:sticky;top:0;z-index:20;background:var(--accent);color:#fff;padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;box-shadow:var(--shadow);}
  .hd-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .hd-row h1{font-size:17px;margin:0;font-weight:700;}
  .back{color:#ccfbf1;text-decoration:none;font-size:13px;}
  .ghost{padding:6px 10px;border:1px solid rgba(255,255,255,.3);border-radius:9px;background:rgba(255,255,255,.15);color:#fff;font-size:13px;cursor:pointer;}
  main{padding:12px;max-width:760px;margin:0 auto;}
  .gate{max-width:380px;margin:60px auto;text-align:center;padding:0 16px;}
  .gate .lk{font-size:46px;}
  .gate h2{font-size:18px;margin:10px 0 6px;}
  .gate p{color:var(--sub);font-size:14px;margin:0 0 18px;}
  .gate input{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;font-size:16px;text-align:center;margin-bottom:10px;}
  .gate button{width:100%;padding:13px;border:none;border-radius:11px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;}
  .sec{font-size:13px;font-weight:700;color:var(--sub);margin:14px 2px 8px;}
  .empty{text-align:center;color:var(--sub);padding:34px 10px;font-size:14px;}
  .yen{font-variant-numeric:tabular-nums;}
  .pos{color:#15803d;} .neg{color:#dc2626;}
  /* 全体サマリー */
  .total{background:linear-gradient(135deg,#0f766e,#155e75);color:#fff;border-radius:14px;padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow);}
  .total .t1{font-size:12px;opacity:.85;}
  .total .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:6px;}
  .total .v{font-size:16.5px;font-weight:700;font-variant-numeric:tabular-nums;}
  .total .k{font-size:11px;opacity:.8;}
  /* フィルタ */
  .chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:8px;-webkit-overflow-scrolling:touch;}
  .chip{flex:0 0 auto;padding:7px 13px;border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--sub);font-size:13px;font-weight:700;cursor:pointer;}
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  .search{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:15px;margin-bottom:10px;background:#fff;}
  /* 案件カード */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:12px 14px;margin-bottom:9px;cursor:pointer;border-left:5px solid var(--accent);}
  .card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .nm{font-weight:700;font-size:15.5px;}
  .meta{font-size:12.5px;color:var(--sub);margin-top:1px;}
  .tag{flex:0 0 auto;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;background:#eef1f5;color:#374151;}
  .tag.s受注{background:#dbeafe;color:#1e40af;} .tag.s段取済{background:#ede9fe;color:#6d28d9;}
  .tag.s施工中{background:#fef3c7;color:#92400e;} .tag.s完了{background:#dcfce7;color:#166534;}
  .nums{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:9px;border-top:1px dashed var(--line);padding-top:8px;}
  .nums .k{font-size:11px;color:var(--sub);}
  .nums .v{font-size:14.5px;font-weight:700;font-variant-numeric:tabular-nums;}
  /* 詳細 */
  .dsum{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:12px;}
  .dsum .row{display:flex;justify-content:space-between;padding:6px 0;font-size:14.5px;border-bottom:1px dashed var(--line);}
  .dsum .row:last-child{border-bottom:none;}
  .dsum .row b{font-variant-numeric:tabular-nums;}
  .dsum .big{font-size:16.5px;}
  .bar{height:9px;border-radius:999px;background:#e7ebef;overflow:hidden;margin:8px 0 2px;}
  .bar i{display:block;height:100%;background:var(--accent);}
  .bar i.over{background:#dc2626;}
  .barnote{font-size:11.5px;color:var(--sub);}
  .brk{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:6px 14px;margin-bottom:12px;}
  .brk .row{display:flex;justify-content:space-between;padding:8px 0;font-size:14px;border-bottom:1px solid #f0f2f4;}
  .brk .row:last-child{border-bottom:none;font-weight:700;}
  .brk .row b{font-variant-numeric:tabular-nums;}
  .auto{font-size:11px;color:#0e7490;background:#e0f2fe;border-radius:999px;padding:1px 7px;margin-left:6px;font-weight:700;}
  .ent{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:11px 14px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .ent .l .t{font-weight:700;font-size:14.5px;}
  .ent .l .m{font-size:12px;color:var(--sub);}
  .ent .r{font-weight:700;font-size:15px;font-variant-numeric:tabular-nums;white-space:nowrap;}
  .kbn{font-size:11px;font-weight:700;padding:1px 7px;border-radius:999px;margin-right:5px;}
  .kbn.材料費{background:#dbeafe;color:#1e40af;} .kbn.外注費{background:#fef3c7;color:#92400e;}
  .kbn.機械リース{background:#ede9fe;color:#6d28d9;} .kbn.経費{background:#fce7f3;color:#9d174d;} .kbn.その他{background:#eef1f5;color:#374151;}
  .fab{position:fixed;right:16px;bottom:calc(env(safe-area-inset-bottom) + 16px);z-index:30;background:var(--accent);color:#fff;border:none;border-radius:999px;padding:14px 20px;font-size:15px;font-weight:700;box-shadow:0 6px 16px rgba(15,118,110,.4);cursor:pointer;}
  .ov{position:fixed;inset:0;background:rgba(15,23,40,.45);z-index:40;display:none;align-items:flex-end;justify-content:center;}
  .ov.show{display:flex;}
  .sheet{background:#fff;width:100%;max-width:520px;border-radius:16px 16px 0 0;padding:16px 16px calc(env(safe-area-inset-bottom) + 16px);max-height:88vh;overflow-y:auto;}
  .sheet h2{font-size:16px;margin:2px 0 12px;}
  .fld{margin-bottom:11px;} .fld label{display:block;font-size:12.5px;color:var(--sub);margin-bottom:4px;font-weight:600;}
  .fld input,.fld select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:15px;background:#fff;font-family:inherit;}
  .two{display:flex;gap:8px;} .two>.fld{flex:1;}
  .acts{display:flex;gap:8px;margin-top:6px;} .btn{flex:1;padding:13px;border-radius:11px;border:none;font-size:15px;font-weight:700;cursor:pointer;}
  .btn.primary{background:var(--accent);color:#fff;} .btn.sub{background:#eef1f5;color:var(--ink);}
  .row-del{text-align:center;margin-top:10px;} .row-del a{color:#dc2626;font-size:13px;text-decoration:none;}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:90px;z-index:60;background:#1f2733;color:#fff;padding:10px 16px;border-radius:999px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;}
  .toast.show{opacity:1;}
  .loading{position:fixed;inset:0;z-index:1000;background:rgba(240,242,245,.72);-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;}
  .loading.show{display:flex;}
  .lbox{background:#fff;border-radius:16px;box-shadow:0 10px 30px rgba(20,30,50,.18);padding:24px 32px;text-align:center;}
  .spin{width:38px;height:38px;border:4px solid #e1e5ea;border-top-color:var(--accent);border-radius:50%;margin:0 auto 12px;animation:sp .8s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
  .lbox .txt{font-size:14px;font-weight:700;}
</style>
</head>
<body>
<div id="verBadge" style="position:fixed;top:0;left:50%;transform:translateX(-50%);z-index:99999;font-size:10px;line-height:1.5;color:#fff;background:rgba(0,0,0,.30);padding:1px 9px;border-radius:0 0 8px 8px;font-family:sans-serif;pointer-events:none;letter-spacing:.5px;">v1</div>
<header>
  <div class="hd-row">
    <a class="back" href="https://kawaguchidenki001.github.io/genba-projects/" id="backLink">← 現場管理メニュー</a>
    <span id="who" style="font-size:12px;color:#ccfbf1;"></span>
  </div>
  <div class="hd-row" style="margin-top:6px;"><h1 id="hTitle">工事台帳・原価管理</h1>
    <div style="display:flex;gap:8px;">
      <button class="ghost" id="csvBtn" style="display:none;" onclick="exportCsv()">CSV</button>
      <button class="ghost" id="logoutBtn" style="display:none;" onclick="adminLogout()">ログアウト</button>
    </div>
  </div>
</header>

<!-- ログインゲート -->
<div id="gate" class="gate" style="display:none;">
  <div class="lk">🔒</div>
  <h2>管理者専用</h2>
  <p>工事台帳・原価管理は管理者のみ利用できます。管理者PINを入力してください。</p>
  <input id="pin" type="password" inputmode="numeric" placeholder="管理者PIN" onkeydown="if(event.key==='Enter')doLogin()">
  <button onclick="doLogin()">ログイン</button>
</div>

<!-- 一覧 -->
<main id="content" style="display:none;">
  <div class="total" id="totalBox"></div>
  <div class="chips" id="chips"></div>
  <input class="search" id="q" type="text" placeholder="案件名・顧客名で検索" oninput="renderList()">
  <div id="list"><div class="empty">読込中…</div></div>
</main>

<!-- 詳細 -->
<main id="detail" style="display:none;"></main>

<button class="fab" id="fab" style="display:none;" onclick="openCostSheet()">＋ 原価を登録</button>

<div class="ov" id="ov">
  <div class="sheet">
    <h2 id="shTitle">原価の登録</h2>
    <div class="two">
      <div class="fld"><label>日付</label><input id="f_date" type="date"></div>
      <div class="fld"><label>区分</label><select id="f_kbn">
        <option>材料費</option><option>外注費</option><option value="機械リース">機械・リース</option><option>経費</option><option>その他</option></select></div>
    </div>
    <div class="fld"><label>取引先・支払先</label><input id="f_dest" type="text" list="custList" placeholder="例：〇〇電材"></div>
    <datalist id="custList"></datalist>
    <div class="fld"><label>内容</label><input id="f_body" type="text" placeholder="例：照明器具一式"></div>
    <div class="fld"><label>金額（税抜・円）</label><input id="f_amt" type="text" inputmode="numeric" placeholder="例：120000"></div>
    <div class="fld"><label>備考</label><input id="f_memo" type="text"></div>
    <div class="acts">
      <button class="btn sub" onclick="closeSheet()">キャンセル</button>
      <button class="btn primary" onclick="saveCost()">保存</button>
    </div>
    <div class="row-del" id="delRow" style="display:none;"><a href="#" onclick="deleteCost();return false;">この原価を削除</a></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="loading" id="loading"><div class="lbox"><div class="spin"></div><div class="txt">読み込み中…</div></div></div>

<script>
var GAS_URL='https://script.google.com/macros/s/AKfycbyk8p6_gi6e3wdhQdWL0Oswz4BUtP3gR37PeFJJ9rO5mVhTRt4CikpQhK_bBwt1Ftr-/exec';
var projects=[],customers=[],costs=[],labor={};
var curId='',curStatus='進行中',editId='';
var CACHE='genba_daicho_cache';
var KBN_ORDER=['材料費','外注費','機械リース','経費','その他'];
var KBN_LABEL={'機械リース':'機械・リース'};

function loadCache(){try{var c=JSON.parse(localStorage.getItem(CACHE)||'{}');projects=c.projects||[];customers=c.customers||[];costs=c.costs||[];labor=c.labor||{};}catch(e){}}
function saveCache(){try{localStorage.setItem(CACHE,JSON.stringify({projects:projects,customers:customers,costs:costs,labor:labor}));}catch(e){}}
function admTok(){return localStorage.getItem('genba_admin')||'';}

var loadCnt=0,loadShownAt=0;
function showLoad(){loadCnt++;if(loadCnt===1){loadShownAt=Date.now();document.getElementById('loading').classList.add('show');}}
function hideLoad(){loadCnt=Math.max(0,loadCnt-1);if(loadCnt===0){var w=Math.max(0,600-(Date.now()-loadShownAt));setTimeout(function(){if(loadCnt===0)document.getElementById('loading').classList.remove('show');},w);}}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._tm);t._tm=setTimeout(function(){t.classList.remove('show');},2400);}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function num(v){if(v==null||v==='')return 0;var n=Number(String(v).replace(/[,，円¥\s]/g,''));return isNaN(n)?0:n;}
function fmt(n){return Math.round(n).toLocaleString('ja-JP');}
function yen(n){return '¥'+fmt(n);}
function fmtDate(v){if(!v)return'';var s=String(v);var m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);if(m)return m[1]+'/'+m[2]+'/'+m[3];var d=new Date(s);if(!isNaN(d))return d.getFullYear()+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+('0'+d.getDate()).slice(-2);return s;}
function dateInputVal(v){if(!v)return'';var s=String(v);var m=s.match(/^(\d{4}-\d{2}-\d{2})/);if(m)return m[1];var d=new Date(s);if(!isNaN(d))return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);return '';}

function callGAS(params,secretOverride,silent){
  return new Promise(function(resolve,reject){
    if(!silent) showLoad();
    var cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*1e6),s=document.createElement('script');
    var timer=setTimeout(function(){cleanup();reject(new Error('タイムアウト'));},20000);
    function cleanup(){if(!silent) hideLoad();try{delete window[cb];}catch(e){}if(s.parentNode)s.parentNode.removeChild(s);clearTimeout(timer);}
    window[cb]=function(res){cleanup();resolve(res);};
    var q=Object.assign({secret:secretOverride||admTok(),callback:cb},params);
    if(q.data&&typeof q.data!=='string')q.data=JSON.stringify(q.data);
    s.src=GAS_URL+'?'+Object.keys(q).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(q[k]);}).join('&');
    s.onerror=function(){cleanup();reject(new Error('通信エラー'));};document.head.appendChild(s);
  });
}

function showGate(){document.getElementById('gate').style.display='block';document.getElementById('content').style.display='none';document.getElementById('detail').style.display='none';document.getElementById('fab').style.display='none';document.getElementById('logoutBtn').style.display='none';document.getElementById('csvBtn').style.display='none';document.getElementById('who').textContent='';}
function showContent(){document.getElementById('gate').style.display='none';document.getElementById('logoutBtn').style.display='inline-block';document.getElementById('who').textContent='管理者';showList();}

function init(){
  if(!admTok()){showGate();return;}
  loadCache();
  var hadCache=projects.length>0;
  callGAS({action:'checkRole'},null,hadCache).then(function(res){
    if(res&&res.ok&&res.role==='admin'){showContent(); if(hadCache)renderList(); loadAll(hadCache);}
    else{localStorage.removeItem('genba_admin');showGate();}
  }).catch(function(){showGate();});
}
function doLogin(){
  var pin=document.getElementById('pin').value;if(!pin){toast('PINを入力してください');return;}
  callGAS({action:'checkRole'},pin).then(function(res){
    if(res&&res.ok&&res.role==='admin'){localStorage.setItem('genba_admin',pin);document.getElementById('pin').value='';showContent();loadAll();}
    else toast('管理者PINが違います');
  }).catch(function(err){toast('通信エラー：'+err.message);});
}
function adminLogout(){localStorage.removeItem('genba_admin');showGate();}

function loadAll(silent){
  callGAS({action:'costData'},null,silent).then(function(res){
    if(!res.ok)throw new Error(res.error||'エラー');
    projects=res.projects||[];customers=res.customers||[];costs=res.costs||[];labor=res.labor||{};
    saveCache();fillCustList();
    if(curId)renderDetail();else renderList();
  }).catch(function(err){if(!silent)toast('読込失敗：'+err.message);});
}
function fillCustList(){
  var dl=document.getElementById('custList');dl.innerHTML='';
  customers.forEach(function(c){var o=document.createElement('option');o.value=c['顧客名']||'';dl.appendChild(o);});
}

// ===== 集計 =====
function calc(p){
  var id=String(p['案件ID']||'');
  var by={};KBN_ORDER.forEach(function(k){by[k]=0;});
  costs.forEach(function(c){ if(String(c['案件ID'])!==id)return; var k=String(c['区分']||'その他'); if(by[k]==null)k='その他'; by[k]+=num(c['金額']); });
  var lb=labor[id]||{};
  var laborCost=num(lb.labor), ninku=Number(lb.ninku)||0;
  var costSum=laborCost;KBN_ORDER.forEach(function(k){costSum+=by[k];});
  var uke=num(p['受注金額税抜']), budget=num(p['実行予算']);
  var profit=uke-costSum, rate=uke>0?(profit/uke*100):0;
  return {by:by,laborCost:laborCost,ninku:ninku,costSum:costSum,uke:uke,budget:budget,profit:profit,rate:rate};
}
function projById(id){for(var i=0;i<projects.length;i++)if(String(projects[i]['案件ID'])===String(id))return projects[i];return null;}

// ===== 一覧 =====
function showList(){
  curId='';
  document.getElementById('content').style.display='block';
  document.getElementById('detail').style.display='none';
  document.getElementById('fab').style.display='none';
  document.getElementById('csvBtn').style.display='none';
  document.getElementById('hTitle').textContent='工事台帳・原価管理';
  document.getElementById('backLink').textContent='← 現場管理メニュー';
  document.getElementById('backLink').href='https://kawaguchidenki001.github.io/genba-projects/';
  document.getElementById('backLink').onclick=null;
  renderList();
}
function setStatus(s){curStatus=s;renderList();}
function filtered(){
  var q=(document.getElementById('q').value||'').trim().toLowerCase();
  return projects.filter(function(p){
    var st=String(p['ステータス']||'受注');
    if(curStatus==='進行中'){ if(st==='完了')return false; }
    else if(curStatus!=='すべて'&&st!==curStatus)return false;
    if(q){var s=(String(p['案件名']||'')+' '+String(p['顧客']||'')).toLowerCase();if(s.indexOf(q)<0)return false;}
    return true;
  });
}
function renderList(){
  var chips=['進行中','すべて','受注','段取済','施工中','完了'];
  document.getElementById('chips').innerHTML=chips.map(function(s){
    return '<button class="chip'+(curStatus===s?' on':'')+'" onclick="setStatus(\''+s+'\')">'+s+'</button>';
  }).join('');
  var rows=filtered();
  var tUke=0,tCost=0;
  rows.forEach(function(p){var c=calc(p);tUke+=c.uke;tCost+=c.costSum;});
  var tProf=tUke-tCost,tRate=tUke>0?(tProf/tUke*100):0;
  document.getElementById('totalBox').innerHTML=
    '<div class="t1">合計（'+esc(curStatus)+'・'+rows.length+'件）</div><div class="grid3">'+
    '<div><div class="k">受注（税抜）</div><div class="v">'+yen(tUke)+'</div></div>'+
    '<div><div class="k">原価合計</div><div class="v">'+yen(tCost)+'</div></div>'+
    '<div><div class="k">粗利（'+tRate.toFixed(1)+'%）</div><div class="v">'+yen(tProf)+'</div></div></div>';
  var el=document.getElementById('list');
  if(!rows.length){el.innerHTML='<div class="empty">該当する案件がありません。</div>';return;}
  rows.sort(function(a,b){return String(b['案件ID']).localeCompare(String(a['案件ID']));});
  el.innerHTML=rows.map(function(p){
    var c=calc(p),st=String(p['ステータス']||'受注');
    var pc=c.profit<0?'neg':'pos';
    return '<div class="card" onclick="openDetail(\''+esc(p['案件ID'])+'\')">'+
      '<div class="top"><div><div class="nm">'+esc(p['案件名']||'(名称なし)')+'</div>'+
      '<div class="meta">'+esc(p['顧客']||'')+'</div></div>'+
      '<span class="tag s'+esc(st)+'">'+esc(st)+'</span></div>'+
      '<div class="nums">'+
      '<div><div class="k">受注（税抜）</div><div class="v yen">'+yen(c.uke)+'</div></div>'+
      '<div><div class="k">原価合計</div><div class="v yen">'+yen(c.costSum)+'</div></div>'+
      '<div><div class="k">粗利（'+c.rate.toFixed(1)+'%）</div><div class="v yen '+pc+'">'+yen(c.profit)+'</div></div>'+
      '</div></div>';
  }).join('');
}

// ===== 詳細 =====
function openDetail(id){
  curId=String(id);
  document.getElementById('content').style.display='none';
  document.getElementById('detail').style.display='block';
  document.getElementById('fab').style.display='block';
  document.getElementById('csvBtn').style.display='inline-block';
  document.getElementById('backLink').textContent='← 台帳一覧';
  document.getElementById('backLink').href='#';
  document.getElementById('backLink').onclick=function(){showList();return false;};
  renderDetail();
  window.scrollTo(0,0);
}
function renderDetail(){
  var p=projById(curId);
  if(!p){showList();return;}
  document.getElementById('hTitle').textContent=String(p['略称']||p['案件名']||'工事台帳');
  var c=calc(p);
  var pc=c.profit<0?'neg':'pos';
  var h='';
  h+='<div class="dsum">';
  h+='<div class="row"><span>受注金額（税抜）</span><b class="yen">'+yen(c.uke)+'</b></div>';
  h+='<div class="row"><span>原価合計</span><b class="yen">'+yen(c.costSum)+'</b></div>';
  h+='<div class="row big"><span>粗利（粗利率 '+c.rate.toFixed(1)+'%）</span><b class="yen '+pc+'">'+yen(c.profit)+'</b></div>';
  if(c.budget>0){
    var pct=Math.min(100,c.costSum/c.budget*100), over=c.costSum>c.budget;
    h+='<div class="row" style="display:block;border-bottom:none;"><span>実行予算 '+yen(c.budget)+'（残り <b class="yen '+(over?'neg':'pos')+'">'+yen(c.budget-c.costSum)+'</b>）</span>';
    h+='<div class="bar"><i class="'+(over?'over':'')+'" style="width:'+pct.toFixed(1)+'%"></i></div>';
    h+='<div class="barnote">予算消化 '+(c.budget>0?(c.costSum/c.budget*100).toFixed(1):'0')+'%'+(over?'（予算オーバー）':'')+'</div></div>';
  }
  h+='</div>';
  h+='<div class="sec">原価内訳</div><div class="brk">';
  h+='<div class="row"><span>労務費<span class="auto">日報から自動</span><span style="font-size:11.5px;color:var(--sub);"> 人工 '+(Math.round(c.ninku*100)/100)+'</span></span><b class="yen">'+yen(c.laborCost)+'</b></div>';
  KBN_ORDER.forEach(function(k){h+='<div class="row"><span>'+esc(KBN_LABEL[k]||k)+'</span><b class="yen">'+yen(c.by[k])+'</b></div>';});
  h+='<div class="row"><span>原価合計</span><b class="yen">'+yen(c.costSum)+'</b></div>';
  h+='</div>';
  var rows=costs.filter(function(x){return String(x['案件ID'])===curId;});
  rows.sort(function(a,b){return String(b['日付']||'').localeCompare(String(a['日付']||''));});
  h+='<div class="sec">原価明細（'+rows.length+'件）</div>';
  if(!rows.length){h+='<div class="empty">原価がまだ登録されていません。<br>右下の「＋原価を登録」から登録してください。</div>';}
  else{
    h+=rows.map(function(x){
      var k=String(x['区分']||'その他');
      return '<div class="ent" onclick="openCostSheet(\''+esc(x['原価ID'])+'\')">'+
        '<div class="l"><div class="t"><span class="kbn '+esc(k)+'">'+esc(KBN_LABEL[k]||k)+'</span>'+esc(x['内容']||'(内容なし)')+'</div>'+
        '<div class="m">'+esc(fmtDate(x['日付']))+(x['取引先']?'・'+esc(x['取引先']):'')+(x['備考']?'・'+esc(x['備考']):'')+'</div></div>'+
        '<div class="r yen">'+yen(num(x['金額']))+'</div></div>';
    }).join('');
  }
  h+='<div style="font-size:11.5px;color:var(--sub);margin-top:10px;">※労務費は作業日報の労務費（単価×人工）を自動集計しています。金額はすべて税抜で入力してください。</div>';
  document.getElementById('detail').innerHTML=h;
}

// ===== 原価の登録・編集 =====
function costById(id){for(var i=0;i<costs.length;i++)if(String(costs[i]['原価ID'])===String(id))return costs[i];return null;}
function openCostSheet(id){
  if(!curId){toast('案件を選んでください');return;}
  editId=id||'';
  var x=editId?costById(editId):null;
  document.getElementById('shTitle').textContent=x?'原価の編集':'原価の登録';
  var today=new Date(),tv=today.getFullYear()+'-'+('0'+(today.getMonth()+1)).slice(-2)+'-'+('0'+today.getDate()).slice(-2);
  document.getElementById('f_date').value=x?(dateInputVal(x['日付'])||tv):tv;
  document.getElementById('f_kbn').value=x?(String(x['区分']||'材料費')):'材料費';
  if(!document.getElementById('f_kbn').value)document.getElementById('f_kbn').value='その他';
  document.getElementById('f_dest').value=x?(x['取引先']||''):'';
  document.getElementById('f_body').value=x?(x['内容']||''):'';
  document.getElementById('f_amt').value=x?String(num(x['金額'])||''):'';
  document.getElementById('f_memo').value=x?(x['備考']||''):'';
  document.getElementById('delRow').style.display=x?'block':'none';
  document.getElementById('ov').classList.add('show');
}
function closeSheet(){document.getElementById('ov').classList.remove('show');}
function saveCost(){
  var amt=num(document.getElementById('f_amt').value);
  var body=document.getElementById('f_body').value.trim();
  if(!amt&&!body){toast('内容か金額を入力してください');return;}
  var data={'案件ID':curId,'日付':document.getElementById('f_date').value,'区分':document.getElementById('f_kbn').value,
    '取引先':document.getElementById('f_dest').value.trim(),'内容':body,'金額':amt,'備考':document.getElementById('f_memo').value.trim()};
  if(editId)data['原価ID']=editId;
  closeSheet();
  callGAS({action:'costSave',data:data}).then(function(res){
    if(!res.ok)throw new Error(res.error||'保存失敗');
    var saved=res.cost;
    if(editId){for(var i=0;i<costs.length;i++)if(String(costs[i]['原価ID'])===String(editId)){costs[i]=saved;break;}}
    else costs.push(saved);
    saveCache();renderDetail();toast('保存しました');
  }).catch(function(err){toast('保存失敗：'+err.message);});
}
function deleteCost(){
  if(!editId)return;
  if(!confirm('この原価を削除します。よろしいですか？'))return;
  var id=editId;closeSheet();
  callGAS({action:'costDelete',id:id}).then(function(res){
    if(!res.ok)throw new Error(res.error||'削除失敗');
    costs=costs.filter(function(x){return String(x['原価ID'])!==String(id);});
    saveCache();renderDetail();toast('削除しました');
  }).catch(function(err){toast('削除失敗：'+err.message);});
}

// ===== CSV出力（詳細画面）=====
function csvCell(v){v=String(v==null?'':v);if(/[",\n]/.test(v))v='"'+v.replace(/"/g,'""')+'"';return v;}
function exportCsv(){
  var p=projById(curId);if(!p)return;
  var c=calc(p);
  var lines=[];
  lines.push(['工事台帳',String(p['案件名']||'')].map(csvCell).join(','));
  lines.push(['顧客',String(p['顧客']||''),'ステータス',String(p['ステータス']||'')].map(csvCell).join(','));
  lines.push(['受注金額（税抜）',c.uke,'実行予算',c.budget].map(csvCell).join(','));
  lines.push(['原価合計',c.costSum,'粗利',c.profit,'粗利率(%)',c.rate.toFixed(1)].map(csvCell).join(','));
  lines.push('');
  lines.push(['内訳','金額'].map(csvCell).join(','));
  lines.push(['労務費（日報から自動・人工'+(Math.round(c.ninku*100)/100)+'）',c.laborCost].map(csvCell).join(','));
  KBN_ORDER.forEach(function(k){lines.push([(KBN_LABEL[k]||k),c.by[k]].map(csvCell).join(','));});
  lines.push('');
  lines.push(['日付','区分','取引先','内容','金額','備考'].map(csvCell).join(','));
  var rows=costs.filter(function(x){return String(x['案件ID'])===curId;});
  rows.sort(function(a,b){return String(a['日付']||'').localeCompare(String(b['日付']||''));});
  rows.forEach(function(x){lines.push([fmtDate(x['日付']),(KBN_LABEL[String(x['区分'])]||x['区分']||''),x['取引先']||'',x['内容']||'',num(x['金額']),x['備考']||''].map(csvCell).join(','));});
  var bom='\uFEFF',blob=new Blob([bom+lines.join('\r\n')],{type:'text/csv'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='工事台帳_'+String(p['略称']||p['案件名']||curId)+'.csv';
  document.body.appendChild(a);a.click();a.remove();
  toast('CSVを出力しました');
}

document.getElementById('ov').addEventListener('click',function(e){if(e.target===this)closeSheet();});
init();
</script>
