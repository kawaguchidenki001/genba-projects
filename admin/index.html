<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>管理画面｜河口電機</title>
<style>
  :root{ --bg:#f4f5f7;--card:#fff;--line:#e3e6ea;--ink:#1f2733;--sub:#6b7280;--accent:#374151;--accent-d:#1f2937;
    --radius:12px;--shadow:0 1px 3px rgba(20,30,50,.08),0 1px 2px rgba(20,30,50,.04);}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic UI",sans-serif;font-size:15px;line-height:1.5;padding-bottom:80px;}
  header{position:sticky;top:0;z-index:20;background:var(--accent);color:#fff;padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;box-shadow:var(--shadow);}
  .hd-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .hd-row h1{font-size:17px;margin:0;font-weight:700;}
  .back{color:#d1d5db;text-decoration:none;font-size:13px;}
  .ghost{padding:6px 10px;border:1px solid rgba(255,255,255,.3);border-radius:9px;background:rgba(255,255,255,.15);color:#fff;font-size:13px;cursor:pointer;}
  main{padding:12px;}
  .gate{max-width:380px;margin:60px auto;text-align:center;padding:0 16px;}
  .gate .lk{font-size:46px;}
  .gate h2{font-size:18px;margin:10px 0 6px;}
  .gate p{color:var(--sub);font-size:14px;margin:0 0 18px;}
  .gate input{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;font-size:16px;text-align:center;margin-bottom:10px;}
  .gate button{width:100%;padding:13px;border:none;border-radius:11px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;}
  .sec{font-size:13px;font-weight:700;color:var(--sub);margin:4px 2px 10px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:12px 14px;margin-bottom:9px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px;border-left:5px solid var(--accent);}
  .card.kyo{border-left-color:#b45309;}
  .nm{font-weight:700;font-size:15.5px;}
  .meta{font-size:13px;color:var(--sub);}
  .yen{font-weight:700;font-variant-numeric:tabular-nums;}
  .tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;background:#eef1f5;color:#374151;}
  .tag.kyo{background:#fef3c7;color:#92400e;}
  .empty{text-align:center;color:var(--sub);padding:34px 10px;font-size:14px;}
  .fab{position:fixed;right:16px;bottom:calc(env(safe-area-inset-bottom) + 16px);z-index:30;background:var(--accent);color:#fff;border:none;border-radius:999px;padding:14px 20px;font-size:15px;font-weight:700;box-shadow:0 6px 16px rgba(31,41,55,.4);cursor:pointer;}
  .ov{position:fixed;inset:0;background:rgba(15,23,40,.45);z-index:40;display:none;align-items:flex-end;justify-content:center;}
  .ov.show{display:flex;}
  .sheet{background:#fff;width:100%;max-width:520px;border-radius:16px 16px 0 0;padding:16px 16px calc(env(safe-area-inset-bottom) + 16px);}
  .sheet h2{font-size:16px;margin:2px 0 12px;}
  .fld{margin-bottom:11px;} .fld label{display:block;font-size:12.5px;color:var(--sub);margin-bottom:4px;font-weight:600;}
  .fld input,.fld select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:15px;background:#fff;font-family:inherit;}
  .two{display:flex;gap:8px;} .two>.fld{flex:1;}
  .acts{display:flex;gap:8px;margin-top:6px;} .btn{flex:1;padding:13px;border-radius:11px;border:none;font-size:15px;font-weight:700;cursor:pointer;}
  .btn.primary{background:var(--accent);color:#fff;} .btn.sub{background:#eef1f5;color:var(--ink);}
  .row-del{text-align:center;margin-top:10px;} .row-del a{color:#dc2626;font-size:13px;text-decoration:none;}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:90px;z-index:60;background:#1f2733;color:#fff;padding:10px 16px;border-radius:999px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;}
  .toast.show{opacity:1;}
</style>
</head>
<body>
<header>
  <div class="hd-row">
    <a class="back" href="https://kawaguchidenki001.github.io/genba-projects/">← 現場管理メニュー</a>
    <span id="who" style="font-size:12px;color:#d1d5db;"></span>
  </div>
  <div class="hd-row" style="margin-top:6px;"><h1>管理画面</h1>
    <button class="ghost" id="logoutBtn" style="display:none;" onclick="adminLogout()">ログアウト</button>
  </div>
</header>

<!-- ログインゲート -->
<div id="gate" class="gate" style="display:none;">
  <div class="lk">🔒</div>
  <h2>管理者専用</h2>
  <p>この画面は管理者のみ利用できます。管理者PINを入力してください。</p>
  <input id="pin" type="password" inputmode="numeric" placeholder="管理者PIN" onkeydown="if(event.key==='Enter')doLogin()">
  <button onclick="doLogin()">ログイン</button>
</div>

<!-- 管理コンテンツ -->
<main id="content" style="display:none;">
  <div class="sec">作業員マスタ（単価はここで設定）</div>
  <div id="list"><div class="empty">読込中…</div></div>
</main>

<button class="fab" id="fab" style="display:none;" onclick="openWorker()">＋ 作業員</button>

<div class="ov" id="ov">
  <div class="sheet">
    <h2 id="mTitle">作業員の追加</h2>
    <input type="hidden" id="w_id">
    <div class="fld"><label>氏名 *</label><input id="w_name" placeholder="例）河口太郎 / ナンカイ作業班"></div>
    <div class="two">
      <div class="fld"><label>区分</label><select id="w_kind" onchange="wKind()"><option>自社</option><option>協力会社</option></select></div>
      <div class="fld"><label>標準単価（円/人工）</label><input id="w_unit" type="number" inputmode="numeric" placeholder="例）20000"></div>
    </div>
    <div class="fld" id="belongWrap" style="display:none;"><label>所属（協力会社名）</label><input id="w_belong" placeholder="例）ナンカイ（株）"></div>
    <div style="border-top:1px solid var(--line);margin:6px 0 12px;padding-top:10px;font-size:12px;color:var(--sub);font-weight:700;">ログイン（タイムカード等で本人に紐づきます）</div>
    <div class="two">
      <div class="fld"><label>ログインID</label><input id="w_loginid" autocapitalize="off" placeholder="例）taro"></div>
      <div class="fld"><label>パスワード</label><input id="w_pw" placeholder="簡単でOK"></div>
    </div>
    <div class="acts">
      <button class="btn sub" onclick="closeOv()">キャンセル</button>
      <button class="btn primary" id="saveBtn" onclick="saveWorker()">保存</button>
    </div>
    <div class="row-del" id="delRow" style="display:none;"><a href="#" onclick="delWorker(event)">この作業員を削除</a></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var GAS_URL='https://script.google.com/macros/s/AKfycbyk8p6_gi6e3wdhQdWL0Oswz4BUtP3gR37PeFJJ9rO5mVhTRt4CikpQhK_bBwt1Ftr-/exec';
var workers=[];
function admTok(){return localStorage.getItem('genba_admin')||'';}

function callGAS(params,secretOverride){
  return new Promise(function(resolve,reject){
    var cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*1e6),s=document.createElement('script');
    var timer=setTimeout(function(){cleanup();reject(new Error('タイムアウト'));},20000);
    function cleanup(){try{delete window[cb];}catch(e){}if(s.parentNode)s.parentNode.removeChild(s);clearTimeout(timer);}
    window[cb]=function(res){cleanup();resolve(res);};
    var q=Object.assign({secret:secretOverride||admTok(),callback:cb},params);
    if(q.data&&typeof q.data!=='string')q.data=JSON.stringify(q.data);
    s.src=GAS_URL+'?'+Object.keys(q).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(q[k]);}).join('&');
    s.onerror=function(){cleanup();reject(new Error('通信エラー'));};document.head.appendChild(s);
  });
}

function showGate(){document.getElementById('gate').style.display='block';document.getElementById('content').style.display='none';document.getElementById('fab').style.display='none';document.getElementById('logoutBtn').style.display='none';document.getElementById('who').textContent='';}
function showContent(){document.getElementById('gate').style.display='none';document.getElementById('content').style.display='block';document.getElementById('fab').style.display='block';document.getElementById('logoutBtn').style.display='inline-block';document.getElementById('who').textContent='管理者';}

function init(){
  if(!admTok()){showGate();return;}
  callGAS({action:'checkRole'}).then(function(res){
    if(res&&res.ok&&res.role==='admin'){showContent();loadWorkers();}
    else{localStorage.removeItem('genba_admin');showGate();}
  }).catch(function(){showGate();});
}
function doLogin(){
  var pin=document.getElementById('pin').value;if(!pin){toast('PINを入力してください');return;}
  callGAS({action:'checkRole'},pin).then(function(res){
    if(res&&res.ok&&res.role==='admin'){localStorage.setItem('genba_admin',pin);document.getElementById('pin').value='';showContent();loadWorkers();}
    else toast('管理者PINが違います');
  }).catch(function(err){toast('通信エラー：'+err.message);});
}
function adminLogout(){localStorage.removeItem('genba_admin');showGate();}

function loadWorkers(){
  callGAS({action:'workers'}).then(function(res){
    if(!res.ok)throw new Error(res.error||'エラー');workers=res.workers||[];render();
  }).catch(function(err){toast('読込失敗：'+err.message);});
}
function render(){
  var el=document.getElementById('list');
  if(!workers.length){el.innerHTML='<div class="empty">作業員がまだいません。<br>右下の「＋作業員」から登録してください。</div>';return;}
  el.innerHTML='';
  workers.forEach(function(w){
    var kyo=w['区分']==='協力会社',div=document.createElement('div');div.className='card'+(kyo?' kyo':'');div.onclick=function(){openWorker(w);};
    div.innerHTML='<div><div class="nm">'+esc(w['氏名']||'')+' <span class="tag'+(kyo?' kyo':'')+'">'+esc(w['区分']||'')+'</span></div>'+
      '<div class="meta">'+(w['所属']?esc(w['所属'])+' ・ ':'')+(w['ログインID']?'🔑 '+esc(w['ログインID']):'<span style="color:#bbb;">ログイン未設定</span>')+'</div></div>'+
      '<div class="yen">'+(numv(w['標準単価'])?yen(w['標準単価'])+'/人工':'<span style="color:#9aa1ab;font-weight:400;">単価未設定</span>')+'</div>';
    el.appendChild(div);
  });
}

function openWorker(w){
  document.getElementById('mTitle').textContent=w?'作業員の編集':'作業員の追加';
  document.getElementById('delRow').style.display=w?'block':'none';
  var g=function(id){return document.getElementById(id);};
  g('w_id').value=w?(w['作業員ID']||''):'';g('w_name').value=w?(w['氏名']||''):'';
  g('w_kind').value=w?(w['区分']||'自社'):'自社';g('w_unit').value=w?(numv(w['標準単価'])||''):'';g('w_belong').value=w?(w['所属']||''):'';
  g('w_loginid').value=w?(w['ログインID']||''):'';g('w_pw').value=w?(w['パスワード']||''):'';
  wKind();document.getElementById('ov').classList.add('show');
}
function wKind(){document.getElementById('belongWrap').style.display=document.getElementById('w_kind').value==='協力会社'?'block':'none';}
function closeOv(){document.getElementById('ov').classList.remove('show');}
function saveWorker(){
  var g=function(id){return document.getElementById(id).value;},name=g('w_name').trim();
  if(!name){toast('氏名を入れてください');return;}
  var kind=g('w_kind'),id=g('w_id'),isNew=!id;
  var d={'氏名':name,'区分':kind,'所属':kind==='協力会社'?g('w_belong').trim():'','標準単価':g('w_unit'),'ログインID':g('w_loginid').trim(),'パスワード':g('w_pw')};
  var btn=document.getElementById('saveBtn');btn.disabled=true;btn.textContent='保存中…';
  var params=isNew?{action:'addWorker',data:d}:{action:'updateWorker',id:id,data:d};
  callGAS(params).then(function(res){
    if(!res.ok)throw new Error(res.error||'保存失敗');
    if(isNew)workers.push(res.worker);else for(var i=0;i<workers.length;i++){if(workers[i]['作業員ID']===id){workers[i]=res.worker;break;}}
    render();closeOv();toast(isNew?'登録しました':'更新しました');
  }).catch(function(err){toast('失敗：'+err.message);}).then(function(){btn.disabled=false;btn.textContent='保存';});
}
function delWorker(ev){
  ev.preventDefault();var id=document.getElementById('w_id').value;if(!id)return;
  if(!confirm('この作業員を削除します。よろしいですか？'))return;
  callGAS({action:'deleteWorker',id:id}).then(function(res){
    if(!res.ok)throw new Error(res.error||'削除失敗');workers=workers.filter(function(w){return w['作業員ID']!==id;});render();closeOv();toast('削除しました');
  }).catch(function(err){toast('失敗：'+err.message);});
}

function numv(v){var n=parseFloat(String(v).replace(/[^\d.-]/g,''));return isNaN(n)?0:n;}
function yen(v){var n=numv(v);return n?('¥'+Math.round(n).toLocaleString('ja-JP')):'';}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
var toastT;function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('show');},2600);}
document.getElementById('ov').addEventListener('click',function(e){if(e.target===this)this.classList.remove('show');});
init();
</script>
</body>
</html>
