<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>案件管理｜河口電機</title>
<style>
  :root{
    --bg:#f4f5f7; --card:#ffffff; --line:#e3e6ea; --ink:#1f2733; --sub:#6b7280;
    --accent:#0f5fb5; --accent-d:#0b4a8f;
    --s-見積中:#6b7280; --s-受注:#2563eb; --s-施工中:#ea580c;
    --s-完了:#16a34a; --s-請求:#7c3aed; --s-入金:#0d9488;
    --radius:12px; --shadow:0 1px 3px rgba(20,30,50,.08),0 1px 2px rgba(20,30,50,.04);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic UI",sans-serif;
    font-size:15px;line-height:1.5;padding-bottom:80px;}
  header{position:sticky;top:0;z-index:20;background:var(--accent);color:#fff;
    padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;box-shadow:var(--shadow);}
  .hd-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .hd-row h1{font-size:17px;margin:0;font-weight:700;letter-spacing:.02em;}
  .back{color:#dbeafe;text-decoration:none;font-size:13px;}
  .sync{font-size:12px;display:flex;align-items:center;gap:5px;color:#dbeafe;}
  .dot{width:8px;height:8px;border-radius:50%;background:#9ca3af;display:inline-block;}
  .dot.ok{background:#4ade80;} .dot.busy{background:#fde047;} .dot.off{background:#f87171;}
  .toolbar{padding:10px 12px;display:flex;flex-direction:column;gap:8px;
    position:sticky;top:54px;background:var(--bg);z-index:10;}
  .search{display:flex;gap:8px;}
  .search input{flex:1;padding:10px 12px;border:1px solid var(--line);border-radius:10px;
    font-size:15px;background:#fff;}
  .chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
  .chip{flex:0 0 auto;padding:6px 12px;border:1px solid var(--line);border-radius:999px;
    background:#fff;color:var(--sub);font-size:13px;cursor:pointer;white-space:nowrap;}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  .row2{display:flex;gap:8px;align-items:center;}
  select.sort{flex:1;padding:9px 10px;border:1px solid var(--line);border-radius:10px;background:#fff;font-size:14px;}
  .ghost{padding:9px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;
    color:var(--ink);font-size:14px;cursor:pointer;}
  main{padding:4px 12px 12px;}
  .count{font-size:12px;color:var(--sub);margin:2px 2px 8px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:12px 14px;margin-bottom:10px;cursor:pointer;
    display:flex;flex-direction:column;gap:6px;border-left:5px solid var(--line);}
  .card .top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;}
  .card .name{font-weight:700;font-size:15.5px;}
  .card .id{font-size:11px;color:var(--sub);font-variant-numeric:tabular-nums;}
  .badge{font-size:11px;font-weight:700;color:#fff;padding:3px 9px;border-radius:999px;white-space:nowrap;}
  .meta{font-size:13px;color:var(--sub);display:flex;flex-wrap:wrap;gap:4px 12px;}
  .meta b{color:var(--ink);font-weight:600;}
  .yen{font-variant-numeric:tabular-nums;}
  .flag{font-size:11px;color:#b45309;font-weight:700;}
  .empty{text-align:center;color:var(--sub);padding:40px 10px;font-size:14px;}
  /* 会社ごとのグループ＋現場タイル */
  .group{margin-bottom:18px;}
  .ghd{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;color:var(--ink);margin:2px 2px 9px;padding-bottom:6px;border-bottom:2px solid var(--line);}
  .ghd .gc{flex:0 0 auto;width:9px;height:9px;border-radius:50%;background:var(--accent);}
  .ghd .gn{flex:1;}
  .ghd .gcount{font-size:12px;color:var(--sub);font-weight:600;}
  .tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(112px,1fr));gap:9px;}
  .tile{position:relative;background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);
    padding:13px 10px 11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;text-align:center;gap:7px;
    border-top:4px solid var(--line);min-height:104px;justify-content:center;}
  .tile:active{transform:scale(.97);}
  .tile .ic{font-size:26px;line-height:1;}
  .tile .tn{font-size:13px;font-weight:700;line-height:1.25;word-break:break-word;}
  .tile .ts{font-size:10.5px;font-weight:700;color:#fff;padding:1px 7px;border-radius:999px;}
  .tile .edit{position:absolute;top:5px;right:5px;width:26px;height:26px;border-radius:8px;border:1px solid var(--line);
    background:#fff;font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--sub);}
  /* 現場の詳細シート */
  .d-sub{font-size:13px;color:var(--sub);margin:0 0 12px;}
  .d-rows{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
  .d-row{display:flex;gap:10px;font-size:14px;}
  .d-row .k{flex:0 0 80px;color:var(--sub);font-size:12.5px;padding-top:1px;}
  .d-row .v{flex:1;font-weight:600;word-break:break-word;}
  .d-map{display:block;text-align:center;padding:11px;border:1px solid var(--accent);color:var(--accent-d);border-radius:11px;text-decoration:none;font-weight:700;font-size:14px;margin-bottom:12px;}
  .d-map:active{background:#eef4fb;}
  .d-btns{display:flex;gap:8px;}
  .d-btns .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;text-decoration:none;text-align:center;}
  .fab{position:fixed;right:16px;bottom:calc(env(safe-area-inset-bottom) + 16px);z-index:30;
    background:var(--accent);color:#fff;border:none;border-radius:999px;
    padding:14px 20px;font-size:15px;font-weight:700;box-shadow:0 6px 16px rgba(15,95,181,.4);cursor:pointer;}
  /* modal */
  .ov{position:fixed;inset:0;background:rgba(15,23,40,.45);z-index:40;display:none;
    align-items:flex-end;justify-content:center;}
  .ov.show{display:flex;}
  .sheet{background:#fff;width:100%;max-width:560px;max-height:92vh;overflow:auto;
    border-radius:16px 16px 0 0;padding:16px 16px calc(env(safe-area-inset-bottom) + 16px);}
  .sheet h2{font-size:16px;margin:2px 0 12px;}
  .fld{margin-bottom:11px;}
  .fld label{display:block;font-size:12.5px;color:var(--sub);margin-bottom:4px;font-weight:600;}
  .fld input,.fld select,.fld textarea{width:100%;padding:10px 12px;border:1px solid var(--line);
    border-radius:10px;font-size:15px;background:#fff;font-family:inherit;}
  .fld textarea{resize:vertical;min-height:54px;}
  .two{display:flex;gap:8px;} .two>.fld{flex:1;}
  .ytip{display:flex;gap:6px;align-items:flex-end;}
  .ytip .mini{flex:0 0 auto;padding:10px 10px;border:1px solid var(--line);border-radius:10px;
    background:#f8fafc;font-size:12px;cursor:pointer;color:var(--accent);}
  .acts{display:flex;gap:8px;margin-top:6px;}
  .btn{flex:1;padding:13px;border-radius:11px;border:none;font-size:15px;font-weight:700;cursor:pointer;}
  .btn.primary{background:var(--accent);color:#fff;} .btn.primary:active{background:var(--accent-d);}
  .btn.sub{background:#eef1f5;color:var(--ink);}
  .btn.danger{background:#fff;color:#dc2626;border:1px solid #fecaca;}
  .row-del{text-align:center;margin-top:10px;}
  .row-del a{color:#dc2626;font-size:13px;text-decoration:none;}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:90px;z-index:60;
    background:#1f2733;color:#fff;padding:10px 16px;border-radius:999px;font-size:13px;
    opacity:0;transition:opacity .25s;pointer-events:none;}
  .toast.show{opacity:1;}
  /* 現場詳細を全画面で表示 */
  .ov.detail{align-items:stretch;}
  .ov.detail .sheet{max-width:none;width:100%;max-height:100%;height:100%;border-radius:0;padding:0;display:flex;flex-direction:column;overflow:hidden;}
  .dhead{position:sticky;top:0;flex:0 0 auto;background:var(--accent);color:#fff;display:flex;align-items:center;gap:8px;
    padding:calc(env(safe-area-inset-top) + 10px) 12px 10px;box-shadow:var(--shadow);}
  .dhead .dclose{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:9px;
    padding:7px 12px;font-size:14px;font-weight:700;cursor:pointer;}
  .dhead .dttl{font-size:15px;font-weight:700;letter-spacing:.02em;}
  .dbody{flex:1;overflow:auto;padding:18px 16px calc(env(safe-area-inset-bottom) + 28px);max-width:560px;width:100%;margin:0 auto;}
  .d-folder{display:block;text-align:center;padding:14px;background:var(--accent);color:#fff;border-radius:12px;
    text-decoration:none;font-weight:700;font-size:15px;margin-bottom:12px;}
  .d-folder:active{background:var(--accent-d);}
  .d-rows .v a{color:var(--accent-d);text-decoration:none;font-weight:600;}
  /* 管理者ヒント（一般ユーザー向け）*/
  .adhint{font-size:12.5px;color:var(--sub);background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 11px;}
  .loading{position:fixed;inset:0;z-index:1000;background:rgba(240,242,245,.72);-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;}
  .loading.show{display:flex;}
  .lbox{background:#fff;border-radius:16px;box-shadow:0 10px 30px rgba(20,30,50,.18);padding:24px 32px;text-align:center;}
  .spin{width:38px;height:38px;border:4px solid #e1e5ea;border-top-color:var(--accent);border-radius:50%;margin:0 auto 12px;animation:sp .8s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
  .lbox .txt{font-size:14px;font-weight:700;}
</style>
</head>
<body>
<header>
  <div class="hd-row">
    <a class="back" href="https://kawaguchidenki001.github.io/genba-projects/">← 現場管理メニュー</a>
    <span class="sync"><span id="dot" class="dot"></span><span id="syncTxt">読込中…</span></span>
  </div>
  <div class="hd-row" style="margin-top:6px;"><h1>案件管理</h1>
    <div style="display:flex;gap:6px;">
      <button class="ghost" id="admBtn" style="padding:6px 10px;background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3);color:#fff;" onclick="toggleAdmin()">🔑</button>
      <button class="ghost" style="padding:6px 10px;background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3);color:#fff;" onclick="reload()">↻ 更新</button>
    </div>
  </div>
</header>

<div id="gate" style="position:fixed;inset:0;z-index:100;background:#fff;display:none;align-items:center;justify-content:center;">
  <div style="max-width:360px;text-align:center;padding:0 18px;">
    <div style="font-size:46px;">📡</div>
    <h2 style="font-size:18px;margin:10px 0 6px;">案件管理</h2>
    <p id="gateMsg" style="color:#6b7280;font-size:14px;margin:0 0 16px;">確認中…</p>
    <button onclick="location.reload()" style="width:100%;padding:13px;border:none;border-radius:11px;background:#0f5fb5;color:#fff;font-size:15px;font-weight:700;cursor:pointer;">再読み込み</button>
    <p style="margin-top:14px;"><a href="https://kawaguchidenki001.github.io/genba-projects/" style="color:#6b7280;font-size:13px;">← 現場管理メニューへ戻る</a></p>
  </div>
</div>

<div class="toolbar">
  <div class="search"><input id="q" type="search" placeholder="現場名・会社名・場所で検索" oninput="render()"></div>
  <div class="chips" id="chips"></div>
  <div class="row2" id="adminRow" style="display:none;">
    <span style="flex:1;font-size:12px;color:var(--sub);">管理者：顧客マスタを追加できます</span>
    <button class="ghost" onclick="openCustomer()">＋顧客</button>
  </div>
</div>

<main>
  <div class="count" id="count"></div>
  <div id="list"></div>
</main>

<button class="fab" id="fab" onclick="openProject()" style="display:none;">＋ 新規案件</button>

<!-- 案件モーダル -->
<div class="ov" id="ov">
  <div class="sheet">
    <h2 id="mTitle">新規案件</h2>
    <input type="hidden" id="f_id">
    <div class="fld"><label>案件名 ／ 現場名 *</label><input id="f_name" placeholder="例）不破高等学校空調設備更新工事"></div>
    <div class="fld"><label>略称（日報・予定表に表示）</label><input id="f_short" placeholder="例）不破高 空調"></div>
    <div class="two">
      <div class="fld"><label>顧客 ／ 取引先</label>
        <select id="f_cust" onchange="onCustChange()"></select>
        <input id="f_cust_other" style="display:none;margin-top:6px;" placeholder="一覧にない取引先を直接入力"></div>
      <div class="fld"><label>場所（住所）</label><input id="f_place" placeholder="例）愛知県一宮市〇〇1-2"></div>
    </div>
    <div class="two">
      <div class="fld"><label>種別</label><select id="f_type">
        <option>官公庁</option><option>法人</option><option>個人</option></select></div>
      <div class="fld"><label>ステータス</label><select id="f_status">
        <option>受注</option><option>段取済</option><option>施工中</option><option>完了</option></select></div>
    </div>
    <div class="two">
      <div class="fld"><label>工期開始</label><input id="f_start" type="date"></div>
      <div class="fld"><label>工期完了</label><input id="f_end" type="date"></div>
    </div>
    <div class="fld"><label>先方担当者</label>
      <select id="f_contact" onchange="onContactChange()"></select>
      <input id="f_contact_other" style="display:none;margin-top:6px;" placeholder="一覧にない担当者を直接入力"></div>
    <div class="two">
      <div class="fld"><label>電話番号</label><input id="f_tel" inputmode="tel" placeholder="例）090-1234-5678"></div>
      <div class="fld"><label>メールアドレス</label><input id="f_email" inputmode="email" placeholder="例）taro@example.com"></div>

    <div class="fld"><label>備考</label><textarea id="f_note" placeholder="メモ"></textarea></div>
    <div class="acts">
      <button class="btn sub" onclick="closeOv()">キャンセル</button>
      <button class="btn primary" id="saveBtn" onclick="saveProject()">保存</button>
    </div>
    <div class="row-del" id="delRow" style="display:none;"><a href="#" onclick="delProject(event)">この案件を削除</a></div>
  </div>
</div>

<!-- 顧客モーダル -->
<div class="ov" id="ovc">
  <div class="sheet">
    <h2>顧客の追加</h2>
    <div class="fld"><label>顧客名 *</label><input id="c_name" placeholder="例）岐阜市 / ○○建設"></div>
    <div class="two">
      <div class="fld"><label>担当者</label><input id="c_person"></div>
      <div class="fld"><label>電話</label><input id="c_tel" inputmode="tel"></div>
    </div>
    <div class="fld"><label>住所</label><input id="c_addr"></div>
    <div class="fld"><label>備考</label><textarea id="c_note"></textarea></div>
    <div class="acts">
      <button class="btn sub" onclick="closeC()">キャンセル</button>
      <button class="btn primary" id="cSaveBtn" onclick="saveCustomer()">保存</button>
    </div>
  </div>
</div>

<!-- 現場の詳細（だれでも閲覧／全画面）-->
<div class="ov detail" id="ovd">
  <div class="sheet">
    <div class="dhead">
      <button class="dclose" onclick="closeDetail(event)">← 戻る</button>
      <span class="dttl">現場の詳細</span>
    </div>
    <div class="dbody">
      <h2 id="d_name" style="font-size:20px;margin:0 0 5px;">現場名</h2>
      <div id="d_cust" class="d-sub"></div>
      <div class="d-rows" id="d_rows"></div>
      <a id="d_map" class="d-map" target="_blank" rel="noopener" style="display:none;">📍 地図で見る（Googleマップ）</a>
      <a id="d_folder" class="d-folder" target="_blank" rel="noopener">📁 フォルダを開く（Googleドライブ）</a>
      <div id="d_adminbtns" style="display:none;">
        <button class="btn primary" style="width:100%;" onclick="editFromDetail()">✎ この現場を編集</button>
      </div>
    </div>
  </div>
</div>

<div class="loading" id="loading"><div class="lbox"><div class="spin"></div><div class="txt">読み込み中…</div></div></div>
<div class="toast" id="toast"></div>

<script>
/* ===== 設定（★ここを埋める）===== */
var GAS_URL = 'https://script.google.com/macros/s/AKfycbyk8p6_gi6e3wdhQdWL0Oswz4BUtP3gR37PeFJJ9rO5mVhTRt4CikpQhK_bBwt1Ftr-/exec';
var T_GENERAL = 'kawaguchi-genba-2026';
var ROLE = '';
function admTok(){return localStorage.getItem('genba_admin')||'';}
function tok(){return admTok()||T_GENERAL;}

var STATUSES = ['受注','段取済','施工中','完了'];
var projects = [], customers = [], contacts = [], filterStatus = 'すべて';
var CACHE_P = 'genba_projects', CACHE_C = 'genba_customers', CACHE_K = 'genba_contacts';

/* ===== JSONP 通信 ===== */
var loadCnt=0,loadShownAt=0;
function showLoad(){loadCnt++;if(loadCnt===1){loadShownAt=Date.now();document.getElementById('loading').classList.add('show');}}
function hideLoad(){loadCnt=Math.max(0,loadCnt-1);if(loadCnt===0){var w=Math.max(0,600-(Date.now()-loadShownAt));setTimeout(function(){if(loadCnt===0)document.getElementById('loading').classList.remove('show');},w);}}
function callGAS(params,secretOverride){
  return new Promise(function(resolve,reject){
    if(!GAS_URL){ reject(new Error('GAS_URL が未設定です')); return; }
    showLoad();
    var cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*1e6);
    var s=document.createElement('script');
    var timer=setTimeout(function(){cleanup();reject(new Error('タイムアウト'));},20000);
    function cleanup(){hideLoad();try{delete window[cb];}catch(e){}if(s.parentNode)s.parentNode.removeChild(s);clearTimeout(timer);}
    window[cb]=function(res){cleanup();resolve(res);};
    var q=Object.assign({secret:secretOverride||tok(),callback:cb},params);
    if(q.data && typeof q.data!=='string') q.data=JSON.stringify(q.data);
    var url=GAS_URL+'?'+Object.keys(q).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(q[k]);}).join('&');
    s.src=url; s.onerror=function(){cleanup();reject(new Error('通信エラー'));};
    document.head.appendChild(s);
  });
}

/* ===== 同期表示 ===== */
function setSync(state,txt){
  var d=document.getElementById('dot');
  d.className='dot'+(state?' '+state:'');
  document.getElementById('syncTxt').textContent=txt;
}

/* ===== 読込 ===== */
function loadCache(){
  try{projects=JSON.parse(localStorage.getItem(CACHE_P)||'[]');}catch(e){projects=[];}
  try{customers=JSON.parse(localStorage.getItem(CACHE_C)||'[]');}catch(e){customers=[];}
  try{contacts=JSON.parse(localStorage.getItem(CACHE_K)||'[]');}catch(e){contacts=[];}
}
function saveCache(){
  try{localStorage.setItem(CACHE_P,JSON.stringify(projects));
      localStorage.setItem(CACHE_C,JSON.stringify(customers));
      localStorage.setItem(CACHE_K,JSON.stringify(contacts));}catch(e){}
}
function reload(){
  setSync('busy','同期中…');
  callGAS({action:'all'}).then(function(res){
    if(!res.ok){throw new Error(res.error||'エラー');}
    projects=res.projects||[]; customers=res.customers||[]; contacts=res.contacts||[];
    saveCache(); buildChips(); buildCustList(); render();
    setSync('ok','同期済み'); openCaseFromUrl();
  }).catch(function(err){
    setSync('off','オフライン'); render();
    toast('読込失敗：'+err.message);
  });
}

/* ===== UI構築 ===== */
function buildChips(){
  var counts={}; STATUSES.forEach(function(s){counts[s]=0;});
  projects.forEach(function(p){if(counts[p['ステータス']]!=null)counts[p['ステータス']]++;});
  var wrap=document.getElementById('chips'); wrap.innerHTML='';
  var all=['すべて'].concat(STATUSES);
  all.forEach(function(s){
    var c=document.createElement('div');
    c.className='chip'+(filterStatus===s?' on':'');
    c.textContent= s==='すべて'?('すべて '+projects.length):(s+' '+(counts[s]||0));
    c.onclick=function(){filterStatus=s;buildChips();render();};
    wrap.appendChild(c);
  });
}
function custKindOf(c){ return String(c['区分']||'').trim()||'法人'; }
function buildCustList(){
  var sel=document.getElementById('f_cust'); if(!sel)return;
  var keep=sel.value;
  var order=['官公庁','法人','個人'],byKind={};
  customers.forEach(function(c){var k=custKindOf(c);(byKind[k]=byKind[k]||[]).push(c);});
  Object.keys(byKind).forEach(function(k){if(order.indexOf(k)<0)order.push(k);});
  sel.innerHTML='<option value="">（選択）</option>';
  order.forEach(function(k){var arr=byKind[k];if(!arr)return;var og=document.createElement('optgroup');og.label=k;
    arr.sort(function(a,b){return String(a['顧客名']||'').localeCompare(String(b['顧客名']||''),'ja');});
    arr.forEach(function(c){var o=document.createElement('option');o.value=c['顧客名'];o.textContent=c['顧客名'];og.appendChild(o);});
    sel.appendChild(og);});
  var ot=document.createElement('option');ot.value='__other__';ot.textContent='＋ 一覧にない取引先を直接入力';sel.appendChild(ot);
  if(keep){ sel.value=keep; }
}
function buildContactSelect(partner){
  var sel=document.getElementById('f_contact'); if(!sel)return;
  sel.innerHTML='<option value="">（選択／任意）</option>';
  contacts.filter(function(c){return String(c['取引先']||'')===String(partner||'');})
    .sort(function(a,b){return String(a['担当者名']||'').localeCompare(String(b['担当者名']||''),'ja');})
    .forEach(function(c){var o=document.createElement('option');o.value=c['担当者名'];
      o.textContent=c['担当者名']+(c['役職']?'（'+c['役職']+'）':'');
      o.setAttribute('data-tel',c['電話']||'');o.setAttribute('data-mail',c['メール']||'');sel.appendChild(o);});
  var ot=document.createElement('option');ot.value='__other__';ot.textContent='＋ 直接入力';sel.appendChild(ot);
}
function onCustChange(){
  var sel=document.getElementById('f_cust');
  document.getElementById('f_cust_other').style.display=(sel.value==='__other__')?'block':'none';
  var partner=(sel.value==='__other__')?'':sel.value;
  buildContactSelect(partner);
  document.getElementById('f_contact').value='';
  document.getElementById('f_contact_other').style.display='none';
}
function onContactChange(){
  var sel=document.getElementById('f_contact'),other=document.getElementById('f_contact_other');
  if(sel.value==='__other__'){ other.style.display='block'; other.value=''; return; }
  other.style.display='none';
  if(sel.value){ var o=sel.options[sel.selectedIndex];
    var tel=o.getAttribute('data-tel')||'',ml=o.getAttribute('data-mail')||'';
    if(tel)document.getElementById('f_tel').value=tel;
    if(ml)document.getElementById('f_email').value=ml;
  }
}

var BASE='https://kawaguchidenki001.github.io/genba-projects/';
var NOCUST='（未分類）';
function isAdmin(){return ROLE==='admin';}
function custKey(p){var c=String(p['顧客']||'').trim();return c||NOCUST;}
function openPhotos(p){ if(!p||!p['案件ID']){toast('案件IDがありません');return;} location.href=BASE+'files/?case='+encodeURIComponent(p['案件ID']); }
function editProjectById(id){var p=projects.filter(function(x){return String(x['案件ID'])===String(id);})[0];if(p)openProject(p);}
function openCaseFromUrl(){ try{ var m=location.search.match(/[?&]case=([^&]+)/); if(!m)return; var id=decodeURIComponent(m[1]);
  var p=projects.filter(function(x){return String(x['案件ID'])===String(id);})[0];
  if(p){ openProject(p); if(history&&history.replaceState)history.replaceState(null,'',location.pathname); } }catch(e){} }
var curDetail=null;
function openDetail(p){
  curDetail=p; var g=function(id){return document.getElementById(id);};
  g('d_name').textContent=p['案件名']||'(無題)';
  g('d_cust').textContent=(p['顧客']||'（顧客未設定）')+(p['種別']?(' ・ '+p['種別']):'');
  var rows='';
  function row(k,v){ if(v) rows+='<div class="d-row"><span class="k">'+k+'</span><span class="v">'+esc(v)+'</span></div>'; }
  function linkRow(k,v,scheme){ if(v) rows+='<div class="d-row"><span class="k">'+k+'</span><span class="v"><a href="'+scheme+encodeURIComponent(v)+'">'+esc(v)+'</a></span></div>'; }
  row('ステータス',p['ステータス']);
  var period=(dateOnly(p['工期開始'])||'')+(dateOnly(p['工期完了'])?(' 〜 '+dateOnly(p['工期完了'])):'');
  row('工期',period.trim());
  row('住所',p['場所']);
  row('担当者',p['先方担当者']);
  linkRow('電話',p['電話番号'],'tel:');
  linkRow('メール',p['メールアドレス'],'mailto:');
  row('備考',p['備考']);
  g('d_rows').innerHTML=rows;
  var mp=g('d_map');
  if(p['場所']){ mp.href='https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(p['場所']); mp.style.display='block'; }
  else { mp.style.display='none'; }
  // フォルダ（Googleドライブ）：1ボタンでその現場のフォルダを開く
  var fo=g('d_folder'); fo.onclick=null; fo.removeAttribute('href'); fo.textContent='📁 フォルダを準備中…'; fo.style.opacity='.6';
  callGAS({action:'ensureFolder',id:p['案件ID']}).then(function(res){
    if(res&&res.ok&&res.url){ fo.href=res.url; fo.textContent='📁 フォルダを開く（Googleドライブ）'; fo.style.opacity='1'; }
    else { fo.textContent='📁 フォルダ（もう一度タップ）'; fo.style.opacity='1'; fo.onclick=function(e){e.preventDefault();openDetail(curDetail);}; }
  }).catch(function(){ fo.textContent='📁 フォルダ（もう一度タップ）'; fo.style.opacity='1'; fo.onclick=function(e){e.preventDefault();openDetail(curDetail);}; });
  g('d_adminbtns').style.display='block';
  document.getElementById('ovd').classList.add('show');
}
function editFromDetail(){ closeDetail(); if(curDetail)openProject(curDetail); }
function closeDetail(ev){ if(ev&&ev.preventDefault)ev.preventDefault(); document.getElementById('ovd').classList.remove('show'); }
function render(){
  var q=(document.getElementById('q').value||'').trim();
  var list=projects.slice();
  if(filterStatus!=='すべて') list=list.filter(function(p){return p['ステータス']===filterStatus;});
  if(q){var lq=q.toLowerCase();
    list=list.filter(function(p){
      return [p['案件名'],p['顧客'],p['場所'],p['案件ID'],p['担当']]
        .some(function(v){return String(v||'').toLowerCase().indexOf(lq)>=0;});});}
  document.getElementById('count').textContent= list.length+' 件';
  var el=document.getElementById('list');
  if(!list.length){el.innerHTML='<div class="empty">該当する現場がありません。<br>右下の「＋新規案件」から登録できます。</div>';return;}
  // 会社名・自治体名ごとにグループ化
  var groups={},order=[];
  list.forEach(function(p){var k=custKey(p);if(!groups[k]){groups[k]=[];order.push(k);}groups[k].push(p);});
  order.sort(function(a,b){ if(a===NOCUST)return 1; if(b===NOCUST)return -1; return a.localeCompare(b,'ja'); });
  el.innerHTML='';
  order.forEach(function(k){
    var arr=groups[k];
    arr.sort(function(a,b){return String(a['案件名']||'').localeCompare(String(b['案件名']||''),'ja');});
    var g=document.createElement('div');g.className='group';
    var hd=document.createElement('div');hd.className='ghd';
    hd.innerHTML='<span class="gc"></span><span class="gn">'+esc(k)+'</span><span class="gcount">'+arr.length+'件</span>';
    g.appendChild(hd);
    var tiles=document.createElement('div');tiles.className='tiles';
    arr.forEach(function(p){
      var col=statusColor(p['ステータス']);
      var t=document.createElement('div');t.className='tile';t.style.borderTopColor=col;
      t.onclick=function(){openDetail(p);};
      var h='<div class="ic">📷</div><div class="tn">'+esc(p['案件名']||'(無題)')+'</div>';
      if(p['ステータス'])h+='<div class="ts" style="background:'+col+'">'+esc(p['ステータス'])+'</div>';
      t.innerHTML=h;
      tiles.appendChild(t);
    });
    g.appendChild(tiles);
    el.appendChild(g);
  });
}

/* ===== 案件モーダル ===== */
function openProject(p){
  document.getElementById('mTitle').textContent= p?'案件の編集':'新規案件';
  document.getElementById('delRow').style.display= p?'block':'none';
  var g=function(id){return document.getElementById(id);};
  g('f_id').value   = p?(p['案件ID']||''):'';
  g('f_name').value = p?(p['案件名']||''):'';
  g('f_short').value = p?(p['略称']||''):'';
  buildCustList();
  var _cust=p?(p['顧客']||''):''; var _csel=g('f_cust'); _csel.value=_cust;
  if(_cust && _csel.value!==_cust){ _csel.value='__other__'; }
  g('f_cust_other').value=(_csel.value==='__other__')?_cust:'';
  g('f_cust_other').style.display=(_csel.value==='__other__')?'block':'none';
  g('f_place').value= p?(p['場所']||''):'';
  g('f_type').value = p?(p['種別']||'官公庁'):'官公庁';
  g('f_status').value=p?(p['ステータス']||'受注'):'受注';
  g('f_start').value= p?(dateOnly(p['工期開始'])):'';
  g('f_end').value  = p?(dateOnly(p['工期完了'])):'';
  var _partner=(g('f_cust').value==='__other__')?'':g('f_cust').value;
  buildContactSelect(_partner);
  var _ct=p?(p['先方担当者']||''):''; var _ksel=g('f_contact'); var _kother=g('f_contact_other');
  _kother.value=''; _kother.style.display='none';
  if(_ct){ _ksel.value=_ct; if(_ksel.value!==_ct){ _ksel.value='__other__'; _kother.value=_ct; _kother.style.display='block'; } }
  else { _ksel.value=''; }
  g('f_tel').value  = p?(p['電話番号']||''):'';
  g('f_email').value= p?(p['メールアドレス']||''):'';
  g('f_note').value = p?(p['備考']||''):'';
  document.getElementById('ov').classList.add('show');
}
function closeOv(){document.getElementById('ov').classList.remove('show');}
function gatherProject(){
  var g=function(id){return document.getElementById(id).value;};
  var cv=g('f_cust'), cust=(cv==='__other__')?g('f_cust_other').trim():cv.trim();
  var kv=g('f_contact'), contact=(kv==='__other__')?g('f_contact_other').trim():kv.trim();
  return {
    '案件ID':g('f_id'),'案件名':g('f_name').trim(),'略称':g('f_short').trim(),'顧客':cust,
    '場所':g('f_place').trim(),'種別':g('f_type'),'ステータス':g('f_status'),
    '工期開始':g('f_start'),'工期完了':g('f_end'),
    '先方担当者':contact,'電話番号':g('f_tel').trim(),'メールアドレス':g('f_email').trim(),
    '備考':g('f_note').trim()
  };
}
function saveProject(){
  var d=gatherProject();
  if(!d['案件名']){toast('案件名を入力してください');return;}
  var id=d['案件ID']; var isNew=!id;
  var btn=document.getElementById('saveBtn'); btn.disabled=true; btn.textContent='保存中…';
  var action= isNew?'addProject':'updateProject';
  var params= isNew?{action:action,data:d}:{action:action,id:id,data:d};
  callGAS(params).then(function(res){
    if(!res.ok)throw new Error(res.error||'保存失敗');
    var rec=res.project;
    if(isNew){projects.push(rec);}
    else{for(var i=0;i<projects.length;i++){if(projects[i]['案件ID']===id){projects[i]=rec;break;}}}
    saveCache(); buildChips(); render(); closeOv(); toast(isNew?'登録しました':'更新しました');
  }).catch(function(err){toast('失敗：'+err.message);})
    .then(function(){btn.disabled=false;btn.textContent='保存';});
}
function delProject(ev){
  ev.preventDefault();
  var id=document.getElementById('f_id').value;
  if(!id)return;
  if(!confirm('この案件を削除します。よろしいですか？'))return;
  callGAS({action:'deleteProject',id:id}).then(function(res){
    if(!res.ok)throw new Error(res.error||'削除失敗');
    projects=projects.filter(function(p){return p['案件ID']!==id;});
    saveCache(); buildChips(); render(); closeOv(); toast('削除しました');
  }).catch(function(err){toast('失敗：'+err.message);});
}

/* ===== 顧客モーダル ===== */
function openCustomer(){['c_name','c_person','c_tel','c_addr','c_note'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('ovc').classList.add('show');}
function closeC(){document.getElementById('ovc').classList.remove('show');}
function saveCustomer(){
  var g=function(id){return document.getElementById(id).value;};
  var name=g('c_name').trim();
  if(!name){toast('顧客名を入力してください');return;}
  var d={'顧客名':name,'担当者':g('c_person').trim(),'電話':g('c_tel').trim(),'住所':g('c_addr').trim(),'備考':g('c_note').trim()};
  var btn=document.getElementById('cSaveBtn'); btn.disabled=true; btn.textContent='保存中…';
  callGAS({action:'addCustomer',data:d}).then(function(res){
    if(!res.ok)throw new Error(res.error||'保存失敗');
    customers.push(res.customer); saveCache(); buildCustList(); closeC(); toast('顧客を追加しました');
  }).catch(function(err){toast('失敗：'+err.message);})
    .then(function(){btn.disabled=false;btn.textContent='保存';});
}

/* ===== ヘルパー ===== */
function statusColor(s){var m={'受注':'var(--s-受注)','段取済':'#7c3aed','施工中':'var(--s-施工中)','完了':'var(--s-完了)'};return m[s]||'var(--sub)';}
function num(v){var n=parseFloat(String(v).replace(/[^\d.-]/g,''));return isNaN(n)?0:n;}
function yen(v){var n=num(v);return n?('¥'+n.toLocaleString('ja-JP')):'';}
function dateOnly(v){return v?String(v).slice(0,10):'';}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
var toastT;
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('show');},2600);}

/* 背景タップで閉じる */
['ov','ovc','ovd'].forEach(function(id){document.getElementById(id).addEventListener('click',function(e){if(e.target===this)this.classList.remove('show');});});
/* タブ復帰で自動更新 */
document.addEventListener('visibilitychange',function(){if(!document.hidden && GAS_URL)reload();});

/* ===== 管理者ログイン ===== */
function showGate(msg){document.getElementById('gate').style.display='flex';document.getElementById('gateMsg').textContent=msg||'';}
function hideGate(){document.getElementById('gate').style.display='none';}
function applyAdminUI(){
  document.getElementById('fab').style.display='block';                       // 誰でも登録できる
  document.getElementById('adminRow').style.display=isAdmin()?'flex':'none';   // 顧客の追加は管理者
  document.getElementById('admBtn').textContent=isAdmin()?'管理者':'🔑';
}
function toggleAdmin(){
  if(admTok()){ if(confirm('管理者ログアウトしますか？')){localStorage.removeItem('genba_admin');location.reload();} return; }
  var pin=prompt('管理者PINを入力してください');if(!pin)return;
  callGAS({action:'checkRole'},pin).then(function(res){
    if(res&&res.ok&&res.role==='admin'){localStorage.setItem('genba_admin',pin);location.reload();}
    else toast('管理者PINが違います');
  }).catch(function(err){toast('通信エラー：'+err.message);});
}

/* 起動：全員が閲覧可。管理者のみ追加・編集ができる */
loadCache();
buildChips(); render(); applyAdminUI();
callGAS({action:'checkRole'}).then(function(res){
  ROLE=(res&&res.ok)?res.role:'';
  if(!ROLE){ if(admTok())localStorage.removeItem('genba_admin'); showGate('認証できませんでした。共通リンクから開き直してください。'); return; }
  if(admTok()&&ROLE!=='admin')localStorage.removeItem('genba_admin');
  hideGate(); applyAdminUI(); buildChips(); buildCustList(); render(); reload();
}).catch(function(){ setSync('off','オフライン'); });
</script>
